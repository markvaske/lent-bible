    { label: "First Reading", ref: "Daniel 3:25, 34-43", dropCap: true, text: `Azariah stood up in the fire and prayed aloud:\n\n"For your name's sake, O Lord, do not deliver us up forever,\nor make void your covenant.\nDo not take away your mercy from us,\nfor the sake of Abraham, your beloved,\nIsaac your servant, and Israel your holy one,\nTo whom you promised to multiply their offspring\nlike the stars of heaven,\nor the sand on the shore of the sea.\nFor we are reduced, O Lord, beyond any other nation,\nbrought low everywhere in the world this day\nbecause of our sins.\nWe have in our day no prince, prophet, or leader,\nno burnt offering, sacrifice, oblation, or incense,\nno place to offer first fruits, to find favor with you.\nBut with contrite heart and humble spirit\nlet us be received;\nAs though it were burnt offerings of rams and bullocks,\nor thousands of fat lambs,\nSo let our sacrifice be in your presence today\nas we follow you unreservedly;\nfor those who trust in you cannot be put to shame.\nAnd now we follow you with our whole heart,\nwe fear you and we pray to you.\nDo not let us be put to shame,\nbut deal with us in your kindness and great mercy.\nDeliver us by your wonders,\nand bring glory to your name, O Lord."` },
    { label: "Responsorial Psalm", ref: "Psalm 25:4-5ab, 6-7bc, 8-9", isRefrain: true, text: `R. Remember your mercies, O Lord.\n\nYour ways, O LORD, make known to me;\nteach me your paths,\nGuide me in your truth and teach me,\nfor you are God my savior.\n\nR. Remember your mercies, O Lord.\n\nRemember that your compassion, O LORD,\nand your kindness are from of old.\nIn your kindness remember me,\nbecause of your goodness, O LORD.\n\nR. Remember your mercies, O Lord.\n\nGood and upright is the LORD;\nthus he shows sinners the way.\nHe guides the humble to justice,\nhe teaches the humble his way.\n\nR. Remember your mercies, O Lord.` },
    { label: "Gospel", ref: "Matthew 18:21-35", dropCap: true, text: `Peter approached Jesus and asked him,\n"Lord, if my brother sins against me,\nhow often must I forgive him?\nAs many as seven times?"\nJesus answered, "I say to you, not seven times but seventy-seven times.\nThat is why the Kingdom of heaven may be likened to a king\nwho decided to settle accounts with his servants.\nWhen he began the accounting,\na debtor was brought before him who owed him a huge amount.\nSince he had no way of paying it back,\nhis master ordered him to be sold,\nalong with his wife, his children, and all his property,\nin payment of the debt.\nAt that, the servant fell down, did him homage, and said,\n'Be patient with me, and I will pay you back in full.'\nMoved with compassion the master of that servant\nlet him go and forgave him the loan.\nWhen that servant had left, he found one of his fellow servants\nwho owed him a much smaller amount.\nHe seized him and started to choke him, demanding,\n'Pay back what you owe.'\nFalling to his knees, his fellow servant begged him,\n'Be patient with me, and I will pay you back.'\nBut he refused.\nInstead, he had him put in prison\nuntil he paid back the debt.\nNow when his fellow servants saw what had happened,\nthey were deeply disturbed, and went to their master\nand reported the whole affair.\nHis master summoned him and said to him, 'You wicked servant!\nI forgave you your entire debt because you begged me to.\nShould you not have had pity on your fellow servant,\nas I had pity on you?'\nThen in anger his master handed him over to the torturers\nuntil he should pay back the whole debt.\nSo will my heavenly Father do to you,\nunless each of you forgives your brother from your heart."` }] },
  "2026-03-11": { feast: "Wednesday of the Third Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Deuteronomy 4:1, 5-9", dropCap: true, text: `Moses spoke to the people and said:\n"Now, Israel, hear the statutes and decrees\nwhich I am teaching you to observe,\nthat you may live, and may enter in and take possession of the land\nwhich the LORD, the God of your fathers, is giving you.\nTherefore, I teach you the statutes and decrees\nas the LORD, my God, has commanded me,\nthat you may observe them in the land you are entering to occupy.\nObserve them carefully,\nfor thus will you give evidence\nof your wisdom and intelligence to the nations,\nwho will hear of all these statutes and say,\n'This great nation is truly a wise and intelligent people.'\nFor what great nation is there\nthat has gods so close to it as the LORD, our God, is to us\nwhenever we call upon him?\nOr what great nation has statutes and decrees\nthat are as just as this whole law\nwhich I am setting before you today?\n\n"However, take care and be earnestly on your guard\nnot to forget the things which your own eyes have seen,\nnor let them slip from your memory as long as you live,\nbut teach them to your children and to your children's children."` },
    { label: "Responsorial Psalm", ref: "Psalm 147:12-13, 15-16, 19-20", isRefrain: true, text: `R. Praise the Lord, Jerusalem.\n\nGlorify the LORD, O Jerusalem;\npraise your God, O Zion.\nFor he has strengthened the bars of your gates;\nhe has blessed your children within you.\n\nR. Praise the Lord, Jerusalem.\n\nHe sends forth his command to the earth;\nswiftly runs his word!\nHe spreads snow like wool;\nfrost he strews like ashes.\n\nR. Praise the Lord, Jerusalem.\n\nHe has proclaimed his word to Jacob,\nhis statutes and his ordinances to Israel.\nHe has not done thus for any other nation;\nhis ordinances he has not made known to them.\n\nR. Praise the Lord, Jerusalem.` },
    { label: "Gospel", ref: "Matthew 5:17-19", dropCap: true, text: `Jesus said to his disciples:\n"Do not think that I have come to abolish the law or the prophets.\nI have come not to abolish but to fulfill.\nAmen, I say to you, until heaven and earth pass away,\nnot the smallest letter or the smallest part of a letter\nwill pass from the law,\nuntil all things have taken place.\nTherefore, whoever breaks one of the least of these commandments\nand teaches others to do so\nwill be called least in the Kingdom of heaven.\nBut whoever obeys and teaches these commandments\nwill be called greatest in the Kingdom of heaven."` }] },
  "2026-03-12": { feast: "Thursday of the Third Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Jeremiah 7:23-28", dropCap: true, text: `Thus says the LORD:\nThis is what I commanded my people:\nListen to my voice;\nthen I will be your God and you shall be my people.\nWalk in all the ways that I command you,\nso that you may prosper.\n\nBut they obeyed not, nor did they pay heed.\nThey walked in the hardness of their evil hearts\nand turned their backs, not their faces, to me.\nFrom the day that your fathers left the land of Egypt even to this day,\nI have sent you untiringly all my servants the prophets.\nYet they have not obeyed me nor paid heed;\nthey have stiffened their necks and done worse than their fathers.\nWhen you speak all these words to them,\nthey will not listen to you either;\nwhen you call to them, they will not answer you.\nSay to them:\nThis is the nation that does not listen\nto the voice of the LORD, its God,\nor take correction.\nFaithfulness has disappeared;\nthe word itself is banished from their speech.` },
    { label: "Responsorial Psalm", ref: "Psalm 95:1-2, 6-7, 8-9", isRefrain: true, text: `R. If today you hear his voice, harden not your hearts.\n\nCome, let us sing joyfully to the LORD;\nlet us acclaim the Rock of our salvation.\nLet us come into his presence with thanksgiving;\nlet us joyfully sing psalms to him.\n\nR. If today you hear his voice, harden not your hearts.\n\nCome, let us bow down in worship;\nlet us kneel before the LORD who made us.\nFor he is our God,\nand we are the people he shepherds, the flock he guides.\n\nR. If today you hear his voice, harden not your hearts.\n\nOh, that today you would hear his voice:\n"Harden not your hearts as at Meribah,\nas in the day of Massah in the desert,\nWhere your fathers tempted me;\nthey tested me though they had seen my works."\n\nR. If today you hear his voice, harden not your hearts.` },
    { label: "Gospel", ref: "Luke 11:14-23", dropCap: true, text: `Jesus was driving out a demon that was mute,\nand when the demon had gone out,\nthe mute man spoke and the crowds were amazed.\nSome of them said, "By the power of Beelzebul, the prince of demons,\nhe drives out demons."\nOthers, to test him, asked him for a sign from heaven.\nBut he knew their thoughts and said to them,\n"Every kingdom divided against itself will be laid waste\nand house will fall against house.\nAnd if Satan is divided against himself,\nhow will his kingdom stand?\nFor you say that it is by Beelzebul that I drive out demons.\nIf I, then, drive out demons by Beelzebul,\nby whom do your own people drive them out?\nTherefore they will be your judges.\nBut if it is by the finger of God that I drive out demons,\nthen the Kingdom of God has come upon you.\nWhen a strong man fully armed guards his palace,\nhis possessions are safe.\nBut when one stronger than he attacks and overcomes him,\nhe takes away the armor on which he relied\nand distributes the spoils.\nWhoever is not with me is against me,\nand whoever does not gather with me scatters."` }] },
  "2026-03-13": { feast: "Friday of the Third Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Hosea 14:2-10", dropCap: true, text: `Thus says the LORD:\nReturn, O Israel, to the LORD, your God;\nyou have collapsed through your guilt.\nTake with you words,\nand return to the LORD;\nSay to him, "Forgive all iniquity,\nand receive what is good, that we may render\nas offerings the bullocks from our stalls.\nAssyria will not save us,\nnor shall we have horses to mount;\nWe shall say no more, 'Our god,'\nto the work of our hands;\nfor in you the orphan finds compassion."\n\nI will heal their defection, says the LORD,\nI will love them freely;\nfor my wrath is turned away from them.\nI will be like the dew for Israel:\nhe shall blossom like the lily;\nHe shall strike root like the Lebanon cedar,\nand put forth his shoots.\nHis splendor shall be like the olive tree\nand his fragrance like the Lebanon cedar.\nAgain they shall dwell in his shade\nand raise grain;\nThey shall blossom like the vine,\nand his fame shall be like the wine of Lebanon.\n\nEphraim! What more has he to do with idols?\nI have humbled him, but I will prosper him.\n"I am like a verdant cypress tree"–\nBecause of me you bear fruit!\n\nLet him who is wise understand these things;\nlet him who is prudent know them.\nStraight are the paths of the LORD,\nin them the just walk,\nbut sinners stumble in them.` },
    { label: "Responsorial Psalm", ref: "Psalm 81:6c-8a, 8bc-9, 10-11ab, 14, 17", isRefrain: true, text: `R. I am the Lord your God: hear my voice.\n\nAn unfamiliar speech I hear:\n"I relieved his shoulder of the burden;\nhis hands were freed from the basket.\nIn distress you called, and I rescued you."\n\nR. I am the Lord your God: hear my voice.\n\n"Unseen, I answered you in thunder;\nI tested you at the waters of Meribah.\nHear, my people, and I will admonish you;\nO Israel, will you not hear me?"\n\nR. I am the Lord your God: hear my voice.\n\n"There shall be no strange god among you\nnor shall you worship any alien god.\nI, the LORD, am your God\nwho led you forth from the land of Egypt."\n\nR. I am the Lord your God: hear my voice.\n\n"If only my people would hear me,\nand Israel walk in my ways,\nI would feed them with the best of wheat,\nand with honey from the rock I would fill them."\n\nR. I am the Lord your God: hear my voice.` },
    { label: "Gospel", ref: "Mark 12:28-34", dropCap: true, text: `One of the scribes came to Jesus and asked him,\n"Which is the first of all the commandments?"\nJesus replied, "The first is this:\nHear, O Israel!\nThe Lord our God is Lord alone!\nYou shall love the Lord your God with all your heart,\nwith all your soul,\nwith all your mind,\nand with all your strength.\nThe second is this:\nYou shall love your neighbor as yourself.\nThere is no other commandment greater than these."\nThe scribe said to him, "Well said, teacher.\nYou are right in saying,\nHe is One and there is no other than he.\nAnd to love him with all your heart,\nwith all your understanding,\nwith all your strength,\nand to love your neighbor as yourself\nis worth more than all burnt offerings and sacrifices."\nAnd when Jesus saw that he answered with understanding,\nhe said to him,\n"You are not far from the Kingdom of God."\nAnd no one dared to ask him any more questions.` }] },
  "2026-03-14": { feast: "Saturday of the Third Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Hosea 6:1-6", dropCap: true, text: `"Come, let us return to the LORD,\nit is he who has rent, but he will heal us;\nhe has struck us, but he will bind our wounds.\nHe will revive us after two days;\non the third day he will raise us up,\nto live in his presence.\nLet us know, let us strive to know the LORD;\nas certain as the dawn is his coming,\nand his judgment shines forth like the light of day!\nHe will come to us like the rain,\nlike spring rain that waters the earth."\n\nWhat can I do with you, Ephraim?\nWhat can I do with you, Judah?\nYour piety is like a morning cloud,\nlike the dew that early passes away.\nFor this reason I smote them through the prophets,\nI slew them by the words of my mouth;\nFor it is love that I desire, not sacrifice,\nand knowledge of God rather than burnt offerings.` },
    { label: "Responsorial Psalm", ref: "Psalm 51:3-4, 18-19, 20-21ab", isRefrain: true, text: `R. It is mercy I desire, and not sacrifice.\n\nHave mercy on me, O God, in your goodness;\nin the greatness of your compassion wipe out my offense.\nThoroughly wash me from my guilt\nand of my sin cleanse me.\n\nR. It is mercy I desire, and not sacrifice.\n\nFor you are not pleased with sacrifices;\nshould I offer a burnt offering, you would not accept it.\nMy sacrifice, O God, is a contrite spirit;\na heart contrite and humbled, O God, you will not spurn.\n\nR. It is mercy I desire, and not sacrifice.\n\nBe bountiful, O LORD, to Zion in your kindness\nby rebuilding the walls of Jerusalem;\nThen shall you be pleased with due sacrifices,\nburnt offerings and holocausts.\n\nR. It is mercy I desire, and not sacrifice.` },
    { label: "Gospel", ref: "Luke 18:9-14", dropCap: true, text: `Jesus addressed this parable\nto those who were convinced of their own righteousness\nand despised everyone else.\n"Two people went up to the temple area to pray;\none was a Pharisee and the other was a tax collector.\nThe Pharisee took up his position and spoke this prayer to himself,\n'O God, I thank you that I am not like the rest of humanity —\ngreedy, dishonest, adulterous — or even like this tax collector.\nI fast twice a week,\nand I pay tithes on my whole income.'\nBut the tax collector stood off at a distance\nand would not even raise his eyes to heaven\nbut beat his breast and prayed,\n'O God, be merciful to me a sinner.'\nI tell you, the latter went home justified, not the former;\nfor everyone who exalts himself will be humbled,\nand the one who humbles himself will be exalted."` }] },

  // ─── FOURTH WEEK OF LENT (existing full text) ───
  "2026-03-15": {
    feast: "Fourth Sunday of Lent", yearCycle: "Year A", color: "violet",
    feastInfo: { title: "Laetare Sunday", desc: "The Fourth Sunday of Lent is known as Laetare Sunday, from the Latin word meaning \"Rejoice.\" It marks the midpoint of Lent, offering a brief respite from the penitential season. Rose-colored vestments may replace violet, and the altar may bear flowers — signs of the joy that awaits at Easter." },
    readings: [
      { label: "First Reading", ref: "1 Samuel 16:1b, 6-7, 10-13a", dropCap: true,
        text: `The LORD said to Samuel:\n"Fill your horn with oil, and be on your way.\nI am sending you to Jesse of Bethlehem,\nfor I have chosen my king from among his sons."\n\nAs Jesse and his sons came to the sacrifice,\nSamuel looked at Eliab and thought,\n"Surely the LORD's anointed is here before him."\nBut the LORD said to Samuel:\n"Do not judge from his appearance or from his lofty stature,\nbecause I have rejected him.\nNot as man sees does God see,\nbecause man sees the appearance\nbut the LORD looks into the heart."\n\nIn the same way Jesse presented seven sons before Samuel,\nbut Samuel said to Jesse,\n"The LORD has not chosen any one of these."\nThen Samuel asked Jesse,\n"Are these all the sons you have?"\nJesse replied,\n"There is still the youngest, who is tending the sheep."\nSamuel said to Jesse,\n"Send for him;\nwe will not begin the sacrificial banquet until he arrives here."\n\nJesse sent and had the young man brought to them.\nHe was ruddy, a youth handsome to behold\nand making a splendid appearance.\nThe LORD said,\n"There\u2014anoint him, for this is the one!"\nThen Samuel, with the horn of oil in hand,\nanointed David in the presence of his brothers;\nand from that day on, the spirit of the LORD rushed upon David.` },
      { label: "Responsorial Psalm", ref: "Psalm 23:1-3a, 3b-4, 5, 6", isRefrain: true,
        text: `R. The Lord is my shepherd; there is nothing I shall want.\n\nThe LORD is my shepherd; I shall not want.\nIn verdant pastures he gives me repose;\nbeside restful waters he leads me;\nhe refreshes my soul.\n\nR. The Lord is my shepherd; there is nothing I shall want.\n\nHe guides me in right paths\nfor his name's sake.\nEven though I walk in the dark valley\nI fear no evil; for you are at my side.\nWith your rod and your staff\nthat give me courage.\n\nR. The Lord is my shepherd; there is nothing I shall want.\n\nYou spread the table before me\nin the sight of my foes;\nyou anoint my head with oil;\nmy cup overflows.\n\nR. The Lord is my shepherd; there is nothing I shall want.\n\nOnly goodness and kindness follow me\nall the days of my life;\nand I shall dwell in the house of the LORD\nfor years to come.\n\nR. The Lord is my shepherd; there is nothing I shall want.` },
      { label: "Second Reading", ref: "Ephesians 5:8-14", dropCap: true,
        text: `Brothers and sisters:\nYou were once darkness,\nbut now you are light in the Lord.\nLive as children of light,\nfor light produces every kind of goodness\nand righteousness and truth.\nTry to learn what is pleasing to the Lord.\nTake no part in the fruitless works of darkness;\nrather expose them, for it is shameful even to mention\nthe things done by them in secret;\nbut everything exposed by the light becomes visible,\nfor everything that becomes visible is light.\nTherefore, it says:\n"Awake, O sleeper,\nand arise from the dead,\nand Christ will give you light."` },
      { label: "Gospel", ref: "John 9:1-41", dropCap: true,
        text: `As Jesus passed by he saw a man blind from birth.\nHis disciples asked him,\n"Rabbi, who sinned, this man or his parents,\nthat he was born blind?"\nJesus answered,\n"Neither he nor his parents sinned;\nit is so that the works of God might be made visible through him.\nWe have to do the works of the one who sent me while it is day.\nNight is coming when no one can work.\nWhile I am in the world, I am the light of the world."\nWhen he had said this, he spat on the ground\nand made clay with the saliva,\nand smeared the clay on his eyes,\nand said to him,\n"Go wash in the Pool of Siloam" \u2014which means Sent\u2014.\nSo he went and washed, and came back able to see.\n\nHis neighbors and those who had seen him earlier as a beggar said,\n"Isn't this the one who used to sit and beg?"\nSome said, "It is,"\nbut others said, "No, he just looks like him."\nHe said, "I am."\nSo they said to him, "How were your eyes opened?"\nHe replied,\n"The man called Jesus made clay and anointed my eyes\nand told me, 'Go to Siloam and wash.'\nSo I went there and washed and was able to see."\nAnd they said to him, "Where is he?"\nHe said, "I don't know."\n\nThey brought the one who was once blind to the Pharisees.\nNow Jesus had made clay and opened his eyes on a sabbath.\nSo then the Pharisees also asked him how he was able to see.\nHe said to them,\n"He put clay on my eyes, and I washed, and now I can see."\nSo some of the Pharisees said,\n"This man is not from God,\nbecause he does not keep the sabbath."\nBut others said,\n"How can a sinful man do such signs?"\nAnd there was a division among them.\nSo they said to the blind man again,\n"What do you have to say about him,\nsince he opened your eyes?"\nHe said, "He is a prophet."\n\nNow the Jews did not believe\nthat he had been blind and gained his sight\nuntil they summoned the parents of the one who had gained his sight.\nThey asked them,\n"Is this your son, who you say was born blind?\nHow does he now see?"\nHis parents answered and said,\n"We know that this is our son and that he was born blind.\nWe do not know how he sees now,\nnor do we know who opened his eyes.\nAsk him, he is of age;\nhe can speak for himself."\nHis parents said this because they were afraid\nof the Jews, for the Jews had already agreed\nthat if anyone acknowledged him as the Christ,\nhe would be expelled from the synagogue.\nFor this reason his parents said,\n"He is of age; question him."\n\nSo a second time they called the man who had been blind\nand said to him, "Give God the praise!\nWe know that this man is a sinner."\nHe replied,\n"If he is a sinner, I do not know.\nOne thing I do know is that I was blind and now I see."\nSo they said to him,\n"What did he do to you?\nHow did he open your eyes?"\nHe answered them,\n"I told you already and you did not listen.\nWhy do you want to hear it again?\nDo you want to become his disciples, too?"\nThey ridiculed him and said,\n"You are that man's disciple;\nwe are disciples of Moses!\nWe know that God spoke to Moses,\nbut we do not know where this one is from."\nThe man answered and said to them,\n"This is what is so amazing,\nthat you do not know where he is from, yet he opened my eyes.\nWe know that God does not listen to sinners,\nbut if one is devout and does his will, he listens to him.\nIt is unheard of that anyone ever opened the eyes of a person born blind.\nIf this man were not from God,\nhe would not be able to do anything."\nThey answered and said to him,\n"You were born totally in sin,\nand are you trying to teach us?"\nThen they threw him out.\n\nWhen Jesus heard that they had thrown him out,\nhe found him and said, "Do you believe in the Son of Man?"\nHe answered and said,\n"Who is he, sir, that I may believe in him?"\nJesus said to him,\n"You have seen him,\nthe one speaking with you is he."\nHe said,\n"I do believe, Lord," and he worshiped him.\nThen Jesus said,\n"I came into this world for judgment,\nso that those who do not see might see,\nand those who do see might become blind."\n\nSome of the Pharisees who were with him heard this\nand said to him, "Surely we are not also blind, are we?"\nJesus said to them,\n"If you were blind, you would have no sin;\nbut now you are saying, 'We see,' so your sin remains."` }
    ]
  },
  "2026-03-16": { feast: "Monday of the Fourth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Isaiah 65:17-21", dropCap: true,
      text: `Thus says the LORD:\nLo, I am about to create new heavens\nand a new earth;\nThe things of the past shall not be remembered\nor come to mind.\nInstead, there shall always be rejoicing and happiness\nin what I create;\nFor I create Jerusalem to be a joy\nand its people to be a delight;\nI will rejoice in Jerusalem\nand exult in my people.\nNo longer shall the sound of weeping be heard there,\nor the sound of crying;\nNo longer shall there be in it\nan infant who lives but a few days,\nor an old man who does not round out his full lifetime;\nHe dies a mere youth who reaches but a hundred years,\nand he who fails of a hundred shall be thought accursed.\nThey shall live in the houses they build,\nand eat the fruit of the vineyards they plant.` },
    { label: "Responsorial Psalm", ref: "Psalm 30:2, 4, 5-6, 11-12a, 13b", isRefrain: true,
      text: `R. I will praise you, Lord, for you have rescued me.\n\nI will extol you, O LORD, for you drew me clear\nand did not let my enemies rejoice over me.\nO LORD, you brought me up from the nether world;\nyou preserved me from among those going down into the pit.\n\nR. I will praise you, Lord, for you have rescued me.\n\nSing praise to the LORD, you his faithful ones,\nand give thanks to his holy name.\nFor his anger lasts but a moment;\na lifetime, his good will.\nAt nightfall, weeping enters in,\nbut with the dawn, rejoicing.\n\nR. I will praise you, Lord, for you have rescued me.\n\n"Hear, O LORD, and have pity on me;\nO LORD, be my helper."\nYou changed my mourning into dancing;\nO LORD, my God, forever will I give you thanks.\n\nR. I will praise you, Lord, for you have rescued me.` },
    { label: "Gospel", ref: "John 4:43-54", dropCap: true,
      text: `At that time Jesus left Samaria for Galilee.\nFor Jesus himself testified\nthat a prophet has no honor in his native place.\nWhen he came into Galilee, the Galileans welcomed him,\nsince they had seen all he had done in Jerusalem at the feast;\nfor they themselves had gone to the feast.\n\nThen he returned to Cana in Galilee,\nwhere he had made the water wine.\nNow there was a royal official whose son was ill in Capernaum.\nWhen he heard that Jesus had arrived in Galilee from Judea,\nhe went to him and asked him to come down\nand heal his son, who was near death.\nJesus said to him,\n"Unless you people see signs and wonders, you will not believe."\nThe royal official said to him,\n"Sir, come down before my child dies."\nJesus said to him, "You may go; your son will live."\nThe man believed what Jesus said to him and left.\nWhile the man was on his way back,\nhis slaves met him and told him that his boy would live.\nHe asked them when he began to recover.\nThey told him,\n"The fever left him yesterday, about one in the afternoon."\nThe father realized that just at that time Jesus had said to him,\n"Your son will live,"\nand he and his whole household came to believe.\nNow this was the second sign Jesus did\nwhen he came to Galilee from Judea.` }] },
  "2026-03-17": { feast: "Tuesday of the Fourth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Ezekiel 47:1-9, 12", dropCap: true, text: `The angel brought me, Ezekiel,\nback to the entrance of the temple of the LORD,\nand I saw water flowing out\nfrom beneath the threshold of the temple toward the east,\nfor the façade of the temple was toward the east;\nthe water flowed down from the right side of the temple,\nsouth of the altar.\nHe led me outside by the north gate,\nand around to the outer gate facing the east,\nwhere I saw water trickling from the right side.\nThen when he had walked off to the east\nwith a measuring cord in his hand,\nhe measured off a thousand cubits\nand had me wade through the water,\nwhich was ankle-deep.\nHe measured off another thousand\nand once more had me wade through the water,\nwhich was now knee-deep.\nAgain he measured off a thousand and had me wade;\nthe water was up to my waist.\nOnce more he measured off a thousand,\nbut there was now a river through which I could not wade;\nfor the water had risen so high it had become a river\nthat could not be crossed except by swimming.\nHe asked me, "Have you seen this, son of man?"\nThen he brought me to the bank of the river, where he had me sit.\nAlong the bank of the river I saw very many trees on both sides.\nHe said to me,\n"This water flows into the eastern district down upon the Arabah,\nand empties into the sea, the salt waters, which it makes fresh.\nWherever the river flows,\nevery sort of living creature that can multiply shall live,\nand there shall be abundant fish,\nfor wherever this water comes the sea shall be made fresh.\nAlong both banks of the river, fruit trees of every kind shall grow;\ntheir leaves shall not fade, nor their fruit fail.\nEvery month they shall bear fresh fruit,\nfor they shall be watered by the flow from the sanctuary.\nTheir fruit shall serve for food, and their leaves for medicine."` },
    { label: "Responsorial Psalm", ref: "Psalm 46:2-3, 5-6, 8-9", isRefrain: true, text: `R. The Lord of hosts is with us; our stronghold is the God of Jacob.\nGod is our refuge and our strength,\nan ever-present help in distress.\nTherefore we fear not, though the earth be shaken\nand mountains plunge into the depths of the sea.\nR. The Lord of hosts is with us; our stronghold is the God of Jacob.\nThere is a stream whose runlets gladden the city of God,\nthe holy dwelling of the Most High.\nGod is in its midst; it shall not be disturbed;\nGod will help it at the break of dawn.\nR. The Lord of hosts is with us; our stronghold is the God of Jacob.\nThe LORD of hosts is with us;\nour stronghold is the God of Jacob.\nCome! behold the deeds of the LORD,\nthe astounding things he has wrought on earth.\nR. The Lord of hosts is with us; our stronghold is the God of Jacob.` },
    { label: "Gospel", ref: "John 5:1-16", dropCap: true, text: `There was a feast of the Jews, and Jesus went up to Jerusalem.\nNow there is in Jerusalem at the Sheep Gate\na pool called in Hebrew Bethesda, with five porticoes.\nIn these lay a large number of ill, blind, lame, and crippled.\nOne man was there who had been ill for thirty-eight years.\nWhen Jesus saw him lying there\nand knew that he had been ill for a long time, he said to him,\n"Do you want to be well?"\nThe sick man answered him,\n"Sir, I have no one to put me into the pool\nwhen the water is stirred up;\nwhile I am on my way, someone else gets down there before me."\nJesus said to him, "Rise, take up your mat, and walk."\nImmediately the man became well, took up his mat, and walked.\n\nNow that day was a sabbath.\nSo the Jews said to the man who was cured,\n"It is the sabbath, and it is not lawful for you to carry your mat."\nHe answered them, "The man who made me well told me,\n'Take up your mat and walk.'"\nThey asked him,\n"Who is the man who told you, 'Take it up and walk'?"\nThe man who was healed did not know who it was,\nfor Jesus had slipped away, since there was a crowd there.\nAfter this Jesus found him in the temple area and said to him,\n"Look, you are well; do not sin any more,\nso that nothing worse may happen to you."\nThe man went and told the Jews\nthat Jesus was the one who had made him well.\nTherefore, the Jews began to persecute Jesus\nbecause he did this on a sabbath.` }] },
  "2026-03-18": { feast: "Wednesday of the Fourth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Isaiah 49:8-15", dropCap: true, text: `Thus says the LORD:\nIn a time of favor I answer you,\non the day of salvation I help you;\nand I have kept you and given you as a covenant to the people,\nTo restore the land\nand allot the desolate heritages,\nSaying to the prisoners: Come out!\nTo those in darkness: Show yourselves!\nAlong the ways they shall find pasture,\non every bare height shall their pastures be.\nThey shall not hunger or thirst,\nnor shall the scorching wind or the sun strike them;\nFor he who pities them leads them\nand guides them beside springs of water.\nI will cut a road through all my mountains,\nand make my highways level.\nSee, some shall come from afar,\nothers from the north and the west,\nand some from the land of Syene.\nSing out, O heavens, and rejoice, O earth,\nbreak forth into song, you mountains.\nFor the LORD comforts his people\nand shows mercy to his afflicted.\n\nBut Zion said, "The LORD has forsaken me;\nmy Lord has forgotten me."\nCan a mother forget her infant,\nbe without tenderness for the child of her womb?\nEven should she forget,\nI will never forget you.` },
    { label: "Responsorial Psalm", ref: "Psalm 145:8-9, 13cd-14, 17-18", isRefrain: true, text: `R. The Lord is gracious and merciful.\nThe LORD is gracious and merciful,\nslow to anger and of great kindness.\nThe LORD is good to all\nand compassionate toward all his works.\nR. The Lord is gracious and merciful.\nThe LORD is faithful in all his words\nand holy in all his works.\nThe LORD lifts up all who are falling\nand raises up all who are bowed down.\nR. The Lord is gracious and merciful.\nThe LORD is just in all his ways\nand holy in all his works.\nThe LORD is near to all who call upon him,\nto all who call upon him in truth.\nR. The Lord is gracious and merciful.` },
    { label: "Gospel", ref: "John 5:17-30", dropCap: true, text: `Jesus answered the Jews:\n"My Father is at work until now, so I am at work."\nFor this reason they tried all the more to kill him,\nbecause he not only broke the sabbath\nbut he also called God his own father, making himself equal to God.\n\nJesus answered and said to them,\n"Amen, amen, I say to you, the Son cannot do anything on his own,\nbut only what he sees the Father doing;\nfor what he does, the Son will do also.\nFor the Father loves the Son\nand shows him everything that he himself does,\nand he will show him greater works than these,\nso that you may be amazed.\nFor just as the Father raises the dead and gives life,\nso also does the Son give life to whomever he wishes.\nNor does the Father judge anyone,\nbut he has given all judgment to the Son,\nso that all may honor the Son just as they honor the Father.\nWhoever does not honor the Son\ndoes not honor the Father who sent him.\nAmen, amen, I say to you, whoever hears my word\nand believes in the one who sent me\nhas eternal life and will not come to condemnation,\nbut has passed from death to life.\nAmen, amen, I say to you, the hour is coming and is now here\nwhen the dead will hear the voice of the Son of God,\nand those who hear will live.\nFor just as the Father has life in himself,\nso also he gave to the Son the possession of life in himself.\nAnd he gave him power to exercise judgment,\nbecause he is the Son of Man.\nDo not be amazed at this,\nbecause the hour is coming in which all who are in the tombs\nwill hear his voice and will come out,\nthose who have done good deeds\nto the resurrection of life,\nbut those who have done wicked deeds\nto the resurrection of condemnation.\n\n"I cannot do anything on my own;\nI judge as I hear, and my judgment is just,\nbecause I do not seek my own will\nbut the will of the one who sent me."` }] },
  "2026-03-19": {
    feast: "Solemnity of Saint Joseph", color: "white",
    feastInfo: { title: "Saint Joseph, Spouse of the Blessed Virgin Mary", desc: "March 19 is the Solemnity of Saint Joseph, patron of the Universal Church, of workers, fathers, and a happy death. A humble carpenter from Nazareth, Joseph was chosen by God to be the foster father of Jesus and the faithful spouse of Mary. Though Scripture records none of his words, his obedience speaks volumes. His feast interrupts Lent with white vestments and the Gloria." },
    readings: [
    { label: "First Reading", ref: "2 Samuel 7:4-5a, 12-14a, 16", dropCap: true, text: `The LORD spoke to Nathan and said:\n"Go, tell my servant David,\n'When your time comes and you rest with your ancestors,\nI will raise up your heir after you, sprung from your loins,\nand I will make his kingdom firm.\nIt is he who shall build a house for my name.\nAnd I will make his royal throne firm forever.\nI will be a father to him,\nand he shall be a son to me.\nYour house and your kingdom shall endure forever before me;\nyour throne shall stand firm forever.'"` },
    { label: "Responsorial Psalm", ref: "Psalm 89:2-3, 4-5, 27, 29", isRefrain: true, text: `R. The son of David will live for ever.\nThe promises of the LORD I will sing forever;\nthrough all generations my mouth shall proclaim your faithfulness,\nFor you have said, "My kindness is established forever";\nin heaven you have confirmed your faithfulness.\nR. The son of David will live for ever.\n"I have made a covenant with my chosen one,\nI have sworn to David my servant:\nForever will I confirm your posterity\nand establish your throne for all generations."\nR. The son of David will live for ever.\n"He shall say of me, 'You are my father,\nmy God, the Rock, my savior.'\nForever I will maintain my kindness toward him,\nand my covenant with him stands firm."\nR. The son of David will live for ever.` },
    { label: "Second Reading", ref: "Romans 4:13, 16-18, 22", dropCap: true, text: `Brothers and sisters:\nIt was not through the law\nthat the promise was made to Abraham and his descendants\nthat he would inherit the world,\nbut through the righteousness that comes from faith.\nFor this reason, it depends on faith,\nso that it may be a gift,\nand the promise may be guaranteed to all his descendants,\nnot to those who only adhere to the law\nbut to those who follow the faith of Abraham,\nwho is the father of all of us, as it is written,\nI have made you father of many nations.\nHe is our father in the sight of God,\nin whom he believed, who gives life to the dead\nand calls into being what does not exist.\nHe believed, hoping against hope,\nthat he would become the father of many nations,\naccording to what was said, Thus shall your descendants be.\nThat is why it was credited to him as righteousness.` },
    { label: "Gospel", ref: "Matthew 1:16, 18-21, 24a", dropCap: true, text: `Jacob was the father of Joseph, the husband of Mary.\nOf her was born Jesus who is called the Christ.\n\nNow this is how the birth of Jesus Christ came about.\nWhen his mother Mary was betrothed to Joseph,\nbut before they lived together,\nshe was found with child through the Holy Spirit.\nJoseph her husband, since he was a righteous man,\nyet unwilling to expose her to shame,\ndecided to divorce her quietly.\nSuch was his intention when, behold,\nthe angel of the Lord appeared to him in a dream and said,\n"Joseph, son of David,\ndo not be afraid to take Mary your wife into your home.\nFor it is through the Holy Spirit\nthat this child has been conceived in her.\nShe will bear a son and you are to name him Jesus,\nbecause he will save his people from their sins."\nWhen Joseph awoke,\nhe did as the angel of the Lord had commanded him\nand took his wife into his home.` }] },
  "2026-03-20": { feast: "Friday of the Fourth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Wisdom 2:1a, 12-22", dropCap: true, text: `The wicked said among themselves,\nthinking not aright:\n"Let us beset the just one, because he is obnoxious to us;\nhe sets himself against our doings,\nReproaches us for transgressions of the law\nand charges us with violations of our training.\nHe professes to have knowledge of God\nand styles himself a child of the LORD.\nTo us he is the censure of our thoughts;\nmerely to see him is a hardship for us,\nBecause his life is not like that of others,\nand different are his ways.\nHe judges us debased;\nhe holds aloof from our paths as from things impure.\nHe calls blest the destiny of the just\nand boasts that God is his Father.\nLet us see whether his words be true;\nlet us find out what will happen to him.\nFor if the just one be the son of God, he will defend him\nand deliver him from the hand of his foes.\nWith revilement and torture let us put him to the test\nthat we may have proof of his gentleness\nand try his patience.\nLet us condemn him to a shameful death;\nfor according to his own words, God will take care of him."\nThese were their thoughts, but they erred;\nfor their wickedness blinded them,\nand they knew not the hidden counsels of God;\nneither did they count on a recompense of holiness\nnor discern the innocent souls' reward.` },
    { label: "Responsorial Psalm", ref: "Psalm 34:17-18, 19-20, 21, 23", isRefrain: true, text: `R. The Lord is close to the brokenhearted.\nThe LORD confronts the evildoers,\nto destroy remembrance of them from the earth.\nWhen the just cry out, the LORD hears them,\nand from all their distress he rescues them.\nR. The Lord is close to the brokenhearted.\nThe LORD is close to the brokenhearted;\nand those who are crushed in spirit he saves.\nMany are the troubles of the just man,\nbut out of them all the LORD delivers him.\nR. The Lord is close to the brokenhearted.\nHe watches over all his bones;\nnot one of them shall be broken.\nThe LORD redeems the lives of his servants;\nno one incurs guilt who takes refuge in him.\nR. The Lord is close to the brokenhearted.` },
    { label: "Gospel", ref: "John 7:1-2, 10, 25-30", dropCap: true, text: `Jesus moved about within Galilee;\nhe did not wish to travel in Judea,\nbecause the Jews were trying to kill him.\nBut the Jewish feast of Tabernacles was near.\n\nBut when his brothers had gone up to the feast,\nhe himself also went up, not openly but as it were in secret.\n\nSome of the inhabitants of Jerusalem said,\n"Is he not the one they are trying to kill?\nAnd look, he is speaking openly and they say nothing to him.\nCould the authorities have realized that he is the Christ?\nBut we know where he is from.\nWhen the Christ comes, no one will know where he is from."\nSo Jesus cried out in the temple area as he was teaching and said,\n"You know me and also know where I am from.\nYet I did not come on my own,\nbut the one who sent me, whom you do not know, is true.\nI know him, because I am from him, and he sent me."\nSo they tried to arrest him,\nbut no one laid a hand upon him,\nbecause his hour had not yet come.` }] },
  "2026-03-21": { feast: "Saturday of the Fourth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Jeremiah 11:18-20", dropCap: true, text: `I knew their plot because the LORD informed me;\nat that time you, O LORD, showed me their doings.\n\nYet I, like a trusting lamb led to slaughter,\nhad not realized that they were hatching plots against me:\n"Let us destroy the tree in its vigor;\nlet us cut him off from the land of the living,\nso that his name will be spoken no more."\n\nBut, you, O LORD of hosts, O just Judge,\nsearcher of mind and heart,\nLet me witness the vengeance you take on them,\nfor to you I have entrusted my cause!` },
    { label: "Responsorial Psalm", ref: "Psalm 7:2-3, 9bc-10, 11-12", isRefrain: true, text: `R. O Lord, my God, in you I take refuge.\nO LORD, my God, in you I take refuge;\nsave me from all my pursuers and rescue me,\nLest I become like the lion's prey,\nto be torn to pieces, with no one to rescue me.\nR. O Lord, my God, in you I take refuge.\nDo me justice, O LORD, because I am just,\nand because of the innocence that is mine.\nLet the malice of the wicked come to an end,\nbut sustain the just,\nO searcher of heart and soul, O just God.\nR. O Lord, my God, in you I take refuge.\nA shield before me is God,\nwho saves the upright of heart;\nA just judge is God,\na God who punishes day by day.\nR. O Lord, my God, in you I take refuge.` },
    { label: "Gospel", ref: "John 7:40-53", dropCap: true, text: `Some in the crowd who heard these words of Jesus said,\n"This is truly the Prophet."\nOthers said, "This is the Christ."\nBut others said, "The Christ will not come from Galilee, will he?\nDoes not Scripture say that the Christ will be of David's family\nand come from Bethlehem, the village where David lived?"\nSo a division occurred in the crowd because of him.\nSome of them even wanted to arrest him,\nbut no one laid hands on him.\n\nSo the guards went to the chief priests and Pharisees,\nwho asked them, "Why did you not bring him?"\nThe guards answered, "Never before has anyone spoken like this man."\nSo the Pharisees answered them, "Have you also been deceived?\nHave any of the authorities or the Pharisees believed in him?\nBut this crowd, which does not know the law, is accursed."\nNicodemus, one of their members who had come to him earlier, said to them,\n"Does our law condemn a man before it first hears him\nand finds out what he is doing?"\nThey answered and said to him,\n"You are not from Galilee also, are you?\nLook and see that no prophet arises from Galilee."\n\nThen each went to his own house.` }] },

  // ─── FIFTH WEEK OF LENT ───
  "2026-03-22": { feast: "Fifth Sunday of Lent", yearCycle: "Year A", color: "violet",
    feastInfo: { title: "Fifth Sunday of Lent", desc: "The Church nears Holy Week. Crucifixes in many parishes are veiled in violet cloth \u2014 an ancient practice called Passiontide. Today\u2019s readings build to a crescendo: Ezekiel\u2019s vision of opened graves, Paul\u2019s promise that the Spirit gives life to mortal bodies, and the raising of Lazarus \u2014 the final sign before Jesus enters Jerusalem." },
    readings: [
    { label: "First Reading", ref: "Ezekiel 37:12-14", dropCap: true, text: `Thus says the Lord GOD:\nO my people, I will open your graves\nand have you rise from them,\nand bring you back to the land of Israel.\nThen you shall know that I am the LORD,\nwhen I open your graves and have you rise from them,\nO my people!\nI will put my spirit in you that you may live,\nand I will settle you upon your land;\nthus you shall know that I am the LORD.\nI have promised, and I will do it, says the LORD.` },
    { label: "Responsorial Psalm", ref: "Psalm 130:1-2, 3-4, 5-6, 7-8", isRefrain: true, text: `R. With the Lord there is mercy and fullness of redemption.\nOut of the depths I cry to you, O LORD;\nLORD, hear my voice!\nLet your ears be attentive\nto my voice in supplication.\nR. With the Lord there is mercy and fullness of redemption.\nIf you, O LORD, mark iniquities,\nLORD, who can stand?\nBut with you is forgiveness,\nthat you may be revered.\nR. With the Lord there is mercy and fullness of redemption.\nI trust in the LORD;\nmy soul trusts in his word.\nMore than sentinels wait for the dawn,\nlet Israel wait for the LORD.\nR. With the Lord there is mercy and fullness of redemption.\nFor with the LORD is kindness\nand with him is plenteous redemption;\nAnd he will redeem Israel\nfrom all their iniquities.\nR. With the Lord there is mercy and fullness of redemption.` },
    { label: "Second Reading", ref: "Romans 8:8-11", dropCap: true, text: `Brothers and sisters:\nThose who are in the flesh cannot please God.\nBut you are not in the flesh;\non the contrary, you are in the spirit,\nif only the Spirit of God dwells in you.\nWhoever does not have the Spirit of Christ does not belong to him.\nBut if Christ is in you,\nalthough the body is dead because of sin,\nthe spirit is alive because of righteousness.\nIf the Spirit of the one who raised Jesus from the dead dwells in you,\nthe one who raised Christ from the dead\nwill give life to your mortal bodies also,\nthrough his Spirit dwelling in you.` },
    { label: "Gospel", ref: "John 11:3-7, 17, 20-27, 33b-45", dropCap: true, text: `The sisters of Lazarus sent word to Jesus, saying,\n"Master, the one you love is ill."\nWhen Jesus heard this he said,\n"This illness is not to end in death,\nbut is for the glory of God,\nthat the Son of God may be glorified through it."\nNow Jesus loved Martha and her sister and Lazarus.\nSo when he heard that he was ill,\nhe remained for two days in the place where he was.\nThen after this he said to his disciples,\n"Let us go back to Judea."\n\nWhen Jesus arrived, he found that Lazarus\nhad already been in the tomb for four days.\nWhen Martha heard that Jesus was coming,\nshe went to meet him;\nbut Mary sat at home.\nMartha said to Jesus,\n"Lord, if you had been here,\nmy brother would not have died.\nBut even now I know that whatever you ask of God,\nGod will give you."\nJesus said to her,\n"Your brother will rise."\nMartha said,\n"I know he will rise,\nin the resurrection on the last day."\nJesus told her,\n"I am the resurrection and the life;\nwhoever believes in me, even if he dies, will live,\nand everyone who lives and believes in me will never die.\nDo you believe this?"\nShe said to him, "Yes, Lord.\nI have come to believe that you are the Christ, the Son of God,\nthe one who is coming into the world."\n\nHe became perturbed and deeply troubled, and said,\n"Where have you laid him?"\nThey said to him, "Sir, come and see."\nAnd Jesus wept.\nSo the Jews said, "See how he loved him."\nBut some of them said,\n"Could not the one who opened the eyes of the blind man\nhave done something so that this man would not have died?"\n\nSo Jesus, perturbed again, came to the tomb.\nIt was a cave, and a stone lay across it.\nJesus said, "Take away the stone."\nMartha, the dead man's sister, said to him,\n"Lord, by now there will be a stench;\nhe has been dead for four days."\nJesus said to her,\n"Did I not tell you that if you believe\nyou will see the glory of God?"\nSo they took away the stone.\nAnd Jesus raised his eyes and said,\n"Father, I thank you for hearing me.\nI know that you always hear me;\nbut because of the crowd here I have said this,\nthat they may believe that you sent me."\nAnd when he had said this,\nHe cried out in a loud voice,\n"Lazarus, come out!"\nThe dead man came out,\ntied hand and foot with burial bands,\nand his face was wrapped in a cloth.\nSo Jesus said to them,\n"Untie him and let him go."\n\nNow many of the Jews who had come to Mary\nand seen what he had done began to believe in him.` }] },
  "2026-03-23": { feast: "Monday of the Fifth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Daniel 13:41c-62", dropCap: true, text: `The assembly condemned Susanna to death.\n\nBut Susanna cried aloud:\n"O eternal God, you know what is hidden\nand are aware of all things before they come to be:\nyou know that they have testified falsely against me.\nHere I am about to die,\nthough I have done none of the things\nwith which these wicked men have charged me."\n\nThe Lord heard her prayer.\nAs she was being led to execution,\nGod stirred up the holy spirit of a young boy named Daniel,\nand he cried aloud:\n"I will have no part in the death of this woman."\nAll the people turned and asked him,\n"What is this you are saying?"\nHe stood in their midst and continued,\n"Are you such fools, O children of Israel!\nTo condemn a woman of Israel without examination\nand without clear evidence?\nReturn to court, for they have testified falsely against her."\n\nThen all the people returned in haste.\nTo Daniel the elders said,\n"Come, sit with us and inform us,\nsince God has given you the prestige of old age."\nBut he replied,\n"Separate these two far from each other that I may examine them."\n\nAfter they were separated one from the other,\nhe called one of them and said:\n"How you have grown evil with age!\nNow have your past sins come to term:\npassing unjust sentences, condemning the innocent,\nand freeing the guilty, although the Lord says,\n'The innocent and the just you shall not put to death.'\nNow, then, if you were a witness,\ntell me under what tree you saw them together."\n"Under a mastic tree," he answered.\nDaniel replied, "Your fine lie has cost you your head,\nfor the angel of God shall receive the sentence from him\nand split you in two."\nPutting him to one side, he ordered the other one to be brought.\nDaniel said to him, "Offspring of Canaan, not of Judah,\nbeauty has seduced you, lust has subverted your conscience.\nThis is how you acted with the daughters of Israel,\nand in their fear they yielded to you;\nbut a daughter of Judah did not tolerate your wickedness.\nNow, then, tell me under what tree you surprised them together."\n"Under an oak," he said.\nDaniel replied, "Your fine lie has cost you also your head,\nfor the angel of God waits with a sword to cut you in two\nso as to make an end of you both."\n\nThe whole assembly cried aloud,\nblessing God who saves those who hope in him.\nThey rose up against the two elders,\nfor by their own words Daniel had convicted them of perjury.\nAccording to the law of Moses,\nthey inflicted on them\nthe penalty they had plotted to impose on their neighbor:\nthey put them to death.\nThus was innocent blood spared that day.` },
    { label: "Responsorial Psalm", ref: "Psalm 23:1-3a, 3b-4, 5, 6", isRefrain: true, text: `R. Even though I walk in the dark valley I fear no evil; for you are at my side.\nThe LORD is my shepherd; I shall not want.\nIn verdant pastures he gives me repose;\nBeside restful waters he leads me;\nhe refreshes my soul.\nR. Even though I walk in the dark valley I fear no evil; for you are at my side.\nHe guides me in right paths\nfor his name's sake.\nEven though I walk in the dark valley\nI fear no evil; for you are at my side\nWith your rod and your staff\nthat give me courage.\nR. Even though I walk in the dark valley I fear no evil; for you are at my side.\nYou spread the table before me\nin the sight of my foes;\nYou anoint my head with oil;\nmy cup overflows.\nR. Even though I walk in the dark valley I fear no evil; for you are at my side.\nOnly goodness and kindness follow me\nall the days of my life;\nAnd I shall dwell in the house of the LORD\nfor years to come.\nR. Even though I walk in the dark valley I fear no evil; for you are at my side.` },
    { label: "Gospel", ref: "John 8:1-11", dropCap: true, text: `Jesus went to the Mount of Olives.\nBut early in the morning he arrived again in the temple area,\nand all the people started coming to him,\nand he sat down and taught them.\nThen the scribes and the Pharisees brought a woman\nwho had been caught in adultery\nand made her stand in the middle.\nThey said to him,\n"Teacher, this woman was caught\nin the very act of committing adultery.\nNow in the law, Moses commanded us to stone such women.\nSo what do you say?"\nThey said this to test him,\nso that they could have some charge to bring against him.\nJesus bent down and began to write on the ground with his finger.\nBut when they continued asking him,\nhe straightened up and said to them,\n"Let the one among you who is without sin\nbe the first to throw a stone at her."\nAgain he bent down and wrote on the ground.\nAnd in response, they went away one by one,\nbeginning with the elders.\nSo he was left alone with the woman before him.\nThen Jesus straightened up and said to her,\n"Woman, where are they?\nHas no one condemned you?"\nShe replied, "No one, sir."\nThen Jesus said, "Neither do I condemn you.\nGo, and from now on do not sin any more."` }] },
  "2026-03-24": { feast: "Tuesday of the Fifth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Numbers 21:4-9", dropCap: true, text: `From Mount Hor the children of Israel set out on the Red Sea road,\nto bypass the land of Edom.\nBut with their patience worn out by the journey,\nthe people complained against God and Moses,\n"Why have you brought us up from Egypt to die in this desert,\nwhere there is no food or water?\nWe are disgusted with this wretched food!"\n\nIn punishment the LORD sent among the people saraph serpents,\nwhich bit the people so that many of them died.\nThen the people came to Moses and said,\n"We have sinned in complaining against the LORD and you.\nPray the LORD to take the serpents away from us."\nSo Moses prayed for the people, and the LORD said to Moses,\n"Make a saraph and mount it on a pole,\nand whoever looks at it after being bitten will live."\nMoses accordingly made a bronze serpent and mounted it on a pole,\nand whenever anyone who had been bitten by a serpent\nlooked at the bronze serpent, he lived.` },
    { label: "Responsorial Psalm", ref: "Psalm 102:2-3, 16-18, 19-21", isRefrain: true, text: `R. O Lord, hear my prayer, and let my cry come to you.\nO LORD, hear my prayer,\nand let my cry come to you.\nHide not your face from me\nin the day of my distress.\nIncline your ear to me;\nin the day when I call, answer me speedily.\nR. O Lord, hear my prayer, and let my cry come to you.\nThe nations shall revere your name, O LORD,\nand all the kings of the earth your glory,\nWhen the LORD has rebuilt Zion\nand appeared in his glory;\nWhen he has regarded the prayer of the destitute,\nand not despised their prayer.\nR. O Lord, hear my prayer, and let my cry come to you.\nLet this be written for the generation to come,\nand let his future creatures praise the LORD:\n"The LORD looked down from his holy height,\nfrom heaven he beheld the earth,\nTo hear the groaning of the prisoners,\nto release those doomed to die."\nR. O Lord, hear my prayer, and let my cry come to you.` },
    { label: "Gospel", ref: "John 8:21-30", dropCap: true, text: `Jesus said to the Pharisees:\n"I am going away and you will look for me,\nbut you will die in your sin.\nWhere I am going you cannot come."\nSo the Jews said,\n"He is not going to kill himself, is he,\nbecause he said, 'Where I am going you cannot come'?"\nHe said to them, "You belong to what is below,\nI belong to what is above.\nYou belong to this world,\nbut I do not belong to this world.\nThat is why I told you that you will die in your sins.\nFor if you do not believe that I AM,\nyou will die in your sins."\nSo they said to him, "Who are you?"\nJesus said to them, "What I told you from the beginning.\nI have much to say about you in condemnation.\nBut the one who sent me is true,\nand what I heard from him I tell the world."\nThey did not realize that he was speaking to them of the Father.\nSo Jesus said to them,\n"When you lift up the Son of Man,\nthen you will realize that I AM,\nand that I do nothing on my own,\nbut I say only what the Father taught me.\nThe one who sent me is with me.\nHe has not left me alone,\nbecause I always do what is pleasing to him."\nBecause he spoke this way, many came to believe in him.` }] },
  "2026-03-25": { feast: "The Annunciation of the Lord", color: "white",
    feastInfo: { title: "The Annunciation of the Lord", desc: "Nine months before Christmas, the Church celebrates the angel Gabriel's visit to Mary at Nazareth. Her \"yes\" \u2014 \"Let it be done to me according to your word\" \u2014 marks the moment of the Incarnation, when the Word became flesh. White vestments replace violet; the Creed is said with a genuflection at the words \"and by the Holy Spirit was incarnate.\"" },
    readings: [
    { label: "First Reading", ref: "Isaiah 7:10-14; 8:10", dropCap: true, text: `The LORD spoke to Ahaz, saying:\nAsk for a sign from the LORD, your God;\nlet it be deep as the nether world, or high as the sky!\nBut Ahaz answered,\n"I will not ask! I will not tempt the LORD!"\nThen Isaiah said:\nListen, O house of David!\nIs it not enough for you to weary people,\nmust you also weary my God?\nTherefore the Lord himself will give you this sign:\nthe virgin shall be with child, and bear a son,\nand shall name him Emmanuel,\nwhich means "God is with us!"` },
    { label: "Responsorial Psalm", ref: "Psalm 40:7-8a, 8b-9, 10, 11", isRefrain: true, text: `R. Here I am, Lord; I come to do your will.\nSacrifice or oblation you wished not,\nbut ears open to obedience you gave me.\nHolocausts or sin-offerings you sought not;\nthen said I, "Behold I come."\nR. Here I am, Lord; I come to do your will.\n"In the written scroll it is prescribed for me,\nTo do your will, O my God, is my delight,\nand your law is within my heart!"\nR. Here I am, Lord; I come to do your will.\nI announced your justice in the vast assembly;\nI did not restrain my lips, as you, O LORD, know.\nR. Here I am, Lord; I come to do your will.\nYour justice I kept not hid within my heart;\nyour faithfulness and your salvation I have spoken of;\nI have made no secret of your kindness and your truth\nin the vast assembly.\nR. Here I am, Lord; I come to do your will.` },
    { label: "Second Reading", ref: "Hebrews 10:4-10", dropCap: true, text: `Brothers and sisters:\nIt is impossible that the blood of bulls and goats\ntake away sins.\nFor this reason, when Christ came into the world, he said:\n\n"Sacrifice and offering you did not desire,\nbut a body you prepared for me;\nin holocausts and sin offerings you took no delight.\nThen I said, 'As is written of me in the scroll,\nbehold, I come to do your will, O God.'"\n\nFirst he says, "Sacrifices and offerings,\nholocausts and sin offerings,\nyou neither desired nor delighted in."\nThese are offered according to the law.\nThen he says, "Behold, I come to do your will."\nHe takes away the first to establish the second.\nBy this "will," we have been consecrated\nthrough the offering of the Body of Jesus Christ once for all.` },
    { label: "Gospel", ref: "Luke 1:26-38", dropCap: true, text: `The angel Gabriel was sent from God\nto a town of Galilee called Nazareth,\nto a virgin betrothed to a man named Joseph,\nof the house of David,\nand the virgin's name was Mary.\nAnd coming to her, he said,\n"Hail, full of grace! The Lord is with you."\nBut she was greatly troubled at what was said\nand pondered what sort of greeting this might be.\nThen the angel said to her,\n"Do not be afraid, Mary,\nfor you have found favor with God.\nBehold, you will conceive in your womb and bear a son,\nand you shall name him Jesus.\nHe will be great and will be called Son of the Most High,\nand the Lord God will give him the throne of David his father,\nand he will rule over the house of Jacob forever,\nand of his Kingdom there will be no end."\nBut Mary said to the angel,\n"How can this be,\nsince I have no relations with a man?"\nAnd the angel said to her in reply,\n"The Holy Spirit will come upon you,\nand the power of the Most High will overshadow you.\nTherefore the child to be born\nwill be called holy, the Son of God.\nAnd behold, Elizabeth, your relative,\nhas also conceived a son in her old age,\nand this is the sixth month for her who was called barren;\nfor nothing will be impossible for God."\nMary said, "Behold, I am the handmaid of the Lord.\nMay it be done to me according to your word."\nThen the angel departed from her.` }] },
  "2026-03-26": { feast: "Thursday of the Fifth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Genesis 17:3-9", dropCap: true, text: `When Abram prostrated himself, God spoke to him:\n"My covenant with you is this:\nyou are to become the father of a host of nations.\nNo longer shall you be called Abram;\nyour name shall be Abraham,\nfor I am making you the father of a host of nations.\nI will render you exceedingly fertile;\nI will make nations of you;\nkings shall stem from you.\nI will maintain my covenant with you\nand your descendants after you\nthroughout the ages as an everlasting pact,\nto be your God and the God of your descendants after you.\nI will give to you\nand to your descendants after you\nthe land in which you are now staying,\nthe whole land of Canaan, as a permanent possession;\nand I will be their God."\n\nGod also said to Abraham:\n"On your part, you and your descendants after you\nmust keep my covenant throughout the ages."` },
    { label: "Responsorial Psalm", ref: "Psalm 105:4-5, 6-7, 8-9", isRefrain: true, text: `R. The Lord remembers his covenant for ever.\nLook to the LORD in his strength;\nseek to serve him constantly.\nRecall the wondrous deeds that he has wrought,\nhis portents, and the judgments he has uttered.\nR. The Lord remembers his covenant for ever.\nYou descendants of Abraham, his servants,\nsons of Jacob, his chosen ones!\nHe, the LORD, is our God;\nthroughout the earth his judgments prevail.\nR. The Lord remembers his covenant for ever.\nHe remembers forever his covenant\nwhich he made binding for a thousand generations —\nWhich he entered into with Abraham\nand by his oath to Isaac.\nR. The Lord remembers his covenant for ever.` },
    { label: "Gospel", ref: "John 8:51-59", dropCap: true, text: `Jesus said to the Jews:\n"Amen, amen, I say to you,\nwhoever keeps my word will never see death."\nSo the Jews said to him,\n"Now we are sure that you are possessed.\nAbraham died, as did the prophets, yet you say,\n'Whoever keeps my word will never taste death.'\nAre you greater than our father Abraham, who died?\nOr the prophets, who died?\nWho do you make yourself out to be?"\nJesus answered, "If I glorify myself, my glory is worth nothing;\nbut it is my Father who glorifies me,\nof whom you say, 'He is our God.'\nYou do not know him, but I know him.\nAnd if I should say that I do not know him,\nI would be like you a liar.\nBut I do know him and I keep his word.\nAbraham your father rejoiced to see my day;\nhe saw it and was glad."\nSo the Jews said to him,\n"You are not yet fifty years old and you have seen Abraham?"\nJesus said to them, "Amen, amen, I say to you,\nbefore Abraham came to be, I AM."\nSo they picked up stones to throw at him;\nbut Jesus hid and went out of the temple area.` }] },
  "2026-03-27": { feast: "Friday of the Fifth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Jeremiah 20:10-13", dropCap: true, text: `I hear the whisperings of many:\n"Terror on every side!\nDenounce! let us denounce him!"\nAll those who were my friends\nare on the watch for any misstep of mine.\n"Perhaps he will be trapped; then we can prevail,\nand take our vengeance on him."\nBut the LORD is with me, like a mighty champion:\nmy persecutors will stumble, they will not triumph.\nIn their failure they will be put to utter shame,\nto lasting, unforgettable confusion.\nO LORD of hosts, you who test the just,\nwho probe mind and heart,\nLet me witness the vengeance you take on them,\nfor to you I have entrusted my cause.\nSing to the LORD,\npraise the LORD,\nFor he has rescued the life of the poor\nfrom the power of the wicked!` },
    { label: "Responsorial Psalm", ref: "Psalm 18:2-3a, 3bc-4, 5-6, 7", isRefrain: true, text: `R. In my distress I called upon the Lord, and he heard my voice.\nI love you, O LORD, my strength,\nO LORD, my rock, my fortress, my deliverer.\nR. In my distress I called upon the Lord, and he heard my voice.\nMy God, my rock of refuge,\nmy shield, the horn of my salvation, my stronghold!\nPraised be the LORD, I exclaim,\nand I am safe from my enemies.\nR. In my distress I called upon the Lord, and he heard my voice.\nThe breakers of death surged round about me,\nthe destroying floods overwhelmed me;\nThe cords of the nether world enmeshed me,\nthe snares of death overtook me.\nR. In my distress I called upon the Lord, and he heard my voice.\nIn my distress I called upon the LORD\nand cried out to my God;\nFrom his temple he heard my voice,\nand my cry to him reached his ears.\nR. In my distress I called upon the Lord, and he heard my voice.` },
    { label: "Gospel", ref: "John 10:31-42", dropCap: true, text: `The Jews picked up rocks to stone Jesus.\nJesus answered them, "I have shown you many good works from my Father.\nFor which of these are you trying to stone me?"\nThe Jews answered him,\n"We are not stoning you for a good work but for blasphemy.\nYou, a man, are making yourself God."\nJesus answered them,\n"Is it not written in your law, 'I said, "You are gods"'?\nIf it calls them gods to whom the word of God came,\nand Scripture cannot be set aside,\ncan you say that the one\nwhom the Father has consecrated and sent into the world\nblasphemes because I said, 'I am the Son of God'?\nIf I do not perform my Father's works, do not believe me;\nbut if I perform them, even if you do not believe me,\nbelieve the works, so that you may realize and understand\nthat the Father is in me and I am in the Father."\nThen they tried again to arrest him;\nbut he escaped from their power.\n\nHe went back across the Jordan\nto the place where John first baptized, and there he remained.\nMany came to him and said,\n"John performed no sign,\nbut everything John said about this man was true."\nAnd many there began to believe in him.` }] },
  "2026-03-28": { feast: "Saturday of the Fifth Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Ezekiel 37:21-28", dropCap: true, text: `Thus says the Lord GOD:\nI will take the children of Israel from among the nations\nto which they have come,\nand gather them from all sides to bring them back to their land.\nI will make them one nation upon the land,\nin the mountains of Israel,\nand there shall be one prince for them all.\nNever again shall they be two nations,\nand never again shall they be divided into two kingdoms.\n\nNo longer shall they defile themselves with their idols,\ntheir abominations, and all their transgressions.\nI will deliver them from all their sins of apostasy,\nand cleanse them so that they may be my people\nand I may be their God.\nMy servant David shall be prince over them,\nand there shall be one shepherd for them all;\nthey shall live by my statutes and carefully observe my decrees.\nThey shall live on the land that I gave to my servant Jacob,\nthe land where their fathers lived;\nthey shall live on it forever,\nthey, and their children, and their children's children,\nwith my servant David their prince forever.\nI will make with them a covenant of peace;\nit shall be an everlasting covenant with them,\nand I will multiply them, and put my sanctuary among them forever.\nMy dwelling shall be with them;\nI will be their God, and they shall be my people.\nThus the nations shall know that it is I, the LORD,\nwho make Israel holy,\nwhen my sanctuary shall be set up among them forever.` },
    { label: "Responsorial Psalm", ref: "Jeremiah 31:10, 11-12abcd, 13", isRefrain: true, text: `R. The Lord will guard us, as a shepherd guards his flock.\nHear the word of the LORD, O nations,\nproclaim it on distant isles, and say:\nHe who scattered Israel, now gathers them together,\nhe guards them as a shepherd his flock.\nR. The Lord will guard us, as a shepherd guards his flock.\nThe LORD shall ransom Jacob,\nhe shall redeem him from the hand of his conqueror.\nShouting, they shall mount the heights of Zion,\nthey shall come streaming to the LORD's blessings:\nThe grain, the wine, and the oil,\nthe sheep and the oxen.\nR. The Lord will guard us, as a shepherd guards his flock.\nThen the virgins shall make merry and dance,\nand young men and old as well.\nI will turn their mourning into joy,\nI will console and gladden them after their sorrows.\nR. The Lord will guard us, as a shepherd guards his flock.` },
    { label: "Gospel", ref: "John 11:45-56", dropCap: true, text: `Many of the Jews who had come to Mary\nand seen what Jesus had done began to believe in him.\nBut some of them went to the Pharisees\nand told them what Jesus had done.\nSo the chief priests and the Pharisees\nconvened the Sanhedrin and said,\n"What are we going to do?\nThis man is performing many signs.\nIf we leave him alone, all will believe in him,\nand the Romans will come\nand take away both our land and our nation."\nBut one of them, Caiaphas,\nwho was high priest that year, said to them,\n"You know nothing,\nnor do you consider that it is better for you\nthat one man should die instead of the people,\nso that the whole nation may not perish."\nHe did not say this on his own,\nbut since he was high priest for that year,\nhe prophesied that Jesus was going to die for the nation,\nand not only for the nation,\nbut also to gather into one the dispersed children of God.\nSo from that day on they planned to kill him.\n\nSo Jesus no longer walked about in public among the Jews,\nbut he left for the region near the desert,\nto a town called Ephraim,\nand there he remained with his disciples.\n\nNow the Passover of the Jews was near,\nand many went up from the country to Jerusalem\nbefore Passover to purify themselves.\nThey looked for Jesus and said to one another\nas they were in the temple area, "What do you think?\nThat he will not come to the feast?"` }] },

  // ─── HOLY WEEK ───
  "2026-03-29": { feast: "Palm Sunday of the Passion of the Lord", yearCycle: "Year A", color: "red",
    feastInfo: { title: "Palm Sunday", desc: "Holy Week begins. The faithful carry palm branches in procession, re-enacting Christ's triumphant entry into Jerusalem. But the mood turns: the Passion narrative is read in full, tracing Jesus from the Last Supper through Gethsemane to Golgotha. The palms of triumph and the cross of suffering frame the paradox at the heart of Christianity." },
    readings: [
    { label: "Gospel at Procession", ref: "Matthew 21:1-11", dropCap: true, text: `When Jesus and the disciples drew near Jerusalem\nand came to Bethphage on the Mount of Olives,\nJesus sent two disciples, saying to them,\n"Go into the village opposite you,\nand immediately you will find an ass tethered,\nand a colt with her.\nUntie them and bring them here to me.\nAnd if anyone should say anything to you, reply,\n'The master has need of them.'\nThen he will send them at once."\nThis happened so that what had been spoken through the prophet\nmight be fulfilled:\nSay to daughter Zion,\n"Behold, your king comes to you,\nmeek and riding on an ass,\nand on a colt, the foal of a beast of burden."\nThe disciples went and did as Jesus had ordered them.\nThey brought the ass and the colt and laid their cloaks over them,\nand he sat upon them.\nThe very large crowd spread their cloaks on the road,\nwhile others cut branches from the trees\nand strewed them on the road.\nThe crowds preceding him and those following\nkept crying out and saying:\n"Hosanna to the Son of David;\nblessed is he who comes in the name of the Lord;\nhosanna in the highest."\nAnd when he entered Jerusalem\nthe whole city was shaken and asked, "Who is this?"\nAnd the crowds replied,\n"This is Jesus the prophet, from Nazareth in Galilee."` },
    { label: "First Reading", ref: "Isaiah 50:4-7", dropCap: true, text: `The Lord GOD has given me\na well-trained tongue,\nthat I might know how to speak to the weary\na word that will rouse them.\nMorning after morning\nhe opens my ear that I may hear;\nand I have not rebelled,\nhave not turned back.\nI gave my back to those who beat me,\nmy cheeks to those who plucked my beard;\nmy face I did not shield\nfrom buffets and spitting.\n\nThe Lord GOD is my help,\ntherefore I am not disgraced;\nI have set my face like flint,\nknowing that I shall not be put to shame.` },
    { label: "Responsorial Psalm", ref: "Psalm 22:8-9, 17-18, 19-20, 23-24", isRefrain: true, text: `R. My God, my God, why have you abandoned me?\nAll who see me scoff at me;\nthey mock me with parted lips, they wag their heads:\n"He relied on the LORD; let him deliver him,\nlet him rescue him, if he loves him."\nR. My God, my God, why have you abandoned me?\nIndeed, many dogs surround me,\na pack of evildoers closes in upon me;\nThey have pierced my hands and my feet;\nI can count all my bones.\nR. My God, my God, why have you abandoned me?\nThey divide my garments among them,\nand for my vesture they cast lots.\nBut you, O LORD, be not far from me;\nO my help, hasten to aid me.\nR. My God, my God, why have you abandoned me?\nI will proclaim your name to my brethren;\nin the midst of the assembly I will praise you:\n"You who fear the LORD, praise him;\nall you descendants of Jacob, give glory to him;\nrevere him, all you descendants of Israel!"\nR. My God, my God, why have you abandoned me?` },
    { label: "Second Reading", ref: "Philippians 2:6-11", dropCap: true, text: `Christ Jesus, though he was in the form of God,\ndid not regard equality with God\nsomething to be grasped.\nRather, he emptied himself,\ntaking the form of a slave,\ncoming in human likeness;\nand found human in appearance,\nhe humbled himself,\nbecoming obedient to the point of death,\neven death on a cross.\nBecause of this, God greatly exalted him\nand bestowed on him the name\nwhich is above every name,\nthat at the name of Jesus\nevery knee should bend,\nof those in heaven and on earth and under the earth,\nand every tongue confess that\nJesus Christ is Lord,\nto the glory of God the Father.` },
    { label: "Gospel (Passion)", ref: "Matthew 27:11-54", dropCap: true, text: `Jesus stood before the governor, Pontius Pilate, who questioned him,\n"Are you the king of the Jews?"\nJesus said, "You say so."\nAnd when he was accused by the chief priests and elders,\nhe made no answer.\nThen Pilate said to him,\n"Do you not hear how many things they are testifying against you?"\nBut he did not answer him one word,\nso that the governor was greatly amazed.\n\nNow on the occasion of the feast\nthe governor was accustomed to release to the crowd\none prisoner whom they wished.\nAnd at that time they had a notorious prisoner called Barabbas.\nSo when they had assembled, Pilate said to them,\n"Which one do you want me to release to you,\nBarabbas, or Jesus called Christ?"\nFor he knew that it was out of envy\nthat they had handed him over.\nWhile he was still seated on the bench,\nhis wife sent him a message,\n"Have nothing to do with that righteous man.\nI suffered much in a dream today because of him."\nThe chief priests and the elders persuaded the crowds\nto ask for Barabbas but to destroy Jesus.\nThe governor said to them in reply,\n"Which of the two do you want me to release to you?"\nThey answered, "Barabbas!"\nPilate said to them,\n"Then what shall I do with Jesus called Christ?"\nThey all said,\n"Let him be crucified!"\nBut he said,\n"Why? What evil has he done?"\nThey only shouted the louder,\n"Let him be crucified!"\nWhen Pilate saw that he was not succeeding at all,\nbut that a riot was breaking out instead,\nhe took water and washed his hands in the sight of the crowd,\nsaying, "I am innocent of this man's blood.\nLook to it yourselves."\nAnd the whole people said in reply,\n"His blood be upon us and upon our children."\nThen he released Barabbas to them,\nbut after he had Jesus scourged,\nhe handed him over to be crucified.\n\nThen the soldiers of the governor took Jesus inside the praetorium\nand gathered the whole cohort around him.\nThey stripped off his clothes\nand threw a scarlet military cloak about him.\nWeaving a crown out of thorns, they placed it on his head,\nand a reed in his right hand.\nAnd kneeling before him, they mocked him, saying,\n"Hail, King of the Jews!"\nThey spat upon him and took the reed\nand kept striking him on the head.\nAnd when they had mocked him,\nthey stripped him of the cloak,\ndressed him in his own clothes,\nand led him off to crucify him.\n\nAs they were going out, they met a Cyrenian named Simon;\nthis man they pressed into service\nto carry his cross.\n\nAnd when they came to a place called Golgotha\n\u2014 which means Place of the Skull \u2014,\nthey gave Jesus wine to drink mixed with gall.\nBut when he had tasted it, he refused to drink.\nAfter they had crucified him,\nthey divided his garments by casting lots;\nthen they sat down and kept watch over him there.\nAnd they placed over his head the written charge against him:\nThis is Jesus, the King of the Jews.\nTwo revolutionaries were crucified with him,\none on his right and the other on his left.\nThose passing by reviled him, shaking their heads and saying,\n"You who would destroy the temple and rebuild it in three days,\nsave yourself, if you are the Son of God,\nand come down from the cross!"\nLikewise the chief priests with the scribes and elders mocked him and said,\n"He saved others; he cannot save himself.\nSo he is the king of Israel!\nLet him come down from the cross now,\nand we will believe in him.\nHe trusted in God;\nlet him deliver him now if he wants him.\nFor he said, 'I am the Son of God.'"\nThe revolutionaries who were crucified with him\nalso kept abusing him in the same way.\n\nFrom noon onward, darkness came over the whole land\nuntil three in the afternoon.\nAnd about three o'clock Jesus cried out in a loud voice,\n"Eli, Eli, lema sabachthani?"\nwhich means, "My God, my God, why have you forsaken me?"\nSome of the bystanders who heard it said,\n"This one is calling for Elijah."\nImmediately one of th
