em ran to get a sponge;\nhe soaked it in wine, and putting it on a reed,\ngave it to him to drink.\nBut the rest said,\n"Wait, let us see if Elijah comes to save him."\nBut Jesus cried out again in a loud voice,\nand gave up his spirit.\n\nAnd behold, the veil of the sanctuary\nwas torn in two from top to bottom.\nThe earth quaked, rocks were split, tombs were opened,\nand the bodies of many saints who had fallen asleep were raised.\nAnd coming forth from their tombs after his resurrection,\nthey entered the holy city and appeared to many.\nThe centurion and the men with him who were keeping watch over Jesus\nfeared greatly when they saw the earthquake\nand all that was happening, and they said,\n"Truly, this was the Son of God!"` }] },
  "2026-03-30": { feast: "Monday of Holy Week", color: "violet", readings: [
    { label: "First Reading", ref: "Isaiah 42:1-7", dropCap: true, text: `Here is my servant whom I uphold,\nmy chosen one with whom I am pleased,\nUpon whom I have put my Spirit;\nhe shall bring forth justice to the nations,\nNot crying out, not shouting,\nnot making his voice heard in the street.\nA bruised reed he shall not break,\nand a smoldering wick he shall not quench,\nUntil he establishes justice on the earth;\nthe coastlands will wait for his teaching.\n\nThus says God, the LORD,\nwho created the heavens and stretched them out,\nwho spreads out the earth with its crops,\nWho gives breath to its people\nand spirit to those who walk on it:\nI, the LORD, have called you for the victory of justice,\nI have grasped you by the hand;\nI formed you, and set you\nas a covenant of the people,\na light for the nations,\nTo open the eyes of the blind,\nto bring out prisoners from confinement,\nand from the dungeon, those who live in darkness.` },
    { label: "Responsorial Psalm", ref: "Psalm 27:1, 2, 3, 13-14", isRefrain: true, text: `R. The Lord is my light and my salvation.\nThe LORD is my light and my salvation;\nwhom should I fear?\nThe LORD is my life\u2019s refuge;\nof whom should I be afraid?\nR. The Lord is my light and my salvation.\nWhen evildoers come at me\nto devour my flesh,\nMy foes and my enemies\nthemselves stumble and fall.\nR. The Lord is my light and my salvation.\nThough an army encamp against me,\nmy heart will not fear;\nThough war be waged upon me,\neven then will I trust.\nR. The Lord is my light and my salvation.\nI believe that I shall see the bounty of the LORD\nin the land of the living.\nWait for the LORD with courage;\nbe stouthearted, and wait for the LORD.\nR. The Lord is my light and my salvation.` },
    { label: "Gospel", ref: "John 12:1-11", dropCap: true, text: `Six days before Passover Jesus came to Bethany,\nwhere Lazarus was, whom Jesus had raised from the dead.\nThey gave a dinner for him there, and Martha served,\nwhile Lazarus was one of those reclining at table with him.\nMary took a liter of costly perfumed oil\nmade from genuine aromatic nard\nand anointed the feet of Jesus and dried them with her hair;\nthe house was filled with the fragrance of the oil.\nThen Judas the Iscariot, one of his disciples,\nand the one who would betray him, said,\n"Why was this oil not sold for three hundred days\u2019 wages\nand given to the poor?"\nHe said this not because he cared about the poor\nbut because he was a thief and held the money bag\nand used to steal the contributions.\nSo Jesus said, "Leave her alone.\nLet her keep this for the day of my burial.\nYou always have the poor with you, but you do not always have me."\n\nThe large crowd of the Jews found out that he was there and came,\nnot only because of him, but also to see Lazarus,\nwhom he had raised from the dead.\nAnd the chief priests plotted to kill Lazarus too,\nbecause many of the Jews were turning away\nand believing in Jesus because of him.` }] },
  "2026-03-31": { feast: "Tuesday of Holy Week", color: "violet", readings: [
    { label: "First Reading", ref: "Isaiah 49:1-6", dropCap: true, text: `Hear me, O islands,\nlisten, O distant peoples.\nThe LORD called me from birth,\nfrom my mother\u2019s womb he gave me my name.\nHe made of me a sharp-edged sword\nand concealed me in the shadow of his arm.\nHe made me a polished arrow,\nin his quiver he hid me.\nYou are my servant, he said to me,\nIsrael, through whom I show my glory.\n\nThough I thought I had toiled in vain,\nand for nothing, uselessly, spent my strength,\nYet my reward is with the LORD,\nmy recompense is with my God.\nFor now the LORD has spoken\nwho formed me as his servant from the womb,\nThat Jacob may be brought back to him\nand Israel gathered to him;\nAnd I am made glorious in the sight of the LORD,\nand my God is now my strength!\nIt is too little, he says, for you to be my servant,\nto raise up the tribes of Jacob,\nand restore the survivors of Israel;\nI will make you a light to the nations,\nthat my salvation may reach to the ends of the earth.` },
    { label: "Responsorial Psalm", ref: "Psalm 71:1-2, 3-4a, 5ab-6ab, 15, 17", isRefrain: true, text: `R. I will sing of your salvation.\nIn you, O LORD, I take refuge;\nlet me never be put to shame.\nIn your justice rescue me, and deliver me;\nincline your ear to me, and save me.\nR. I will sing of your salvation.\nBe my rock of refuge,\na stronghold to give me safety,\nfor you are my rock and my fortress.\nO my God, rescue me from the hand of the wicked.\nR. I will sing of your salvation.\nFor you are my hope, O Lord;\nmy trust, O God, from my youth.\nOn you I depend from birth;\nfrom my mother\u2019s womb you are my strength.\nR. I will sing of your salvation.\nMy mouth shall declare your justice,\nday by day your salvation.\nO God, you have taught me from my youth,\nand till the present I proclaim your wondrous deeds.\nR. I will sing of your salvation.` },
    { label: "Gospel", ref: "John 13:21-33, 36-38", dropCap: true, text: `Reclining at table with his disciples, Jesus was deeply troubled and testified,\n"Amen, amen, I say to you, one of you will betray me."\nThe disciples looked at one another, at a loss as to whom he meant.\nOne of his disciples, the one whom Jesus loved,\nwas reclining at Jesus\u2019 side.\nSo Simon Peter nodded to him to find out whom he meant.\nHe leaned back against Jesus\u2019 chest and said to him,\n"Master, who is it?"\nJesus answered,\n"It is the one to whom I hand the morsel after I have dipped it."\nSo he dipped the morsel and took it and handed it to Judas,\nson of Simon the Iscariot.\nAfter Judas took the morsel, Satan entered him.\nSo Jesus said to him, "What you are going to do, do quickly."\nNow none of those reclining at table realized why he said this to him.\nSome thought that since Judas kept the money bag, Jesus had told him,\n"Buy what we need for the feast,"\nor to give something to the poor.\nSo Judas took the morsel and left at once. And it was night.\n\nWhen he had left, Jesus said,\n"Now is the Son of Man glorified, and God is glorified in him.\nIf God is glorified in him, God will also glorify him in himself,\nand he will glorify him at once.\nMy children, I will be with you only a little while longer.\nYou will look for me, and as I told the Jews,\n\u2018Where I go you cannot come,\u2019 so now I say it to you."\n\nSimon Peter said to him, "Master, where are you going?"\nJesus answered him,\n"Where I am going, you cannot follow me now,\nthough you will follow later."\nPeter said to him,\n"Master, why can I not follow you now?\nI will lay down my life for you."\nJesus answered, "Will you lay down your life for me?\nAmen, amen, I say to you, the cock will not crow\nbefore you deny me three times."` }] },
  "2026-04-01": { feast: "Wednesday of Holy Week", color: "violet", readings: [
    { label: "First Reading", ref: "Isaiah 50:4-9a", dropCap: true, text: `The Lord GOD has given me\na well-trained tongue,\nThat I might know how to speak to the weary\na word that will rouse them.\nMorning after morning\nhe opens my ear that I may hear;\nAnd I have not rebelled,\nhave not turned back.\nI gave my back to those who beat me,\nmy cheeks to those who plucked my beard;\nMy face I did not shield\nfrom buffets and spitting.\n\nThe Lord GOD is my help,\ntherefore I am not disgraced;\nI have set my face like flint,\nknowing that I shall not be put to shame.\nHe is near who upholds my right;\nif anyone wishes to oppose me,\nlet us appear together.\nWho disputes my right?\nLet him confront me.\nSee, the Lord GOD is my help;\nwho will prove me wrong?` },
    { label: "Responsorial Psalm", ref: "Psalm 69:8-10, 21-22, 31, 33-34", isRefrain: true, text: `R. Lord, in your great love, answer me.\nFor your sake I bear insult,\nand shame covers my face.\nI have become an outcast to my brothers,\na stranger to my mother\u2019s sons,\nbecause zeal for your house consumes me,\nand the insults of those who blaspheme you fall upon me.\nR. Lord, in your great love, answer me.\nInsult has broken my heart, and I am weak,\nI looked for sympathy, but there was none;\nfor consolers, not one could I find.\nRather they put gall in my food,\nand in my thirst they gave me vinegar to drink.\nR. Lord, in your great love, answer me.\nI will praise the name of God in song,\nand I will glorify him with thanksgiving:\n"See, you lowly ones, and be glad;\nyou who seek God, may your hearts revive!\nFor the LORD hears the poor,\nand his own who are in bonds he spurns not."\nR. Lord, in your great love, answer me.` },
    { label: "Gospel", ref: "Matthew 26:14-25", dropCap: true, text: `One of the Twelve, who was called Judas Iscariot,\nwent to the chief priests and said,\n"What are you willing to give me\nif I hand him over to you?"\nThey paid him thirty pieces of silver,\nand from that time on he looked for an opportunity to hand him over.\n\nOn the first day of the Feast of Unleavened Bread,\nthe disciples approached Jesus and said,\n"Where do you want us to prepare\nfor you to eat the Passover?"\nHe said,\n"Go into the city to a certain man and tell him,\n\u2018The teacher says, "My appointed time draws near;\nin your house I shall celebrate the Passover with my disciples."\u2019"\nThe disciples then did as Jesus had ordered,\nand prepared the Passover.\n\nWhen it was evening,\nhe reclined at table with the Twelve.\nAnd while they were eating, he said,\n"Amen, I say to you, one of you will betray me."\nDeeply distressed at this,\nthey began to say to him one after another,\n"Surely it is not I, Lord?"\nHe said in reply,\n"He who has dipped his hand into the dish with me\nis the one who will betray me.\nThe Son of Man indeed goes, as it is written of him,\nbut woe to that man by whom the Son of Man is betrayed.\nIt would be better for that man if he had never been born."\nThen Judas, his betrayer, said in reply,\n"Surely it is not I, Rabbi?"\nHe answered, "You have said so."` }] },
  "2026-04-02": { feast: "Holy Thursday \u2014 Evening Mass of the Lord's Supper", color: "white",
    feastInfo: { title: "Holy Thursday", desc: "The Sacred Triduum begins. At the Evening Mass of the Lord\u2019s Supper, the Church commemorates Jesus washing the feet of his disciples and instituting the Eucharist and the ministerial priesthood. The tabernacle is emptied, altars are stripped, and the faithful keep watch in adoration, recalling Christ\u2019s agony in the Garden of Gethsemane." },
    readings: [
    { label: "First Reading", ref: "Exodus 12:1-8, 11-14", dropCap: true, text: `The LORD said to Moses and Aaron in the land of Egypt,\n"This month shall stand at the head of your calendar;\nyou shall reckon it the first month of the year.\nTell the whole community of Israel:\nOn the tenth of this month every one of your families\nmust procure for itself a lamb, one apiece for each household.\nIf a family is too small for a whole lamb,\nit shall join the nearest household in procuring one\nand shall share in the lamb\nin proportion to the number of persons who partake of it.\nThe lamb must be a year-old male and without blemish.\nYou may take it from either the sheep or the goats.\nYou shall keep it until the fourteenth day of this month,\nand then, with the whole assembly of Israel present,\nit shall be slaughtered during the evening twilight.\nThey shall take some of its blood\nand apply it to the two doorposts and the lintel\nof every house in which they partake of the lamb.\nThat same night they shall eat its roasted flesh\nwith unleavened bread and bitter herbs.\n\n"This is how you are to eat it:\nwith your loins girt, sandals on your feet and your staff in hand,\nyou shall eat like those who are in flight.\nIt is the Passover of the LORD.\nFor on this same night I will go through Egypt,\nstriking down every firstborn of the land, both man and beast,\nand executing judgment on all the gods of Egypt \u2014 I, the LORD!\nBut the blood will mark the houses where you are.\nSeeing the blood, I will pass over you;\nthus, when I strike the land of Egypt,\nno destructive blow will come upon you.\n\n"This day shall be a memorial feast for you,\nwhich all your generations shall celebrate\nwith pilgrimage to the LORD, as a perpetual institution."` },
    { label: "Responsorial Psalm", ref: "Psalm 116:12-13, 15-16bc, 17-18", isRefrain: true, text: `R. Our blessing-cup is a communion with the Blood of Christ.\nHow shall I make a return to the LORD\nfor all the good he has done for me?\nThe cup of salvation I will take up,\nand I will call upon the name of the LORD.\nR. Our blessing-cup is a communion with the Blood of Christ.\nPrecious in the eyes of the LORD\nis the death of his faithful ones.\nI am your servant, the son of your handmaid;\nyou have loosed my bonds.\nR. Our blessing-cup is a communion with the Blood of Christ.\nTo you will I offer sacrifice of thanksgiving,\nand I will call upon the name of the LORD.\nMy vows to the LORD I will pay\nin the presence of all his people.\nR. Our blessing-cup is a communion with the Blood of Christ.` },
    { label: "Second Reading", ref: "1 Corinthians 11:23-26", dropCap: true, text: `Brothers and sisters:\nI received from the Lord what I also handed on to you,\nthat the Lord Jesus, on the night he was handed over,\ntook bread, and, after he had given thanks,\nbroke it and said, "This is my body that is for you.\nDo this in remembrance of me."\nIn the same way also the cup, after supper, saying,\n"This cup is the new covenant in my blood.\nDo this, as often as you drink it, in remembrance of me."\nFor as often as you eat this bread and drink the cup,\nyou proclaim the death of the Lord until he comes.` },
    { label: "Gospel", ref: "John 13:1-15", dropCap: true, text: `Before the feast of Passover, Jesus knew that his hour had come\nto pass from this world to the Father.\nHe loved his own in the world and he loved them to the end.\nThe devil had already induced Judas, son of Simon the Iscariot, to hand him over.\nSo, during supper,\nfully aware that the Father had put everything into his power\nand that he had come from God and was returning to God,\nhe rose from supper and took off his outer garments.\nHe took a towel and tied it around his waist.\nThen he poured water into a basin\nand began to wash the disciples\u2019 feet\nand dry them with the towel around his waist.\nHe came to Simon Peter, who said to him,\n"Master, are you going to wash my feet?"\nJesus answered and said to him,\n"What I am doing, you do not understand now,\nbut you will understand later."\nPeter said to him, "You will never wash my feet."\nJesus answered him,\n"Unless I wash you, you will have no inheritance with me."\nSimon Peter said to him,\n"Master, then not only my feet, but my hands and head as well."\nJesus said to him,\n"Whoever has bathed has no need except to have his feet washed,\nfor he is clean all over;\nso you are clean, but not all."\nFor he knew who would betray him;\nfor this reason, he said, "Not all of you are clean."\n\nSo when he had washed their feet\nand put his garments back on and reclined at table again,\nhe said to them, "Do you realize what I have done for you?\nYou call me \u2018teacher\u2019 and \u2018master,\u2019 and rightly so, for indeed I am.\nIf I, therefore, the master and teacher, have washed your feet,\nyou ought to wash one another\u2019s feet.\nI have given you a model to follow,\nso that as I have done for you, you should also do."` }] },
  "2026-04-03": { feast: "Good Friday of the Passion of the Lord", color: "red",
    feastInfo: { title: "Good Friday", desc: "The one day of the year when Mass is not celebrated. The Church gathers in silence, reads the Passion according to John, prays the solemn intercessions for the whole world, and venerates the cross. The altar is bare, the tabernacle empty. In this starkness, the faithful contemplate the mystery of God\u2019s self-offering love." },
    readings: [
    { label: "First Reading", ref: "Isaiah 52:13\u201453:12", dropCap: true, text: `See, my servant shall prosper,\nhe shall be raised high and greatly exalted.\nEven as many were amazed at him \u2014\nso marred was his look beyond human semblance\nand his appearance beyond that of the sons of man \u2014\nso shall he startle many nations,\nbecause of him kings shall stand speechless;\nfor those who have not been told shall see,\nthose who have not heard shall ponder it.\n\nWho would believe what we have heard?\nTo whom has the arm of the LORD been revealed?\nHe grew up like a sapling before him,\nlike a shoot from the parched earth;\nthere was in him no stately bearing to make us look at him,\nnor appearance that would attract us to him.\nHe was spurned and avoided by people,\na man of suffering, accustomed to infirmity,\none of those from whom people hide their faces,\nspurned, and we held him in no esteem.\n\nYet it was our infirmities that he bore,\nour sufferings that he endured,\nwhile we thought of him as stricken,\nas one smitten by God and afflicted.\nBut he was pierced for our offenses,\ncrushed for our sins;\nupon him was the chastisement that makes us whole,\nby his stripes we were healed.\nWe had all gone astray like sheep,\neach following his own way;\nbut the LORD laid upon him\nthe guilt of us all.\n\nThough he was harshly treated, he submitted\nand opened not his mouth;\nlike a lamb led to the slaughter\nor a sheep before the shearers,\nhe was silent and opened not his mouth.\nOppressed and condemned, he was taken away,\nand who would have thought any more of his destiny?\nWhen he was cut off from the land of the living,\nand smitten for the sin of his people,\na grave was assigned him among the wicked\nand a burial place with evildoers,\nthough he had done no wrong\nnor spoken any falsehood.\nBut the LORD was pleased\nto crush him in infirmity.\n\nIf he gives his life as an offering for sin,\nhe shall see his descendants in a long life,\nand the will of the LORD shall be accomplished through him.\n\nBecause of his affliction\nhe shall see the light in fullness of days;\nthrough his suffering, my servant shall justify many,\nand their guilt he shall bear.\nTherefore I will give him his portion among the great,\nand he shall divide the spoils with the mighty,\nbecause he surrendered himself to death\nand was counted among the wicked;\nand he shall take away the sins of many,\nand win pardon for their offenses.` },
    { label: "Responsorial Psalm", ref: "Psalm 31:2, 6, 12-13, 15-16, 17, 25", isRefrain: true, text: `R. Father, into your hands I commend my spirit.\nIn you, O LORD, I take refuge;\nlet me never be put to shame.\nIn your justice rescue me.\nInto your hands I commend my spirit;\nyou will redeem me, O LORD, O faithful God.\nR. Father, into your hands I commend my spirit.\nFor all my foes I am an object of reproach,\na laughingstock to my neighbors, and a dread to my friends;\nthey who see me abroad flee from me.\nI am forgotten like the unremembered dead;\nI am like a dish that is broken.\nR. Father, into your hands I commend my spirit.\nBut my trust is in you, O LORD;\nI say, "You are my God.\nIn your hands is my destiny; rescue me\nfrom the clutches of my enemies and my persecutors."\nR. Father, into your hands I commend my spirit.\nLet your face shine upon your servant;\nsave me in your kindness.\nTake courage and be stouthearted,\nall you who hope in the LORD.\nR. Father, into your hands I commend my spirit.` },
    { label: "Second Reading", ref: "Hebrews 4:14-16; 5:7-9", dropCap: true, text: `Brothers and sisters:\nSince we have a great high priest who has passed through the heavens,\nJesus, the Son of God,\nlet us hold fast to our confession.\nFor we do not have a high priest\nwho is unable to sympathize with our weaknesses,\nbut one who has similarly been tested in every way,\nyet without sin.\nSo let us confidently approach the throne of grace\nto receive mercy and to find grace for timely help.\n\nIn the days when Christ was in the flesh,\nhe offered prayers and supplications with loud cries and tears\nto the one who was able to save him from death,\nand he was heard because of his reverence.\nSon though he was, he learned obedience from what he suffered;\nand when he was made perfect,\nhe became the source of eternal salvation for all who obey him.` },
    { label: "Gospel (Passion)", ref: "John 18:1\u201419:42", dropCap: true, text: `Jesus went out with his disciples across the Kidron valley\nto where there was a garden,\ninto which he and his disciples entered.\nJudas his betrayer also knew the place,\nbecause Jesus had often met there with his disciples.\nSo Judas got a band of soldiers and guards\nfrom the chief priests and the Pharisees\nand went there with lanterns, torches, and weapons.\nJesus, knowing everything that was going to happen to him,\nwent out and said to them, "Whom are you looking for?"\nThey answered him, "Jesus the Nazorean."\nHe said to them, "I AM."\nJudas his betrayer was also with them.\nWhen he said to them, "I AM,"\nthey turned away and fell to the ground.\nSo he again asked them,\n"Whom are you looking for?"\nThey said, "Jesus the Nazorean."\nJesus answered,\n"I told you that I AM.\nSo if you are looking for me, let these men go."\nThis was to fulfill what he had said,\n"I have not lost any of those you gave me."\nThen Simon Peter, who had a sword, drew it,\nstruck the high priest\u2019s slave, and cut off his right ear.\nThe slave\u2019s name was Malchus.\nJesus said to Peter,\n"Put your sword into its scabbard.\nShall I not drink the cup that the Father gave me?"\n\nSo the band of soldiers, the tribune, and the Jewish guards seized Jesus,\nbound him, and brought him to Annas first.\nHe was the father-in-law of Caiaphas,\nwho was high priest that year.\nIt was Caiaphas who had counseled the Jews\nthat it was better that one man should die rather than the people.\n\nSimon Peter and another disciple followed Jesus.\nNow the other disciple was known to the high priest,\nand he entered the courtyard of the high priest with Jesus.\nBut Peter stood at the gate outside.\nSo the other disciple, the acquaintance of the high priest,\nwent out and spoke to the gatekeeper and brought Peter in.\nThen the maid who was the gatekeeper said to Peter,\n"You are not one of this man\u2019s disciples, are you?"\nHe said, "I am not."\nNow the slaves and the guards were standing around a charcoal fire\nthat they had made, because it was cold,\nand were warming themselves.\nPeter was also standing there keeping warm.\n\nThe high priest questioned Jesus\nabout his disciples and about his doctrine.\nJesus answered him,\n"I have spoken publicly to the world.\nI have always taught in a synagogue\nor in the temple area where all the Jews gather,\nand in secret I have said nothing. Why ask me?\nAsk those who heard me what I said to them.\nThey know what I said."\nWhen he had said this,\none of the temple guards standing there struck Jesus and said,\n"Is this the way you answer the high priest?"\nJesus answered him,\n"If I have spoken wrongly, testify to the wrong;\nbut if I have spoken rightly, why do you strike me?"\nThen Annas sent him bound to Caiaphas the high priest.\n\nNow Simon Peter was standing there keeping warm.\nAnd they said to him,\n"You are not one of his disciples, are you?"\nHe denied it and said,\n"I am not."\nOne of the slaves of the high priest,\na relative of the one whose ear Peter had cut off, said,\n"Didn\u2019t I see you in the garden with him?"\nAgain Peter denied it.\nAnd immediately the cock crowed.\n\nThen they brought Jesus from Caiaphas to the praetorium.\nIt was morning.\nAnd they themselves did not enter the praetorium,\nin order not to be defiled so that they could eat the Passover.\nSo Pilate came out to them and said,\n"What charge do you bring against this man?"\nThey answered and said to him,\n"If he were not a criminal,\nwe would not have handed him over to you."\nAt this, Pilate said to them,\n"Take him yourselves, and judge him according to your law."\nThe Jews answered him,\n"We do not have the right to execute anyone,"\nin order that the word of Jesus might be fulfilled\nthat he said indicating the kind of death he would die.\nSo Pilate went back into the praetorium\nand summoned Jesus and said to him,\n"Are you the King of the Jews?"\nJesus answered,\n"Do you say this on your own\nor have others told you about me?"\nPilate answered,\n"I am not a Jew, am I?\nYour own nation and the chief priests handed you over to me.\nWhat have you done?"\nJesus answered,\n"My kingdom does not belong to this world.\nIf my kingdom did belong to this world,\nmy attendants would be fighting\nto keep me from being handed over to the Jews.\nBut as it is, my kingdom is not here."\nSo Pilate said to him,\n"Then you are a king?"\nJesus answered,\n"You say I am a king.\nFor this I was born and for this I came into the world,\nto testify to the truth.\nEveryone who belongs to the truth listens to my voice."\nPilate said to him, "What is truth?"\n\nWhen he had said this,\nhe again went out to the Jews and said to them,\n"I find no guilt in him.\nBut you have a custom that I release one prisoner to you at Passover.\nDo you want me to release to you the King of the Jews?"\nThey cried out again,\n"Not this one but Barabbas!"\nNow Barabbas was a revolutionary.\n\nThen Pilate took Jesus and had him scourged.\nAnd the soldiers wove a crown out of thorns and placed it on his head,\nand clothed him in a purple cloak,\nand they came to him and said,\n"Hail, King of the Jews!"\nAnd they struck him repeatedly.\nOnce more Pilate went out and said to them,\n"Look, I am bringing him out to you,\nso that you may know that I find no guilt in him."\nSo Jesus came out,\nwearing the crown of thorns and the purple cloak.\nAnd he said to them, "Behold, the man!"\nWhen the chief priests and the guards saw him they cried out,\n"Crucify him, crucify him!"\nPilate said to them,\n"Take him yourselves and crucify him.\nI find no guilt in him."\nThe Jews answered,\n"We have a law, and according to that law he ought to die,\nbecause he made himself the Son of God."\nNow when Pilate heard this statement,\nhe became even more afraid,\nand went back into the praetorium and said to Jesus,\n"Where are you from?"\nJesus did not answer him.\nSo Pilate said to him,\n"Do you not speak to me?\nDo you not know that I have power to release you\nand I have power to crucify you?"\nJesus answered him,\n"You would have no power over me\nif it had not been given to you from above.\nFor this reason the one who handed me over to you\nhas the greater sin."\nConsequently, Pilate tried to release him; but the Jews cried out,\n"If you release him, you are not a Friend of Caesar.\nEveryone who makes himself a king opposes Caesar."\n\nWhen Pilate heard these words he brought Jesus out\nand seated him on the judge\u2019s bench\nin the place called Stone Pavement, in Hebrew, Gabbatha.\nIt was preparation day for Passover, and it was about noon.\nAnd he said to the Jews,\n"Behold, your king!"\nThey cried out,\n"Take him away, take him away! Crucify him!"\nPilate said to them,\n"Shall I crucify your king?"\nThe chief priests answered,\n"We have no king but Caesar."\nThen he handed him over to them to be crucified.\n\nSo they took Jesus, and, carrying the cross himself,\nhe went out to what is called the Place of the Skull,\nin Hebrew, Golgotha.\nThere they crucified him, and with him two others,\none on either side, with Jesus in the middle.\nPilate also had an inscription written and put on the cross.\nIt read,\n"Jesus the Nazorean, the King of the Jews."\nNow many of the Jews read this inscription,\nbecause the place where Jesus was crucified was near the city;\nand it was written in Hebrew, Latin, and Greek.\nSo the chief priests of the Jews said to Pilate,\n"Do not write \u2018The King of the Jews,\u2019\nbut that he said, \u2018I am the King of the Jews.\u2019"\nPilate answered,\n"What I have written, I have written."\n\nWhen the soldiers had crucified Jesus,\nthey took his clothes and divided them into four shares,\na share for each soldier.\nThey also took his tunic, but the tunic was seamless,\nwoven in one piece from the top down.\nSo they said to one another,\n"Let\u2019s not tear it, but cast lots for it to see whose it will be,"\nin order that the passage of Scripture might be fulfilled that says:\nThey divided my garments among them,\nand for my vesture they cast lots.\nThis is what the soldiers did.\nStanding by the cross of Jesus were his mother\nand his mother\u2019s sister, Mary the wife of Clopas,\nand Mary of Magdala.\nWhen Jesus saw his mother and the disciple there whom he loved\nhe said to his mother, "Woman, behold, your son."\nThen he said to the disciple,\n"Behold, your mother."\nAnd from that hour the disciple took her into his home.\n\nAfter this, aware that everything was now finished,\nin order that the Scripture might be fulfilled,\nJesus said, "I thirst."\nThere was a vessel filled with common wine.\nSo they put a sponge soaked in wine on a sprig of hyssop\nand put it up to his mouth.\nWhen Jesus had taken the wine, he said,\n"It is finished."\nAnd bowing his head, he handed over the spirit.\n\nNow since it was preparation day,\nin order that the bodies might not remain on the cross on the sabbath,\nfor the sabbath day of that week was a solemn one,\nthe Jews asked Pilate that their legs be broken\nand that they be taken down.\nSo the soldiers came and broke the legs of the first\nand then of the other one who was crucified with Jesus.\nBut when they came to Jesus and saw that he was already dead,\nthey did not break his legs,\nbut one soldier thrust his lance into his side,\nand immediately blood and water flowed out.\nAn eyewitness has testified, and his testimony is true;\nhe knows that he is speaking the truth,\nso that you also may come to believe.\nFor this happened so that the Scripture passage might be fulfilled:\nNot a bone of it will be broken.\nAnd again another passage says:\nThey will look upon him whom they have pierced.\n\nAfter this, Joseph of Arimathea,\nsecretly a disciple of Jesus for fear of the Jews,\nasked Pilate if he could remove the body of Jesus.\nAnd Pilate permitted it.\nSo he came and took his body.\nNicodemus, the one who had first come to him at night,\nalso came bringing a mixture of myrrh and aloes\nweighing about one hundred pounds.\nThey took the body of Jesus\nand bound it with burial cloths along with the spices,\naccording to the Jewish burial custom.\nNow in the place where he had been crucified there was a garden,\nand in the garden a new tomb, in which no one had yet been buried.\nSo they laid Jesus there because of the Jewish preparation day;\nfor the tomb was close by.` }] },
  "2026-04-04": { feast: "Holy Saturday \u2014 The Easter Vigil", color: "white",
    feastInfo: { title: "The Easter Vigil", desc: "The \"mother of all vigils\" \u2014 the most ancient and solemn liturgy of the year. Beginning after nightfall, it moves through four parts: the Service of Light (the paschal candle piercing the darkness), the Liturgy of the Word (seven Old Testament readings tracing salvation history), the Liturgy of Baptism (catechumens are baptized and confirmed), and the Liturgy of the Eucharist. Alleluia returns after its 40-day absence." },
    readings: [
    { label: "Reading 1", ref: "Genesis 1:1, 26-31a", dropCap: true, text: `In the beginning, when God created the heavens and the earth,\nGod said: "Let us make man in our image, after our likeness.\nLet them have dominion over the fish of the sea,\nthe birds of the air, and the cattle,\nand over all the wild animals\nand all the creatures that crawl on the ground."\nGod created man in his image;\nin the image of God he created him;\nmale and female he created them.\nGod blessed them, saying:\n"Be fertile and multiply;\nfill the earth and subdue it.\nHave dominion over the fish of the sea, the birds of the air,\nand all the living things that move on the earth."\nGod also said:\n"See, I give you every seed-bearing plant all over the earth\nand every tree that has seed-bearing fruit on it to be your food;\nand to all the animals of the land, all the birds of the air,\nand all the living creatures that crawl on the ground,\nI give all the green plants for food."\nAnd so it happened.\nGod looked at everything he had made, and he found it very good.` },
    { label: "Responsorial Psalm", ref: "Psalm 104:1-2, 5-6, 10, 12, 13-14, 24, 35", isRefrain: true, text: `R. Lord, send out your Spirit, and renew the face of the earth.\nBless the LORD, O my soul!\nO LORD, my God, you are great indeed!\nYou are clothed with majesty and glory,\nrobed in light as with a cloak.\nR. Lord, send out your Spirit, and renew the face of the earth.\nYou fixed the earth upon its foundation,\nnot to be moved forever;\nwith the ocean, as with a garment, you covered it;\nabove the mountains the waters stood.\nR. Lord, send out your Spirit, and renew the face of the earth.\nYou send forth springs into the watercourses\nthat wind among the mountains.\nBeside them the birds of heaven dwell;\nfrom among the branches they send forth their song.\nR. Lord, send out your Spirit, and renew the face of the earth.\nYou water the mountains from your palace;\nthe earth is replete with the fruit of your works.\nYou raise grass for the cattle,\nand vegetation for man\u2019s use,\nproducing bread from the earth.\nR. Lord, send out your Spirit, and renew the face of the earth.\nHow manifold are your works, O LORD!\nIn wisdom you have wrought them all \u2014\nthe earth is full of your creatures.\nBless the LORD, O my soul!\nR. Lord, send out your Spirit, and renew the face of the earth.` },
    { label: "Reading 3", ref: "Exodus 14:15\u201415:1", dropCap: true, text: `The LORD said to Moses, "Why are you crying out to me?\nTell the children of Israel to go forward.\nAnd you, lift up your staff and, with hand outstretched over the sea,\nsplit the sea in two,\nthat the children of Israel may pass through it on dry land.\nBut I will make the Egyptians so obstinate\nthat they will go in after them.\nThen I will receive glory through Pharaoh and all his army,\nhis chariots and charioteers.\nThe Egyptians shall know that I am the LORD,\nwhen I receive glory through Pharaoh\nand his chariots and charioteers."\n\nThe angel of God, who had been leading Israel\u2019s camp,\nnow moved and went around behind them.\nThe column of cloud also, leaving the front,\ntook up its place behind them,\nso that it came between the camp of the Egyptians\nand that of Israel.\nBut the cloud now became dark, and thus the night passed\nwithout the rival camps coming any closer together\nall night long.\nThen Moses stretched out his hand over the sea,\nand the LORD swept the sea\nwith a strong east wind throughout the night\nand so turned it into dry land.\nWhen the water was thus divided,\nthe children of Israel marched into the midst of the sea on dry land,\nwith the water like a wall to their right and to their left.\n\nThe Egyptians followed in pursuit;\nall Pharaoh\u2019s horses and chariots and charioteers went after them\nright into the midst of the sea.\nIn the night watch just before dawn\nthe LORD cast through the column of the fiery cloud\nupon the Egyptian force a glance that threw it into a panic;\nand he so clogged their chariot wheels\nthat they could hardly drive.\nWith that the Egyptians sounded the retreat before Israel,\nbecause the LORD was fighting for them against the Egyptians.\n\nThen the LORD told Moses, "Stretch out your hand over the sea,\nthat the water may flow back upon the Egyptians,\nupon their chariots and their charioteers."\nSo Moses stretched out his hand over the sea,\nand at dawn the sea flowed back to its normal depth.\nThe Egyptians were fleeing head on toward the sea,\nwhen the LORD hurled them into its midst.\nAs the water flowed back,\nit covered the chariots and the charioteers\nof Pharaoh\u2019s whole army\nthat had followed the children of Israel into the sea.\nNot a single one of them escaped.\n\nBut the children of Israel had marched on dry land\nthrough the midst of the sea,\nwith the water like a wall to their right and to their left.\nThus the LORD saved Israel on that day\nfrom the power of the Egyptians.\nWhen Israel saw the Egyptians lying dead on the seashore\nand beheld the great power that the LORD\nhad shown against the Egyptians,\nthey feared the LORD and believed in him and in his servant Moses.\n\nThen Moses and the children of Israel sang this song to the LORD:\nI will sing to the LORD, for he is gloriously triumphant;\nhorse and chariot he has cast into the sea.` },
    { label: "Responsorial", ref: "Exodus 15:1-6, 17-18", isRefrain: true, text: `R. Let us sing to the Lord; he has covered himself in glory.\nI will sing to the LORD, for he is gloriously triumphant;\nhorse and chariot he has cast into the sea.\nMy strength and my courage is the LORD,\nand he has been my savior.\nHe is my God, I praise him;\nthe God of my father, I extol him.\nR. Let us sing to the Lord; he has covered himself in glory.\nThe LORD is a warrior,\nLORD is his name!\nPharaoh\u2019s chariots and army he hurled into the sea;\nthe elite of his officers were submerged in the Red Sea.\nR. Let us sing to the Lord; he has covered himself in glory.\nThe flood waters covered them,\nthey sank into the depths like a stone.\nYour right hand, O LORD, magnificent in power,\nyour right hand, O LORD, has shattered the enemy.\nR. Let us sing to the Lord; he has covered himself in glory.\nYou brought in the people you redeemed\nand planted them on the mountain of your inheritance \u2014\nthe place where you made your seat, O LORD,\nthe sanctuary, LORD, which your hands established.\nThe LORD shall reign forever and ever.\nR. Let us sing to the Lord; he has covered himself in glory.` },
    { label: "Reading 5", ref: "Isaiah 55:1-11", dropCap: true, text: `Thus says the LORD:\nAll you who are thirsty,\ncome to the water!\nYou who have no money,\ncome, receive grain and eat;\nCome, without paying and without cost,\ndrink wine and milk!\nWhy spend your money for what is not bread;\nyour wages for what fails to satisfy?\nHeed me, and you shall eat well,\nyou shall delight in rich fare.\nCome to me heedfully,\nlisten, that you may have life.\nI will renew with you the everlasting covenant,\nthe benefits assured to David.\nAs I made him a witness to the peoples,\na leader and commander of nations,\nso shall you summon a nation you knew not,\nand nations that knew you not shall run to you,\nbecause of the LORD, your God,\nthe Holy One of Israel, who has glorified you.\n\nSeek the LORD while he may be found,\ncall him while he is near.\nLet the scoundrel forsake his way,\nand the wicked man his thoughts;\nlet him turn to the LORD for mercy;\nto our God, who is generous in forgiving.\nFor my thoughts are not your thoughts,\nnor are your ways my ways, says the LORD.\nAs high as the heavens are above the earth,\nso high are my ways above your ways\nand my thoughts above your thoughts.\n\nFor just as from the heavens\nthe rain and snow come down\nand do not return there\ntill they have watered the earth,\nmaking it fertile and fruitful,\ngiving seed to the one who sows\nand bread to the one who eats,\nso shall my word be\nthat goes forth from my mouth;\nmy word shall not return to me void,\nbut shall do my will,\nachieving the end for which I sent it.` },
    { label: "Responsorial", ref: "Isaiah 12:2-3, 4, 5-6", isRefrain: true, text: `R. You will draw water joyfully from the springs of salvation.\nGod indeed is my savior;\nI am confident and unafraid.\nMy strength and my courage is the LORD,\nand he has been my savior.\nWith joy you will draw water\nat the fountain of salvation.\nR. You will draw water joyfully from the springs of salvation.\nGive thanks to the LORD, acclaim his name;\namong the nations make known his deeds,\nproclaim how exalted is his name.\nR. You will draw water joyfully from the springs of salvation.\nSing praise to the LORD for his glorious achievement;\nlet this be known throughout all the earth.\nShout with exultation, O city of Zion,\nfor great in your midst\nis the Holy One of Israel!\nR. You will draw water joyfully from the springs of salvation.` },
    { label: "Reading 7", ref: "Ezekiel 36:16-17a, 18-28", dropCap: true, text: `The word of the LORD came to me, saying:\nSon of man, when the house of Israel lived in their land,\nthey defiled it by their conduct and deeds.\nTherefore I poured out my fury upon them\nbecause of the blood that they poured out on the ground,\nand because they defiled it with idols.\nI scattered them among the nations,\ndispersing them over foreign lands;\naccording to their conduct and deeds I judged them.\nBut when they came among the nations wherever they came,\nthey served to profane my holy name,\nbecause it was said of them: "These are the people of the LORD,\nyet they had to leave their land."\nSo I have relented because of my holy name\nwhich the house of Israel profaned\namong the nations where they came.\nTherefore say to the house of Israel: Thus says the Lord GOD:\nNot for your sakes do I act, house of Israel,\nbut for the sake of my holy name,\nwhich you profaned among the nations to which you came.\nI will prove the holiness of my great name, profaned among the nations,\nin whose midst you have profaned it.\nThus the nations shall know that I am the LORD, says the Lord GOD,\nwhen in their sight I prove my holiness through you.\nFor I will take you away from among the nations,\ngather you from all the foreign lands,\nand bring you back to your own land.\nI will sprinkle clean water upon you\nto cleanse you from all your impurities,\nand from all your idols I will cleanse you.\nI will give you a new heart and place a new spirit within you,\ntaking from your bodies your stony hearts\nand giving you natural hearts.\nI will put my spirit within you and make you live by my statutes,\ncareful to observe my decrees.\nYou shall live in the land I gave your fathers;\nyou shall be my people, and I will be your God.` },
    { label: "Responsorial Psalm", ref: "Psalm 42:3, 5; 43:3, 4", isRefrain: true, text: `R. Like a deer that longs for running streams, my soul longs for you, my God.\nAthirst is my soul for God, the living God.\nWhen shall I go and behold the face of God?\nR. Like a deer that longs for running streams, my soul longs for you, my God.\nI went with the throng\nand led them in procession to the house of God,\nAmid loud cries of joy and thanksgiving,\nwith the multitude keeping festival.\nR. Like a deer that longs for running streams, my soul longs for you, my God.\nSend forth your light and your fidelity;\nthey shall lead me on\nAnd bring me to your holy mountain,\nto your dwelling-place.\nR. Like a deer that longs for running streams, my soul longs for you, my God.\nThen will I go in to the altar of God,\nthe God of my gladness and joy;\nthen will I give you thanks upon the harp,\nO God, my God!\nR. Like a deer that longs for running streams, my soul longs for you, my God.` },
    { label: "Epistle", ref: "Romans 6:3-11", dropCap: true, text: `Brothers and sisters:\nAre you unaware that we who were baptized into Christ Jesus\nwere baptized into his death?\nWe were indeed buried with him through baptism into death,\nso that, just as Christ was raised from the dead\nby the glory of the Father,\nwe too might live in newness of life.\n\nFor if we have grown into union with him through a death like his,\nwe shall also be united with him in the resurrection.\nWe know that our old self was crucified with him,\nso that our sinful body might be done away with,\nthat we might no longer be in slavery to sin.\nFor a dead person has been absolved from sin.\nIf, then, we have died with Christ,\nwe believe that we shall also live with him.\nWe know that Christ, raised from the dead, dies no more;\ndeath no longer has power over him.\nAs to his death, he died to sin once and for all;\nas to his life, he lives for God.\nConsequently, you too must think of yourselves as being dead to sin\nand living for God in Christ Jesus.` },
    { label: "Alleluia Psalm", ref: "Psalm 118:1-2, 16-17, 22-23", isRefrain: true, text: `R. Alleluia, alleluia, alleluia.\nGive thanks to the LORD, for he is good,\nfor his mercy endures forever.\nLet the house of Israel say,\n"His mercy endures forever."\nR. Alleluia, alleluia, alleluia.\nThe right hand of the LORD has struck with power;\nthe right hand of the LORD is exalted.\nI shall not die, but live,\nand declare the works of the LORD.\nR. Alleluia, alleluia, alleluia.\nThe stone the builders rejected\nhas become the cornerstone.\nBy the LORD has this been done;\nit is wonderful in our eyes.\nR. Alleluia, alleluia, alleluia.` },
    { label: "Gospel", ref: "Matthew 28:1-10", dropCap: true, text: `After the sabbath, as the first day of the week was dawning,\nMary Magdalene and the other Mary came to see the tomb.\nAnd behold, there was a great earthquake;\nfor an angel of the Lord descended from heaven,\napproached, rolled back the stone, and sat upon it.\nHis appearance was like lightning\nand his clothing was white as snow.\nThe guards were shaken with fear of him\nand became like dead men.\nThen the angel said to the women in reply,\n"Do not be afraid!\nI know that you are seeking Jesus the crucified.\nHe is not here, for he has been raised just as he said.\nCome and see the place where he lay.\nThen go quickly and tell his disciples,\n\u2018He has been raised from the dead,\nand he is going before you to Galilee;\nthere you will see him.\u2019\nBehold, I have told you."\nThen they went away quickly from the tomb,\nfearful yet overjoyed,\nand ran to announce this to his disciples.\nAnd behold, Jesus met them on their way and greeted them.\nThey approached, embraced his feet, and did him homage.\nThen Jesus said to them, "Do not be afraid.\nGo tell my brothers to go to Galilee,\nand there they will see me."` }] },

  // ─── EASTER ───
  "2026-04-05": { feast: "Easter Sunday \u2014 The Resurrection of the Lord", color: "white",
    feastInfo: { title: "Easter Sunday", desc: "Christ is risen. The stone has been rolled away, the tomb is empty, and death itself is defeated. Easter is not merely a feast day but the feast \u2014 the axis on which the entire liturgical year turns. The white vestments, the flowers, the ringing of bells, the return of the Alleluia: all creation joins in the proclamation that love is stronger than death." },
    readings: [
    { label: "First Reading", ref: "Acts 10:34a, 37-43", dropCap: true, text: `Peter proceeded to speak and said:\n"You know what has happened all over Judea,\nbeginning in Galilee after the baptism\nthat John preached,\nhow God anointed Jesus of Nazareth\nwith the Holy Spirit and power.\nHe went about doing good\nand healing all those oppressed by the devil,\nfor God was with him.\nWe are witnesses of all that he did\nboth in the country of the Jews and in Jerusalem.\nThey put him to death by hanging him on a tree.\nThis man God raised on the third day and granted that he be visible,\nnot to all the people, but to us,\nthe witnesses chosen by God in advance,\nwho ate and drank with him after he rose from the dead.\nHe commissioned us to preach to the people\nand testify that he is the one appointed by God\nas judge of the living and the dead.\nTo him all the prophets bear witness,\nthat everyone who believes in him\nwill receive forgiveness of sins through his name."` },
    { label: "Responsorial Psalm", ref: "Psalm 118:1-2, 16-17, 22-23", isRefrain: true, text: `R. This is the day the Lord has made; let us rejoice and be glad.\nGive thanks to the LORD, for he is good,\nfor his mercy endures forever.\nLet the house of Israel say,\n"His mercy endures forever."\nR. This is the day the Lord has made; let us rejoice and be glad.\n"The right hand of the LORD has struck with power;\nthe right hand of the LORD is exalted.\nI shall not die, but live,\nand declare the works of the LORD."\nR. This is the day the Lord has made; let us rejoice and be glad.\nThe stone which the builders rejected\nhas become the cornerstone.\nBy the LORD has this been done;\nit is wonderful in our eyes.\nR. This is the day the Lord has made; let us rejoice and be glad.` },
    { label: "Second Reading", ref: "Colossians 3:1-4", dropCap: true, text: `Brothers and sisters:\nIf then you were raised with Christ, seek what is above,\nwhere Christ is seated at the right hand of God.\nThink of what is above, not of what is on earth.\nFor you have died, and your life is hidden with Christ in God.\nWhen Christ your life appears,\nthen you too will appear with him in glory.` },

    summary: "Hosea insists that God desires mercy, not sacrifice. The Pharisee and the tax collector pray in the temple — only one goes home justified.",
    context: "Hosea 6:1-6 contains God's frustrated response to Israel's shallow repentance: 'Your piety is like a morning cloud, like the dew that early passes away.' God wants steadfast love (hesed), not ritual sacrifice. Luke 18:9-14 illustrates this perfectly. The Pharisee's prayer is a performance of self-congratulation; the tax collector can barely raise his eyes. Jesus' conclusion — 'everyone who exalts himself will be humbled' — echoes Hosea's warning that piety without sincerity evaporates like morning dew.",

  "2026-03-15": {

    context: "Laetare ('Rejoice') Sunday marks the midpoint of Lent, and rose vestments replace violet. The Old Testament reading from 1 Samuel 16 — the anointing of David — is the fourth station of salvation history in Year A (after Adam, Abraham, and Moses). God rejects the tall, impressive older sons and chooses the youngest shepherd boy: 'God does not see as mortals see; they look at outward appearances, but the Lord looks at the heart.' John 9, the man born blind, is the second great baptismal Gospel: the blind man moves through stages of faith (from 'the man called Jesus' to 'Lord, I believe') while the Pharisees who can see become progressively more blind. Ephesians 5:8-14 declares: 'You were once darkness, but now you are light in the Lord.'",

  "2026-03-16": {

    context: "Isaiah 65:17-21 is one of the great prophetic visions of restoration: God will 'create new heavens and a new earth,' and Jerusalem will be a place of joy rather than weeping. John 4:43-54 tells of a royal official who begs Jesus to heal his dying son. Jesus tells him to go home — the boy will live. The man believes without seeing and begins his journey home. This pairing links prophetic hope with personal faith: the new creation begins wherever someone trusts God's word without requiring proof.",

  "2026-03-17": {
    title: "Tuesday of the Fourth Week of Lent",

    context: "Ezekiel 47 describes a miraculous river that flows from the temple threshold, growing deeper and deeper — ankle-deep, knee-deep, waist-deep — until it becomes a river that cannot be crossed. Wherever it flows, the salt sea becomes fresh and everything lives. John 5:1-16 parallels this water imagery: at the pool of Bethesda ('House of Mercy'), a man has been paralyzed for thirty-eight years, waiting for the waters to stir. Jesus bypasses the mechanism entirely — he does not wait for the water but simply commands, 'Rise, take up your mat, and walk.' The Lectionary pairs temple water with healing water to show that Jesus himself is the source the prophets described.",

  "2026-03-18": {

    context: "Isaiah 49:8-15 uses the image of a mother's love — the most instinctive and enduring bond in human experience — to describe God's faithfulness to exiled Israel. Even if a mother could forget her child, God could not. John 5:17-30 is Jesus' discourse on his relationship with the Father: 'My Father is at work until now, so I am at work.' Jesus claims not just prophetic authority but divine identity — the Son does what the Father does. The Lectionary connects maternal divine love with the Father-Son relationship to show the fullness of how God relates to humanity.",

  "2026-03-19": {
    title: "Solemnity of Saint Joseph",

    context: "March 19 interrupts the Lenten weekday cycle for the Solemnity of Saint Joseph. The readings trace the Davidic covenant: 2 Samuel 7 records God's promise to David that his house and kingdom will endure forever. Romans 4 shows Abraham as the model of faith — he 'believed, hoping against hope.' Matthew 1:16-24 presents Joseph as the quiet fulfillment of both: a descendant of David who, when told his betrothed was with child by the Holy Spirit, 'did as the angel of the Lord had commanded him.' Joseph speaks no recorded words in the Gospels. His entire role is faithful action.",

  "2026-03-20": {

  "2026-03-21": {

  "2026-03-22": {

    context: "This is the climax of the Year A baptismal Gospels and the final station of Lent's salvation history (Prophets/Restoration). Ezekiel 37:12-14 — the vision of the dry bones — is God's promise to raise his people from the grave of exile. Romans 8:8-11 declares that the Spirit who raised Jesus from the dead will also give life to mortal bodies. John 11 — the raising of Lazarus — is the longest and most dramatic of Jesus' signs: he weeps at the tomb, then commands, 'Lazarus, come out!' This miracle directly triggers the decision to kill Jesus (John 11:53). Life and death are now inseparable in the narrative: giving life to Lazarus costs Jesus his own.",

  "2026-03-23": {

  "2026-03-24": {

  "2026-03-25": {

  "2026-03-27": {

  "2026-03-29": {

    context: "Palm Sunday is unique: it begins with a joyful procession (Matthew 21:1-11, Jesus entering Jerusalem on a donkey as crowds wave palms) and then shifts abruptly to the Passion narrative (Matthew 27:11-54). The contrast is the point — the same crowds who shout 'Hosanna' on Sunday will shout 'Crucify him' on Friday. Isaiah 50:4-7, the Third Servant Song, describes one who does not shield his face from buffets and spitting. Philippians 2:6-11, the great Christ hymn, traces the descent: from equality with God, to human form, to slave's death on a cross — followed by the exaltation above every name.",

  "2026-04-02": {
    title: "Holy Thursday — Mass of the Lord's Supper",

    context: "Exodus 12:1-14 institutes the Passover: each family must sacrifice a lamb, mark their doorposts with its blood, and eat the meal in haste. The destroying angel will 'pass over' the marked houses. Paul's account in 1 Corinthians 11:23-26 is the earliest written record of the Eucharist — 'This is my body, given for you. Do this in remembrance of me.' John 13:1-15 shows Jesus washing his disciples' feet, an act of shocking condescension that redefines authority as service. The three readings together reveal the Eucharist as the new Passover: Jesus is the lamb, the blood is his own, and the meal liberates not from Egyptian slavery but from sin and death.",

  "2026-04-03": {

  "2026-04-04": {

    context: "The Easter Vigil begins in total darkness. The readings trace salvation history: Genesis 1 (creation), Exodus 14-15 (the crossing of the Red Sea), Isaiah 55 (the invitation to come to the waters), and Ezekiel 36 (a new heart and a new spirit). Romans 6:3-11 reveals the baptismal meaning of it all: in baptism, we die with Christ and rise to new life. Matthew 28:1-10 is the Resurrection itself — the angel's announcement, the empty tomb, the encounter with the risen Jesus. The Vigil is the original context for baptism: catechumens who prepared throughout Lent were baptized during this liturgy and received the Eucharist for the first time at dawn.",
