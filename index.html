const dates = Object.keys(READINGS_DATA).sort();
let currentDateIdx = 0;

const todayStr = new Date().toLocaleDateString('en-CA');
const todayIdx = dates.indexOf(todayStr);
if (todayIdx >= 0) currentDateIdx = todayIdx;

// ══════════════════════════════════════════════════
// BOOKMARK & HIGHLIGHTS DATA
// ══════════════════════════════════════════════════
let bookmarkData = { bookmarkedDays: [], highlights: {} };

function loadBookmarks() {
  try {
    const raw = localStorage.getItem('cdr-bookmarks');
    if (raw) bookmarkData = JSON.parse(raw);
  } catch (e) { /* ignore corrupt data */ }
}

function saveBookmarks() {
  localStorage.setItem('cdr-bookmarks', JSON.stringify(bookmarkData));
}

function toggleBookmark(dateStr) {
  const idx = bookmarkData.bookmarkedDays.indexOf(dateStr);
  if (idx >= 0) {
    bookmarkData.bookmarkedDays.splice(idx, 1);
  } else {
    bookmarkData.bookmarkedDays.push(dateStr);
  }
  saveBookmarks();
  updateBookmarkBtn(dateStr);
  renderBookmarksWidget();
  renderCalendar();
}

function toggleHighlight(dateStr, paraIdx) {
  if (!bookmarkData.highlights[dateStr]) {
    bookmarkData.highlights[dateStr] = [];
  }
  const arr = bookmarkData.highlights[dateStr];
  const idx = arr.indexOf(paraIdx);
  if (idx >= 0) {
    arr.splice(idx, 1);
    if (arr.length === 0) delete bookmarkData.highlights[dateStr];
  } else {
    arr.push(paraIdx);
  }
  saveBookmarks();
}

function updateBookmarkBtn(dateStr) {
  const btn = document.getElementById('bookmarkBtn');
  const isBookmarked = bookmarkData.bookmarkedDays.includes(dateStr);
  btn.innerHTML = isBookmarked ? '&#9733;' : '&#9734;';
  btn.classList.toggle('active', isBookmarked);
}

function renderBookmarksWidget() {
  const list = document.getElementById('bookmarksList');
  if (bookmarkData.bookmarkedDays.length === 0) {
    list.innerHTML = '<span class="bookmarks-widget-empty">No bookmarks yet</span>';
    return;
  }
  const sorted = [...bookmarkData.bookmarkedDays].sort();
  list.innerHTML = sorted.map(ds => {
    const data = READINGS_DATA[ds];
    if (!data) return '';
    const d = new Date(ds + 'T12:00:00');
    const abbrev = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `<div class="bookmark-item" data-date="${ds}">
      <span class="bookmark-item-text">${data.feast}</span>
      <span class="bookmark-item-date">${abbrev}</span>
      <button class="bookmark-item-remove" data-date="${ds}" title="Remove bookmark">&times;</button>
    </div>`;
  }).join('');

  // Click to navigate
  list.querySelectorAll('.bookmark-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('bookmark-item-remove')) return;
      const ds = item.dataset.date;
      const idx = dates.indexOf(ds);
      if (idx >= 0) {
        currentDateIdx = idx;
        loadDay();
      }
    });
  });

  // Remove button
  list.querySelectorAll('.bookmark-item-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleBookmark(btn.dataset.date);
    });
  });
}

loadBookmarks();

// ══════════════════════════════════════════════════
// BACKGROUND GRADIENT (radial point-mapped)
// ══════════════════════════════════════════════════
function paintBackground(colorKey) {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width = window.innerWidth;
  const h = canvas.height = window.innerHeight;

  const c = COLORS[colorKey] || COLORS.violet;

  // Create a rich, point-mapped radial gradient
  // Main background fill
  ctx.fillStyle = c.bg2;
  ctx.fillRect(0, 0, w, h);

  // Top-left radial glow
  const g1 = ctx.createRadialGradient(w * 0.15, h * 0.1, 0, w * 0.15, h * 0.1, w * 0.7);
  g1.addColorStop(0, c.bg3 + 'cc');
  g1.addColorStop(0.5, c.bg1 + '88');
  g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, w, h);

  // Center-right radial
  const g2 = ctx.createRadialGradient(w * 0.8, h * 0.45, 0, w * 0.8, h * 0.45, w * 0.55);
  g2.addColorStop(0, c.bg1 + 'aa');
  g2.addColorStop(0.6, c.bg2 + '66');
  g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, w, h);

  // Bottom accent glow
  const g3 = ctx.createRadialGradient(w * 0.5, h * 0.95, 0, w * 0.5, h * 0.95, w * 0.5);
  g3.addColorStop(0, c.bg3 + '55');
  g3.addColorStop(0.4, c.bg2 + '33');
  g3.addColorStop(1, 'transparent');
  ctx.fillStyle = g3;
  ctx.fillRect(0, 0, w, h);

  // Subtle top highlight
  const g4 = ctx.createRadialGradient(w * 0.45, 0, 0, w * 0.45, 0, h * 0.35);
  g4.addColorStop(0, c.accent + '18');
  g4.addColorStop(1, 'transparent');
  ctx.fillStyle = g4;
  ctx.fillRect(0, 0, w, h);
}

// ══════════════════════════════════════════════════
// LITURGICAL COLORS
// ══════════════════════════════════════════════════
function applyColors(colorKey) {
  const c = COLORS[colorKey] || COLORS.violet;
  const root = document.documentElement.style;
  root.setProperty('--lit-bg-1', c.bg1);
  root.setProperty('--lit-bg-2', c.bg2);
  root.setProperty('--lit-bg-3', c.bg3);
  root.setProperty('--lit-accent', c.accent);
  // Repaint canvas
  paintBackground(colorKey);
}

// ══════════════════════════════════════════════════
// LITURGICAL CALENDAR DROPDOWN
// ══════════════════════════════════════════════════
let calMonth = null; // { year, month } currently displayed in dropdown

function renderCalendar() {
  if (!calMonth) {
    const d = new Date(dates[currentDateIdx] + 'T12:00:00');
    calMonth = { year: d.getFullYear(), month: d.getMonth() };
  }

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = `${monthNames[calMonth.month]} ${calMonth.year}`;

  // Weekday headers
  const weekdaysEl = document.getElementById('calWeekdays');
  weekdaysEl.innerHTML = ['S','M','T','W','T','F','S'].map(d => `<span class="cal-weekday">${d}</span>`).join('');

  // Build grid
  const grid = document.getElementById('calGrid');
  const firstDay = new Date(calMonth.year, calMonth.month, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(calMonth.year, calMonth.month + 1, 0).getDate();

  const currentDateStr = dates[currentDateIdx];
  const todayStr = new Date().toISOString().split('T')[0];

  let html = '';

  // Empty cells before first day
  for (let i = 0; i < startDow; i++) {
    html += '<button class="cal-day empty" disabled></button>';
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${calMonth.year}-${String(calMonth.month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const data = READINGS_DATA[ds];
    const idx = dates.indexOf(ds);
    const isInRange = idx >= 0;
    const isActive = ds === currentDateStr;
    const isToday = ds === todayStr;

    const cls = ['cal-day'];
    if (isActive) cls.push('active');
    if (isToday) cls.push('is-today');
    if (!isInRange) cls.push('outside');
    if (bookmarkData.bookmarkedDays.includes(ds)) cls.push('bookmarked');

    const litColor = data ? (COLORS[data.color]?.dot || '#9060b0') : '';
    const bgStyle = litColor ? `background:${litColor}22; box-shadow: 0 0 8px ${litColor}44, inset 0 0 6px ${litColor}33; color:${litColor};` : '';
    const todayUnderline = isToday && litColor ? `text-decoration-color:${litColor};` : '';

    html += `<button class="${cls.join(' ')}" ${isInRange ? `data-idx="${idx}"` : 'disabled'} style="${bgStyle}">
      <span class="cal-day-num" style="${todayUnderline}">${day}</span>
    </button>`;
  }

  grid.innerHTML = html;

  // Attach click handlers
  grid.querySelectorAll('.cal-day[data-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      if (idx !== currentDateIdx) {
        currentDateIdx = idx;
        loadDay();
      }
    });
  });

  // Legend
  const legendEl = document.getElementById('calLegend');
  const usedColors = new Set();
  dates.forEach(ds => {
    const m = new Date(ds + 'T12:00:00');
    if (m.getMonth() === calMonth.month && m.getFullYear() === calMonth.year) {
      usedColors.add(READINGS_DATA[ds].color);
    }
  });

  const colorLabels = { violet: 'Violet', green: 'Green', white: 'White', red: 'Red', rose: 'Rose', black: 'Black', gold: 'Gold' };
  legendEl.innerHTML = [...usedColors].map(c => {
    const dot = COLORS[c]?.dot || '#999';
    return `<span class="cal-legend-item"><span class="cal-legend-swatch" style="background:${dot}33; box-shadow: 0 0 4px ${dot}44; border: 1px solid ${dot}55;"></span>${colorLabels[c] || c}</span>`;
  }).join('');

  // Month nav bounds
  const firstDate = new Date(dates[0] + 'T12:00:00');
  const lastDate = new Date(dates[dates.length - 1] + 'T12:00:00');
  document.getElementById('calPrevMonth').disabled =
    calMonth.year <= firstDate.getFullYear() && calMonth.month <= firstDate.getMonth();
  document.getElementById('calNextMonth').disabled =
    calMonth.year >= lastDate.getFullYear() && calMonth.month >= lastDate.getMonth();
}

// Month navigation
document.getElementById('calPrevMonth').addEventListener('click', (e) => {
  e.stopPropagation();
  calMonth.month--;
  if (calMonth.month < 0) { calMonth.month = 11; calMonth.year--; }
  renderCalendar();
});
document.getElementById('calNextMonth').addEventListener('click', (e) => {
  e.stopPropagation();
  calMonth.month++;
  if (calMonth.month > 11) { calMonth.month = 0; calMonth.year++; }
  renderCalendar();
});

// ══════════════════════════════════════════════════
// USCCB URL helper
// ══════════════════════════════════════════════════
function usccbUrl(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(-2);
  return `https://bible.usccb.org/bible/readings/${mm}${dd}${yy}.cfm`;
}

// ══════════════════════════════════════════════════
// CONTENT BUILDING
// ══════════════════════════════════════════════════
function buildReadingItems(data, dateStr) {
  const items = [];
  const hasFullText = data.readings.some(r => r.text);
  let paraIdx = 0; // global paragraph index for highlight tracking

  if (hasFullText) {
    // Full text mode
    data.readings.forEach((reading, rIdx) => {
      if (!reading.text) return;
      if (rIdx > 0) {
        items.push({ type: 'divider', html: '<div class="section-divider-mark">\u00b7 \u00b7 \u00b7</div>' });
      }
      items.push({
        type: 'heading',
        html: `<div class="section-heading">${reading.label}</div><div class="section-ref">${reading.ref}</div>`
      });
      // Split text into stanzas (\n\n) then couplets (2–3 lines ending
      // at a clause boundary).  Each couplet becomes one pagination item
      // so the engine can break between any two without clipping.
      // A stanza-break marker is inserted between stanzas for spacing.
      const stanzas = reading.text.split('\n\n');
      let globalParaIdx = 0;

      stanzas.forEach((stanza, sIdx) => {
        if (sIdx > 0) {
          // Visual stanza gap — small spacer the paginator can drop at
          // page boundaries without leaving a visible gap.
          items.push({ type: 'spacer', html: '<div style="height:8px"></div>' });
        }

        const rawLines = stanza.split('\n');

        // Group into couplets: accumulate up to 3 lines, flushing when
        // a line ends a clause (. ? ! ; : " \u201D) or the cap is hit.
        const couplets = [];
        let group = [];
        for (let li = 0; li < rawLines.length; li++) {
          group.push(rawLines[li]);
          const trimmed = rawLines[li].trimEnd();
          const endsClause = /[.?!;:"\u201D]$/.test(trimmed);
          if (endsClause || group.length >= 3) {
            couplets.push(group);
            group = [];
          }
        }
        if (group.length) couplets.push(group);

        couplets.forEach((couplet) => {
          let html = couplet.map(line => {
            let l = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            if (reading.isRefrain) {
              l = l.replace(/^(R\..*)$/, '<span class="refrain">$1</span>');
            }
            return l;
          }).join('<br>');

          const isFirst = globalParaIdx === 0;
          const wrapClass = (isFirst && reading.dropCap) ? 'reading-text-wrap drop-cap' : 'reading-text-wrap';
          items.push({
            type: 'paragraph',
            html: `<div class="${wrapClass}" data-para-idx="${paraIdx}"><p>${html}</p></div>`,
            isFirstPara: isFirst,
            headingIdx: items.length - 1,
            paraIdx: paraIdx
          });
          paraIdx++;
          globalParaIdx++;
        });
      });
    });
  } else {
    // Reference-only mode: show reading list + USCCB link
    let listHtml = '<ul class="reading-ref-list">';
    data.readings.forEach(r => {
      listHtml += `<li><span class="ref-label">${r.label}</span><span class="ref-cite">${r.ref}</span></li>`;
    });
    listHtml += '</ul>';
    items.push({ type: 'paragraph', html: listHtml });
    items.push({ type: 'paragraph', html: `<div class="usccb-link-box"><a href="${usccbUrl(dateStr)}" target="_blank" rel="noopener">Read Full Text on USCCB &rarr;</a></div>` });
  }
  return items;
}

// ══════════════════════════════════════════════════
// RENDER CONTENT (scroll-based, replaces pagination)
// ══════════════════════════════════════════════════
function renderContent(items) {
  const container = document.getElementById('pageInner');
  container.innerHTML = items.map(i => i.html).join('');
  container.scrollTop = 0;

  // Apply highlights to reading paragraphs (not during prayer/analysis views)
  if (!showingPrayer) {
    const dateStr = dates[currentDateIdx];
    const dayHighlights = bookmarkData.highlights[dateStr] || [];
    container.querySelectorAll('.reading-text-wrap[data-para-idx]').forEach(el => {
      const idx = parseInt(el.dataset.paraIdx);
      el.classList.add('highlightable');
      if (dayHighlights.includes(idx)) {
        el.classList.add('highlighted');
      }
      el.addEventListener('click', () => {
        toggleHighlight(dateStr, idx);
        el.classList.toggle('highlighted');
        el.classList.add('highlight-pulse');
        el.addEventListener('animationend', () => {
          el.classList.remove('highlight-pulse');
        }, { once: true });
      });
    });
  }

  // Re-attach back button if showing a prayer/analysis
  if (showingPrayer) {
    const backBtn = document.getElementById('backToReadings');
    if (backBtn) {
      backBtn.addEventListener('click', () => {
        showingPrayer = false;
        loadDay();
      });
    }
  }
}

// ══════════════════════════════════════════════════
// LOAD DAY
// ══════════════════════════════════════════════════
function loadDay() {
  showingPrayer = false;

  // Always restore calendar element to sidebar before rendering
  const calEl = document.getElementById('sidebarCalendar');
  if (calEl && calEl.parentElement !== document.getElementById('rightSidebar')) {
    const widgetBox = document.querySelector('.widget-box');
    document.getElementById('rightSidebar').insertBefore(calEl, widgetBox);
    calEl.style.display = '';
  }

  const dateStr = dates[currentDateIdx];
  const data = READINGS_DATA[dateStr];
  if (!data) return;

  applyColors(data.color);

  const d = new Date(dateStr + 'T12:00:00');
  const yearLabel = data.yearCycle ? ` \u2014 ${data.yearCycle}` : '';
  document.getElementById('feastName').textContent = data.feast + yearLabel;
  document.getElementById('dateText').textContent = d.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });

  document.getElementById('datePicker').value = dateStr;
  renderCalendar();

  document.getElementById('prevDay').disabled = currentDateIdx === 0;
  document.getElementById('nextDay').disabled = currentDateIdx === dates.length - 1;

  // Feast sidebar
  const feastCard = document.getElementById('feastCard');
  if (data.feastInfo) {
    feastCard.classList.remove('empty');
    document.getElementById('feastCardTitle').textContent = data.feastInfo.title;
    document.getElementById('feastCardDesc').textContent = data.feastInfo.desc;
  } else {
    feastCard.classList.add('empty');
  }

  // Build content and render
  const items = buildReadingItems(data, dateStr);
  renderContent(items);

  // Update bookmark button and widget
  updateBookmarkBtn(dateStr);
  renderBookmarksWidget();

  // Reset to reading section
  currentSection = 'reading';
  document.querySelectorAll('.icon-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.section === 'reading');
  });
}

// ══════════════════════════════════════════════════
// EVENT LISTENERS
// ══════════════════════════════════════════════════
document.getElementById('prevDay').addEventListener('click', () => {
  if (currentDateIdx > 0) { currentDateIdx--; loadDay(); }
});
document.getElementById('nextDay').addEventListener('click', () => {
  if (currentDateIdx < dates.length - 1) { currentDateIdx++; loadDay(); }
});

document.getElementById('bookmarkBtn').addEventListener('click', () => {
  toggleBookmark(dates[currentDateIdx]);
});

document.getElementById('dateDisplay').addEventListener('click', () => {
  const picker = document.getElementById('datePicker');
  picker.showPicker ? picker.showPicker() : picker.click();
});
document.getElementById('datePicker').addEventListener('change', (e) => {
  const idx = dates.indexOf(e.target.value);
  if (idx >= 0) { currentDateIdx = idx; loadDay(); }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'j' || e.key === 'J') {
    if (currentDateIdx > 0) { currentDateIdx--; loadDay(); }
  } else if (e.key === 'k' || e.key === 'K') {
    if (currentDateIdx < dates.length - 1) { currentDateIdx++; loadDay(); }
  }
});

// ══════════════════════════════════════════════════
// ICON NAVIGATION (Content Switching)
// ══════════════════════════════════════════════════
let currentSection = 'reading'; // Track which section is active

function switchSection(section) {
  const dateStr = dates[currentDateIdx];
  const data = READINGS_DATA[dateStr];
  if (!data) return;

  currentSection = section;

  // Update active button
  document.querySelectorAll('.icon-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.section === section);
  });

  const pageInner = document.getElementById('pageInner');

  if (section === 'reading') {
    // Show daily reading
    showingPrayer = false;
    const items = buildReadingItems(data, dateStr);
    renderContent(items);
  } else if (section === 'feast') {
    // Show feast day info
    showingPrayer = true;
    const items = [];

    items.push({
      type: 'heading',
      html: `<div class="prayer-title-page">${data.feastInfo?.title || data.feast}</div>`
    });

    if (data.feastInfo?.desc) {
      items.push({
        type: 'paragraph',
        html: `<div class="reading-text-wrap">${data.feastInfo.desc}</div>`
      });
    }

    items.push({
      type: 'paragraph',
      html: '<div><button class="back-to-readings" id="backToReadings">&larr; Back to Readings</button></div>'
    });

    renderContent(items);
  } else if (section === 'bookmarks') {
    // Show bookmarks list
    showingPrayer = true;
    const bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
    const items = [];

    items.push({
      type: 'heading',
      html: '<div class="prayer-title-page">Bookmarks</div>'
    });

    if (bookmarks.length === 0) {
      items.push({
        type: 'paragraph',
        html: '<div class="reading-text-wrap">No bookmarks yet. Click the star icon on any day to bookmark it.</div>'
      });
    } else {
      bookmarks.forEach(bmDate => {
        const bmData = READINGS_DATA[bmDate];
        if (bmData) {
          const d = new Date(bmDate + 'T12:00:00');
          const dateStr2 = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          items.push({
            type: 'paragraph',
            html: `<div class="reading-text-wrap"><button class="bookmark-link" data-date="${bmDate}">${bmData.feast} — ${dateStr2}</button></div>`
          });
        }
      });
    }

    items.push({
      type: 'paragraph',
      html: '<div><button class="back-to-readings" id="backToReadings">&larr; Back to Readings</button></div>'
    });

    renderContent(items);

    // Add bookmark link click handlers
    setTimeout(() => {
      document.querySelectorAll('.bookmark-link').forEach(link => {
        link.addEventListener('click', () => {
          const idx = dates.indexOf(link.dataset.date);
          if (idx >= 0) { currentDateIdx = idx; loadDay(); switchSection('reading'); }
        });
      });
    }, 0);
  } else if (section === 'prayers') {
    // Show prayers/creeds
    showingPrayer = true;
    const items = [];

    items.push({
      type: 'heading',
      html: '<div class="prayer-title-page">Prayers & Creeds</div>'
    });

    const prayerKeys = ['ourFather', 'hailMary', 'gloryBe', 'apostlesCreed', 'niceneCreed', 'confiteor'];
    prayerKeys.forEach(key => {
      const prayer = PRAYERS[key];
      if (prayer) {
        items.push({
          type: 'paragraph',
          html: `<button class="prayer-link" data-prayer="${key}"><strong>${prayer.title}</strong></button>`
        });
      }
    });

    items.push({
      type: 'paragraph',
      html: '<div><button class="back-to-readings" id="backToReadings">&larr; Back to Readings</button></div>'
    });

    renderContent(items);

    // Add prayer link click handlers
    setTimeout(() => {
      document.querySelectorAll('.prayer-link').forEach(link => {
        link.addEventListener('click', () => {
          showPrayer(link.dataset.prayer);
        });
      });
    }, 0);
  } else if (section === 'reflection') {
    // Show daily reflection/analysis
    showingPrayer = true;
    const reflection = ANALYSIS_DATA[dateStr];
    const items = [];

    if (reflection) {
      items.push({
        type: 'heading',
        html: `<div class="prayer-title-page">${reflection.title || 'Daily Reflection'}</div>`
      });

      if (reflection.context) {
        items.push({
          type: 'paragraph',
          html: `<div class="reading-text-wrap"><strong>Context:</strong> ${reflection.context}</div>`
        });
      }

      if (reflection.reflection) {
        items.push({
          type: 'paragraph',
          html: `<div class="reading-text-wrap">${reflection.reflection}</div>`
        });
      }
    } else {
      items.push({
        type: 'heading',
        html: '<div class="prayer-title-page">Daily Reflection</div>'
      });
      items.push({
        type: 'paragraph',
        html: '<div class="reading-text-wrap">No reflection available for this day.</div>'
      });
    }

    items.push({
      type: 'paragraph',
      html: '<div><button class="back-to-readings" id="backToReadings">&larr; Back to Readings</button></div>'
    });

    renderContent(items);
  } else if (section === 'calendar') {
    // Move the sidebar calendar element into the page-inner
    showingPrayer = true;
    const pageInnerEl = document.getElementById('pageInner');
    pageInnerEl.innerHTML = '<div class="prayer-title-page">Calendar</div>';

    const calEl = document.getElementById('sidebarCalendar');
    calEl.style.display = 'block';
    pageInnerEl.appendChild(calEl);

    const backDiv = document.createElement('div');
    backDiv.style.marginTop = '16px';
    backDiv.innerHTML = '<button class="back-to-readings" id="backToReadings">&larr; Back to Readings</button>';
    pageInnerEl.appendChild(backDiv);

    renderCalendar();
  }

  // Return calendar to sidebar if we're not in calendar section
  if (section !== 'calendar') {
    const calEl = document.getElementById('sidebarCalendar');
    if (calEl && calEl.parentElement !== document.getElementById('rightSidebar')) {
      document.getElementById('rightSidebar').insertBefore(calEl, document.querySelector('.widget-box'));
      calEl.style.display = '';
    }
  }

  // Re-attach back buttons
  setTimeout(() => {
    const backBtn = document.getElementById('backToReadings');
    if (backBtn) {
      backBtn.addEventListener('click', () => {
        switchSection('reading');
      });
    }
  }, 0);
}

// Icon button click handlers — tap active icon again to return to reading
document.querySelectorAll('.icon-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.section;
    if (target === currentSection && target !== 'reading') {
      switchSection('reading');
    } else {
      switchSection(target);
    }
  });
});

// Touch swipe (day navigation)
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 60) {
    if (diff > 0 && currentDateIdx < dates.length - 1) { currentDateIdx++; loadDay(); }
    else if (diff < 0 && currentDateIdx > 0) { currentDateIdx--; loadDay(); }
  }
});

// Resize — repaint background
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const dateStr = dates[currentDateIdx];
    const data = READINGS_DATA[dateStr];
    if (data) paintBackground(data.color);
  }, 200);
});

// ══════════════════════════════════════════════════
// PRAYER DISPLAY
// ══════════════════════════════════════════════════
function showPrayer(prayerKey) {
  const prayer = PRAYERS[prayerKey];
  if (!prayer) return;

  showingPrayer = true;

  // Build prayer content items for the paginator
  const items = [];

  // Back button
  items.push({
    type: 'paragraph',
    html: '<div><button class="back-to-readings" id="backToReadings">&larr; Back to Readings</button></div>'
  });

  // Title
  items.push({
    type: 'heading',
    html: `<div class="prayer-title-page">${prayer.title}</div><div class="prayer-subtitle">${prayer.latin}</div>`
  });

  // Prayer text paragraphs
  const paras = prayer.text.split('\n\n');
  paras.forEach((para, pIdx) => {
    let html = para.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const wrapClass = pIdx === 0 ? 'reading-text-wrap drop-cap' : 'reading-text-wrap';
    items.push({
      type: 'paragraph',
      html: `<div class="${wrapClass}"><p>${html}</p></div>`,
      isFirstPara: pIdx === 0
    });
  });

  renderContent(items);
}

// Wire up prayer buttons
document.getElementById('prayersWidget').addEventListener('click', (e) => {
  const btn = e.target.closest('.prayer-btn');
  if (!btn) return;
  const key = btn.dataset.prayer;
  if (key) showPrayer(key);
});

// ══════════════════════════════════════════════════
// DAILY ANALYSIS
// ══════════════════════════════════════════════════
function showAnalysis() {
  const dateKey = dates[currentDateIdx];
  const analysis = ANALYSIS_DATA[dateKey];
  if (!analysis) return;

  showingPrayer = true;

  const items = [];

  // Back button
  items.push({
    type: 'paragraph',
    html: '<div><button class="back-to-readings" id="backToReadings">&larr; Back to Readings</button></div>'
  });

  // Title & summary
  items.push({
    type: 'heading',
    html: `<div class="prayer-title-page">${analysis.title}</div><div class="prayer-subtitle">Daily Reflection</div>`
  });

  // Summary
  const sumHtml = analysis.summary.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  items.push({
    type: 'paragraph',
    html: `<div class="reading-text-wrap drop-cap"><p>${sumHtml}</p></div>`,
    isFirstPara: true
  });

  // Context section
  items.push({
    type: 'heading',
    html: `<div class="reading-heading">Liturgical Context</div>`
  });
  const ctxParas = analysis.context.split('\n\n');
  ctxParas.forEach((para) => {
    let html = para.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    items.push({
      type: 'paragraph',
      html: `<div class="reading-text-wrap"><p>${html}</p></div>`
    });
  });

  // Lessons section
  items.push({
    type: 'heading',
    html: `<div class="reading-heading">Lessons for Today</div>`
  });
  const lessonParas = analysis.lessons.split('\n\n');
  lessonParas.forEach((para) => {
    let html = para.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    items.push({
      type: 'paragraph',
      html: `<div class="reading-text-wrap"><p>${html}</p></div>`
    });
  });

  renderContent(items);
}

// Wire up analysis button
document.getElementById('analysisBtn').addEventListener('click', () => showAnalysis());

} else {

}
