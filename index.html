<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Catholic Bible Readings</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --lit-bg-1: #4a2060;
  --lit-bg-2: #2d1540;
  --lit-bg-3: #6b3a8a;
  --lit-accent: #9b6fbf;
  --page-bg: #faf7f2;
  --page-text: #2c2418;
  --heading-color: #3d1a0e;
  --ref-color: #8b6914;
  --refrain-color: #8b1a1a;
  --divider: #d4c9b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'EB Garamond', serif;
}

body {
  display: flex;
  flex-direction: column;
  padding: 0;
  position: relative;
  overflow: hidden;
}

/* ── Radial gradient background ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  transition: opacity 0.8s ease;
}

body > *:not(.bg-canvas) {
  position: relative;
  z-index: 1;
}

/* ── Navigation Bar ── */
.nav-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 10px 20px;
  gap: 12px;
  z-index: 200;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-brand .cross {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.6);
}

.nav-brand h1 {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  white-space: nowrap;
}

.hidden-date-input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
  pointer-events: none;
}

/* ── Day Header (above page card) ── */
.day-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 4px;
  background: rgba(0,0,0,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.day-header-btn {
  width: 30px;
  height: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  color: rgba(255,255,255,0.7);
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.day-header-btn:hover { background: rgba(255,255,255,0.16); }
.day-header-btn:disabled { opacity: 0.3; cursor: default; }

.day-header-info {
  text-align: center;
  cursor: pointer;
  user-select: none;
  min-width: 0;
}

.day-header-feast {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 1rem;
  color: rgba(255,255,255,0.95);
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.day-header-date {
  font-family: 'EB Garamond', serif;
  font-size: 0.78rem;
  color: rgba(255,255,255,0.55);
  margin-top: 1px;
}

/* ── Sidebar Calendar ── */
.sidebar-calendar {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
}

/* Calendar inside light page card */
.page-inner .sidebar-calendar {
  background: rgba(0,0,0,0.03);
  border-color: var(--divider);
  width: 100%;
}

.page-inner .cal-month-label {
  color: var(--heading-color);
}

.page-inner .cal-month-btn {
  border-color: var(--divider);
  background: rgba(0,0,0,0.05);
  color: var(--heading-color);
}

.page-inner .cal-weekday {
  color: var(--ref-color);
}

/* Override the per-day inline color so all days stay legible on white */
.page-inner .cal-day {
  color: var(--page-text) !important;
}

.page-inner .cal-day.outside {
  opacity: 0.25;
}

.page-inner .cal-legend-item {
  color: var(--page-text);
  opacity: 0.75;
}

.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.cal-month-label {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.06em;
}

.cal-month-btn {
  width: 22px;
  height: 22px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  color: rgba(255,255,255,0.6);
  font-size: 0.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.cal-month-btn:hover { background: rgba(255,255,255,0.15); }

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0;
  margin-bottom: 2px;
}

.cal-weekday {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.3);
  padding: 2px 0;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}

.cal-day {
  aspect-ratio: 1;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.85);
  background: transparent;
  transition: all 0.15s;
  position: relative;
  min-width: 0;
  min-height: 0;
  padding: 4px 2px;
}

.cal-day:hover { background: rgba(255,255,255,0.12); }

.cal-day.active {
  color: #fff;
  box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.8);
}

.cal-day.is-today .cal-day-num {
  text-decoration: underline;
  text-underline-offset: 2px;
}

.cal-day.empty {
  cursor: default;
  opacity: 0;
}

.cal-day.outside {
  opacity: 0.2;
  cursor: default;
}

.cal-day-num {
  line-height: 1;
}

.cal-legend {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  padding-top: 5px;
  border-top: 1px solid rgba(255,255,255,0.08);
  flex-wrap: wrap;
}

.cal-legend-item {
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: 'EB Garamond', serif;
  font-size: 0.55rem;
  color: rgba(255,255,255,0.4);
}

.cal-legend-swatch {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* ── Content Area (single column + sidebar) ── */
.content-area {
  flex: 1 1 0;
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 20px 40px 12px 40px;
  min-height: 0;
  position: relative;
  gap: 24px;
}

.page-column {
  position: relative;
  flex: 1 1 0;
  max-width: 640px;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.page-card {
  flex: 1 1 0;
  min-height: 0;
  background: var(--page-bg);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 2px 10px rgba(0,0,0,0.15);
  position: relative;
}

.page-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: 40px 48px;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.page-inner::-webkit-scrollbar {
  width: 6px;
}

.page-inner::-webkit-scrollbar-track {
  background: transparent;
}

.page-inner::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.15);
  border-radius: 3px;
}

.page-inner::-webkit-scrollbar-thumb:hover {
  background: rgba(0,0,0,0.25);
}

/* ── Typography ── */
.reading-text, .reading-text-wrap {
  font-family: 'EB Garamond', serif;
  font-size: 0.95rem;
  line-height: 1.65;
  color: var(--page-text);
}

.reading-text p, .reading-text-wrap p {
  margin-bottom: 6px;
}

.section-heading {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--heading-color);
  margin-bottom: 2px;
  letter-spacing: 0.02em;
}

.section-ref {
  font-family: 'EB Garamond', serif;
  font-weight: 500;
  font-size: 0.78rem;
  color: var(--ref-color);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

.section-divider-mark {
  text-align: center;
  color: var(--divider);
  font-size: 0.9rem;
  letter-spacing: 0.5em;
  margin: 14px 0;
}

/* Drop caps */
.drop-cap p:first-child::first-letter {
  float: left;
  font-family: 'Cinzel', serif;
  font-size: 3.2em;
  line-height: 0.8;
  padding-right: 6px;
  padding-top: 4px;
  color: var(--heading-color);
  font-weight: 700;
}

/* Psalm refrains */
.refrain {
  font-style: italic;
  font-weight: 600;
  color: var(--refrain-color);
}

/* USCCB link for days without embedded text */
.usccb-link-box {
  text-align: center;
  padding: 32px 20px;
}

.usccb-link-box a {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  color: var(--heading-color);
  border: 1px solid var(--divider);
  padding: 12px 28px;
  border-radius: 6px;
  text-decoration: none;
  transition: all 0.2s;
  letter-spacing: 0.06em;
}

.usccb-link-box a:hover {
  background: rgba(0,0,0,0.04);
  border-color: var(--heading-color);
}

.reading-ref-list {
  font-family: 'EB Garamond', serif;
  font-size: 0.95rem;
  line-height: 2.2;
  color: var(--page-text);
  list-style: none;
  padding: 0;
}

.reading-ref-list li {
  padding: 4px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.reading-ref-list .ref-label {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--heading-color);
  margin-right: 8px;
}

.reading-ref-list .ref-cite {
  color: var(--ref-color);
}

/* ── Right Sidebar ── */
.right-sidebar {
  flex: 0 0 280px;
  max-width: 280px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
  padding: 4px 0;
}

.feast-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 22px 20px;
  backdrop-filter: blur(8px);
  transition: opacity 0.4s ease;
}

.feast-card.empty { display: none; }

.feast-card-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--lit-accent);
  margin-bottom: 8px;
  opacity: 0.9;
}

.feast-card-title {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.05rem;
  color: rgba(255,255,255,0.95);
  line-height: 1.35;
  margin-bottom: 12px;
}

.feast-card-desc {
  font-family: 'EB Garamond', serif;
  font-size: 0.88rem;
  line-height: 1.6;
  color: rgba(255,255,255,0.72);
}

.widget-box {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.widget-box-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.35);
  margin-bottom: 2px;
}

.kbd-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'EB Garamond', serif;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
}

.kbd-row kbd {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  padding: 2px 6px;
  font-family: 'EB Garamond', serif;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.45);
  line-height: 1.2;
  min-width: 22px;
  text-align: center;
}

/* ── Prayers Widget ── */
.analysis-widget {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 16px 14px;
  backdrop-filter: blur(8px);
}

.analysis-widget-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--lit-accent);
  margin-bottom: 10px;
  opacity: 0.9;
}

.analysis-btn {
  display: block;
  width: 100%;
  padding: 10px 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  font-family: 'EB Garamond', serif;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.82);
  transition: all 0.2s ease;
  line-height: 1.3;
}

.analysis-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.95);
}

.analysis-btn:active {
  background: rgba(255,255,255,0.18);
}

.analysis-btn .analysis-icon {
  display: inline-block;
  margin-right: 6px;
  font-size: 0.8rem;
  opacity: 0.6;
}

.prayers-widget {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 16px 14px;
  backdrop-filter: blur(8px);
}

.prayers-widget-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--lit-accent);
  margin-bottom: 10px;
  opacity: 0.9;
}

.prayer-btn {
  display: block;
  width: 100%;
  padding: 8px 12px;
  margin-bottom: 5px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  font-family: 'EB Garamond', serif;
  font-size: 0.82rem;
  color: rgba(255,255,255,0.82);
  transition: all 0.2s ease;
  line-height: 1.3;
}

.prayer-btn:last-child { margin-bottom: 0; }

.prayer-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.95);
}

.prayer-btn:active {
  background: rgba(255,255,255,0.18);
}

.prayer-btn .prayer-icon {
  display: inline-block;
  margin-right: 6px;
  font-size: 0.75rem;
  opacity: 0.6;
}

/* Prayer and Bookmark links in content area */
.prayer-link,
.bookmark-link {
  display: block;
  width: 100%;
  padding: 10px 12px;
  margin: 8px 0;
  border: 1px solid var(--divider);
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  font-family: 'EB Garamond', serif;
  font-size: 0.95rem;
  color: var(--heading-color);
  transition: all 0.2s ease;
}

.prayer-link:hover,
.bookmark-link:hover {
  background: rgba(255,255,255,0.12);
  border-color: var(--heading-color);
  transform: translateX(4px);
}

.prayer-link:active,
.bookmark-link:active {
  background: rgba(255,255,255,0.18);
}

/* Back to readings button in book */
.back-to-readings {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  color: var(--ref-color);
  border: 1px solid var(--divider);
  padding: 7px 18px;
  border-radius: 6px;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.06em;
  background: none;
  margin-bottom: 16px;
}

.back-to-readings:hover {
  background: rgba(0,0,0,0.04);
  border-color: var(--heading-color);
}

.prayer-title-page {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--heading-color);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.prayer-subtitle {
  font-family: 'EB Garamond', serif;
  font-size: 0.78rem;
  color: var(--ref-color);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Footer ── */
.footer-line {
  flex-shrink: 0;
  text-align: center;
  padding: 6px 0 10px;
}

.footer-line a {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-family: 'EB Garamond', serif;
  font-size: 0.7rem;
  letter-spacing: 0.05em;
}

.footer-line span {
  color: rgba(255,255,255,0.25);
  font-family: 'EB Garamond', serif;
  font-size: 0.65rem;
}

/* ── Icon Navigation (Tab buttons) ── */
.icon-nav {
  display: none; /* hidden on desktop — sidebar handles navigation */
}

@media (max-width: 900px) {
  .icon-nav {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: color-mix(in srgb, var(--lit-bg-1) 75%, transparent);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    overflow-x: auto;
    justify-content: center;
    z-index: 150;
  }
}

.icon-btn {
  flex: 0 0 auto;
  width: 50px;
  height: 50px;
  border: 2px solid transparent;
  border-radius: 8px;
  background: color-mix(in srgb, var(--lit-accent) 15%, transparent);
  color: rgba(255,255,255,0.8);
  cursor: pointer;
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  padding: 0;
}

.icon-btn:hover {
  background: color-mix(in srgb, var(--lit-accent) 30%, transparent);
  transform: scale(1.05);
}

.icon-btn.active {
  border-color: color-mix(in srgb, var(--lit-accent) 80%, white);
  background: color-mix(in srgb, var(--lit-accent) 40%, transparent);
}

.icon-emoji {
  display: inline-block;
}

/* ── Responsive ── */
@media (max-width: 1100px) {
  .right-sidebar { flex: 0 0 220px; max-width: 220px; }
  .feast-card { padding: 16px 14px; }
  .feast-card-title { font-size: 0.95rem; }
  .feast-card-desc { font-size: 0.82rem; }
}

@media (max-width: 900px) {
  .content-area { padding: 12px 20px 8px; flex-direction: column; gap: 12px; }
  .right-sidebar {
    flex: 0 0 auto;
    max-width: 100%;
    width: 100%;
    flex-direction: row;
    flex-wrap: wrap;
    max-height: none;
    height: auto;
    overflow-y: visible;
    padding: 0;
  }
  .feast-card { flex: 1 1 0; }
  .widget-box { flex: 1 1 0; }
  .sidebar-calendar { flex: 1 1 100%; }
  .page-inner { padding: 28px 28px; }
  .section-heading { font-size: 1.15rem; }
  .reading-text, .reading-text-wrap { font-size: 0.88rem; }
  .drop-cap p:first-child::first-letter { font-size: 2.6em; }
  .day-header-feast { font-size: 0.9rem; }
}

@media (max-width: 640px) {
  /* Mobile-first: prioritize reading content */
  .content-area {
    padding: 12px 12px 8px 12px;
    flex-direction: column;
    gap: 0;
  }

  .page-column {
    flex: 1 1 auto;
    min-height: 0;
    padding: 0;
  }

  /* Hide sidebar on mobile - content loads via icon nav buttons */
  .right-sidebar {
    display: none !important;
  }

  .page-inner {
    padding: 24px 20px;
  }

  .section-heading {
    font-size: 1.02rem;
    margin-top: 14px;
  }

  .reading-text, .reading-text-wrap {
    font-size: 0.85rem;
    line-height: 1.6;
  }

  .nav-bar {
    padding: 8px 12px;
    gap: 8px;
  }

  .day-header {
    padding: 8px 12px;
    font-size: 0.9rem;
  }

  .day-header-feast {
    font-size: 0.75rem;
  }

  .day-header-date {

/* ── Verse Highlighting ── */
.reading-text-wrap.highlightable {
  cursor: pointer;
  transition: background 0.15s, border-left 0.15s, transform 0.15s;
  border-left: 2px solid transparent;
  padding-left: 6px;
  margin-left: -8px;
}

.reading-text-wrap.highlightable:hover {
  background: rgba(139, 105, 20, 0.04);
}

.reading-text-wrap.highlighted {
  background: rgba(139, 105, 20, 0.08);
  border-left: 2px solid var(--lit-accent);
}

@keyframes highlight-pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.005); }
  100% { transform: scale(1); }
}

.reading-text-wrap.highlight-pulse {
  animation: highlight-pulse 150ms ease;
}

/* ── Bookmark Button (day header) ── */
.bookmark-btn {
  width: 30px;
  height: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  color: rgba(255,255,255,0.7);
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  line-height: 1;
}

.bookmark-btn:hover { background: rgba(255,255,255,0.16); }

.bookmark-btn.active {
  color: var(--lit-accent);
  border-color: var(--lit-accent);
  background: rgba(255,255,255,0.1);
}

/* ── Bookmarks Sidebar Widget ── */
.bookmarks-widget {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.bookmarks-widget-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.35);

}

.bookmarks-widget-empty {

  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
}

.bookmark-item {

  gap: 6px;
  padding: 5px 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.bookmark-item:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
}

.bookmark-item-text {
  flex: 1;
  font-family: 'EB Garamond', serif;
  font-size: 0.78rem;
  color: rgba(255,255,255,0.82);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bookmark-item-date {
  font-family: 'EB Garamond', serif;
  font-size: 0.68rem;
  color: rgba(255,255,255,0.4);
  white-space: nowrap;
}

.bookmark-item-remove {
  border: none;
  background: none;
  color: rgba(255,255,255,0.3);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  transition: color 0.2s;
}

.bookmark-item-remove:hover {
  color: rgba(255,255,255,0.7);
}

/* ── Calendar bookmark star ── */
.cal-day.bookmarked::after {

  right: 1px;
  font-size: 0.4rem;
  line-height: 1;
  color: var(--lit-accent);
  opacity: 0.9;
}

    readings: [
    { label: "First Reading", ref: "Genesis 2:7-9; 3:1-7", dropCap: true, text: `The LORD God formed man out of the clay of the ground\nand blew into his nostrils the breath of life,\nand so man became a living being.\n\nThen the LORD God planted a garden in Eden, in the east,\nand placed there the man whom he had formed.\nOut of the ground the LORD God made various trees grow\nthat were delightful to look at and good for food,\nwith the tree of life in the middle of the garden\nand the tree of the knowledge of good and evil.\n\nNow the serpent was the most cunning of all the animals\nthat the LORD God had made.\nThe serpent asked the woman,\n"Did God really tell you not to eat\nfrom any of the trees in the garden?"\nThe woman answered the serpent:\n"We may eat of the fruit of the trees in the garden;\nit is only about the fruit of the tree\nin the middle of the garden that God said,\n'You shall not eat it or even touch it, lest you die.'"\nBut the serpent said to the woman:\n"You certainly will not die!\nNo, God knows well that the moment you eat of it\nyour eyes will be opened and you will be like gods\nwho know what is good and what is evil."\nThe woman saw that the tree was good for food,\npleasing to the eyes, and desirable for gaining wisdom.\nSo she took some of its fruit and ate it;\nand she also gave some to her husband, who was with her,\nand he ate it.\nThen the eyes of both of them were opened,\nand they realized that they were naked;\nso they sewed fig leaves together\nand made loincloths for themselves.` },
    { label: "Responsorial Psalm", ref: "Psalm 51:3-4, 5-6, 12-13, 17", isRefrain: true, text: `R. Be merciful, O Lord, for we have sinned.\n\nHave mercy on me, O God, in your goodness;\nin the greatness of your compassion wipe out my offense.\nThoroughly wash me from my guilt\nand of my sin cleanse me.\n\nR. Be merciful, O Lord, for we have sinned.\n\nFor I acknowledge my offense,\nand my sin is before me always:\n"Against you only have I sinned,\nand done what is evil in your sight."\n\nR. Be merciful, O Lord, for we have sinned.\n\nA clean heart create for me, O God,\nand a steadfast spirit renew within me.\nCast me not out from your presence,\nand your Holy Spirit take not from me.\n\nR. Be merciful, O Lord, for we have sinned.\n\nGive me back the joy of your salvation,\nand a willing spirit sustain in me.\nO Lord, open my lips,\nand my mouth shall proclaim your praise.\n\nR. Be merciful, O Lord, for we have sinned.` },
    { label: "Second Reading", ref: "Romans 5:12-19", dropCap: true, text: `Brothers and sisters:\nThrough one man sin entered the world,\nand through sin, death,\nand thus death came to all men, inasmuch as all sinned—\nfor up to the time of the law, sin was in the world,\nthough sin is not accounted when there is no law.\nBut death reigned from Adam to Moses,\neven over those who did not sin\nafter the pattern of the trespass of Adam,\nwho is the type of the one who was to come.\nBut the gift is not like the transgression.\nFor if by the transgression of the one, the many died,\nhow much more did the grace of God\nand the gracious gift of the one man Jesus Christ\noverflow for the many.\nAnd the gift is not like the result of the one who sinned.\nFor after one sin there was the judgment that brought condemnation;\nbut the gift, after many transgressions, brought acquittal.\nFor if, by the transgression of the one,\ndeath came to reign through that one,\nhow much more will those who receive the abundance of grace\nand of the gift of justification\ncome to reign in life through the one Jesus Christ.\nIn conclusion, just as through one transgression\ncondemnation came upon all,\nso, through one righteous act,\nacquittal and life came to all.\nFor just as through the disobedience of the one man\nthe many were made sinners,\nso, through the obedience of the one,\nthe many will be made righteous.` },
    { label: "Gospel", ref: "Matthew 4:1-11", dropCap: true, text: `At that time Jesus was led by the Spirit into the desert\nto be tempted by the devil.\nHe fasted for forty days and forty nights,\nand afterwards he was hungry.\nThe tempter approached and said to him,\n"If you are the Son of God,\ncommand that these stones become loaves of bread."\nHe said in reply,\n"It is written:\nOne does not live on bread alone,\nbut on every word that comes forth\nfrom the mouth of God."\n\nThen the devil took him to the holy city,\nand made him stand on the parapet of the temple,\nand said to him, "If you are the Son of God, throw yourself down.\nFor it is written:\nHe will command his angels concerning you\nand with their hands they will support you,\nlest you dash your foot against a stone."\nJesus answered him,\n"Again it is written,\nYou shall not put the Lord, your God, to the test."\nThen the devil took him up to a very high mountain,\nand showed him all the kingdoms of the world in their magnificence,\nand he said to him, "All these I shall give to you,\nif you will prostrate yourself and worship me."\nAt this, Jesus said to him,\n"Get away, Satan!\nIt is written:\nThe Lord, your God, shall you worship\nand him alone shall you serve."\n\nThen the devil left him and, behold,\nangels came and ministered to him.` }] },
  "2026-02-23": { feast: "Monday of the First Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Leviticus 19:1-2, 11-18", dropCap: true, text: `The LORD said to Moses,\n"Speak to the whole assembly of the children of Israel and tell them:\nBe holy, for I, the LORD, your God, am holy.\n\n"You shall not steal.\nYou shall not lie or speak falsely to one another.\nYou shall not swear falsely by my name,\nthus profaning the name of your God.\nI am the LORD.\n\n"You shall not defraud or rob your neighbor.\nYou shall not withhold overnight the wages of your day laborer.\nYou shall not curse the deaf,\nor put a stumbling block in front of the blind,\nbut you shall fear your God.\nI am the LORD.\n\n"You shall not act dishonestly in rendering judgment.\nShow neither partiality to the weak nor deference to the mighty,\nbut judge your fellow men justly.\nYou shall not go about spreading slander among your kin;\nnor shall you stand by idly when your neighbor's life is at stake.\nI am the LORD.\n\n"You shall not bear hatred for your brother in your heart.\nThough you may have to reprove him,\ndo not incur sin because of him.\nTake no revenge and cherish no grudge against your fellow countrymen.\nYou shall love your neighbor as yourself.\nI am the LORD."` },
    { label: "Responsorial Psalm", ref: "Psalm 19:8, 9, 10, 15", isRefrain: true, text: `R. Your words, Lord, are Spirit and life.\n\nThe law of the LORD is perfect,\nrefreshing the soul.\nThe decree of the LORD is trustworthy,\ngiving wisdom to the simple.\n\nR. Your words, Lord, are Spirit and life.\n\nThe precepts of the LORD are right,\nrejoicing the heart.\nThe command of the LORD is clear,\nenlightening the eye.\n\nR. Your words, Lord, are Spirit and life.\n\nThe fear of the LORD is pure,\nenduring forever;\nThe ordinances of the LORD are true,\nall of them just.\n\nR. Your words, Lord, are Spirit and life.\n\nLet the words of my mouth and the thought of my heart\nfind favor before you,\nO LORD, my rock and my redeemer.\n\nR. Your words, Lord, are Spirit and life.` },
    { label: "Gospel", ref: "Matthew 25:31-46", dropCap: true, text: `Jesus said to his disciples:\n"When the Son of Man comes in his glory,\nand all the angels with him,\nhe will sit upon his glorious throne,\nand all the nations will be assembled before him.\nAnd he will separate them one from another,\nas a shepherd separates the sheep from the goats.\nHe will place the sheep on his right and the goats on his left.\nThen the king will say to those on his right,\n'Come, you who are blessed by my Father.\nInherit the kingdom prepared for you from the foundation of the world.\nFor I was hungry and you gave me food,\nI was thirsty and you gave me drink,\na stranger and you welcomed me,\nnaked and you clothed me,\nill and you cared for me,\nin prison and you visited me.'\nThen the righteous will answer him and say,\n'Lord, when did we see you hungry and feed you,\nor thirsty and give you drink?\nWhen did we see you a stranger and welcome you,\nor naked and clothe you?\nWhen did we see you ill or in prison, and visit you?'\nAnd the king will say to them in reply,\n'Amen, I say to you, whatever you did\nfor one of these least brothers of mine, you did for me.'\nThen he will say to those on his left,\n'Depart from me, you accursed,\ninto the eternal fire prepared for the Devil and his angels.\nFor I was hungry and you gave me no food,\nI was thirsty and you gave me no drink,\na stranger and you gave me no welcome,\nnaked and you gave me no clothing,\nill and in prison, and you did not care for me.'\nThen they will answer and say,\n'Lord, when did we see you hungry or thirsty\nor a stranger or naked or ill or in prison,\nand not minister to your needs?'\nHe will answer them, 'Amen, I say to you,\nwhat you did not do for one of these least ones,\nyou did not do for me.'\nAnd these will go off to eternal punishment,\nbut the righteous to eternal life."` }] },
  "2026-02-24": { feast: "Tuesday of the First Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Isaiah 55:10-11", dropCap: true, text: `Thus says the LORD:\nJust as from the heavens\nthe rain and snow come down\nAnd do not return there\ntill they have watered the earth,\nmaking it fertile and fruitful,\nGiving seed to the one who sows\nand bread to the one who eats,\nSo shall my word be\nthat goes forth from my mouth;\nIt shall not return to me void,\nbut shall do my will,\nachieving the end for which I sent it.` },
    { label: "Responsorial Psalm", ref: "Psalm 34:4-5, 6-7, 16-17, 18-19", isRefrain: true, text: `R. From all their distress God rescues the just.\n\nGlorify the LORD with me,\nlet us together extol his name.\nI sought the LORD, and he answered me\nand delivered me from all my fears.\n\nR. From all their distress God rescues the just.\n\nLook to him that you may be radiant with joy,\nand your faces may not blush with shame.\nWhen the poor one called out, the LORD heard,\nand from all his distress he saved him.\n\nR. From all their distress God rescues the just.\n\nThe LORD has eyes for the just,\nand ears for their cry.\nThe LORD confronts the evildoers,\nto destroy remembrance of them from the earth.\n\nR. From all their distress God rescues the just.\n\nWhen the just cry out, the LORD hears them,\nand from all their distress he rescues them.\nThe LORD is close to the brokenhearted;\nand those who are crushed in spirit he saves.\n\nR. From all their distress God rescues the just.` },
    { label: "Gospel", ref: "Matthew 6:7-15", dropCap: true, text: `Jesus said to his disciples:\n"In praying, do not babble like the pagans,\nwho think that they will be heard because of their many words.\nDo not be like them.\nYour Father knows what you need before you ask him.\n\n"This is how you are to pray:\n\nOur Father who art in heaven,\nhallowed be thy name,\nthy Kingdom come,\nthy will be done,\non earth as it is in heaven.\nGive us this day our daily bread;\nand forgive us our trespasses,\nas we forgive those who trespass against us;\nand lead us not into temptation,\nbut deliver us from evil.\n\n"If you forgive men their transgressions,\nyour heavenly Father will forgive you.\nBut if you do not forgive men,\nneither will your Father forgive your transgressions."` }] },
  "2026-02-25": { feast: "Wednesday of the First Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Jonah 3:1-10", dropCap: true, text: `The word of the LORD came to Jonah a second time:\n"Set out for the great city of Nineveh,\nand announce to it the message that I will tell you."\nSo Jonah made ready and went to Nineveh,\naccording to the LORD's bidding.\nNow Nineveh was an enormously large city;\nit took three days to go through it.\nJonah began his journey through the city,\nand had gone but a single day's walk announcing,\n"Forty days more and Nineveh shall be destroyed,"\nwhen the people of Nineveh believed God;\nthey proclaimed a fast\nand all of them, great and small, put on sackcloth.\n\nWhen the news reached the king of Nineveh,\nhe rose from his throne, laid aside his robe,\ncovered himself with sackcloth, and sat in the ashes.\nThen he had this proclaimed throughout Nineveh,\nby decree of the king and his nobles:\n"Neither man nor beast, neither cattle nor sheep,\nshall taste anything;\nthey shall not eat, nor shall they drink water.\nMan and beast shall be covered with sackcloth and call loudly to God;\nevery man shall turn from his evil way\nand from the violence he has in hand.\nWho knows, God may relent and forgive, and withhold his blazing wrath,\nso that we shall not perish."\nWhen God saw by their actions how they turned from their evil way,\nhe repented of the evil that he had threatened to do to them;\nhe did not carry it out.` },
    { label: "Responsorial Psalm", ref: "Psalm 51:3-4, 12-13, 18-19", isRefrain: true, text: `R. A heart contrite and humbled, O God, you will not spurn.\n\nHave mercy on me, O God, in your goodness;\nin the greatness of your compassion wipe out my offense.\nThoroughly wash me from my guilt\nand of my sin cleanse me.\n\nR. A heart contrite and humbled, O God, you will not spurn.\n\nA clean heart create for me, O God,\nand a steadfast spirit renew within me.\nCast me not out from your presence,\nand your Holy Spirit take not from me.\n\nR. A heart contrite and humbled, O God, you will not spurn.\n\nFor you are not pleased with sacrifices;\nshould I offer a burnt offering, you would not accept it.\nMy sacrifice, O God, is a contrite spirit;\na heart contrite and humbled, O God, you will not spurn.\n\nR. A heart contrite and humbled, O God, you will not spurn.` },
    { label: "Gospel", ref: "Luke 11:29-32", dropCap: true, text: `While still more people gathered in the crowd, Jesus said to them,\n"This generation is an evil generation;\nit seeks a sign, but no sign will be given it,\nexcept the sign of Jonah.\nJust as Jonah became a sign to the Ninevites,\nso will the Son of Man be to this generation.\nAt the judgment\nthe queen of the south will rise with the men of this generation\nand she will condemn them,\nbecause she came from the ends of the earth\nto hear the wisdom of Solomon,\nand there is something greater than Solomon here.\nAt the judgment the men of Nineveh will arise with this generation\nand condemn it,\nbecause at the preaching of Jonah they repented,\nand there is something greater than Jonah here."` }] },
  "2026-02-26": { feast: "Thursday of the First Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Esther C:12, 14-16, 23-25", dropCap: true, text: `Queen Esther, seized with mortal anguish,\nhad recourse to the LORD.\nShe lay prostrate upon the ground, together with her handmaids,\nfrom morning until evening, and said:\n"God of Abraham, God of Isaac, and God of Jacob, blessed are you.\nHelp me, who am alone and have no help but you,\nfor I am taking my life in my hand.\nAs a child I used to hear from the books of my forefathers\nthat you, O LORD, always free those who are pleasing to you.\nNow help me, who am alone and have no one but you,\nO LORD, my God.\n\n"And now, come to help me, an orphan.\nPut in my mouth persuasive words in the presence of the lion\nand turn his heart to hatred for our enemy,\nso that he and those who are in league with him may perish.\nSave us from the hand of our enemies;\nturn our mourning into gladness\nand our sorrows into wholeness."` },
    { label: "Responsorial Psalm", ref: "Psalm 138:1-2ab, 2cde-3, 7c-8", isRefrain: true, text: `R. Lord, on the day I called for help, you answered me.\n\nI will give thanks to you, O LORD, with all my heart,\nfor you have heard the words of my mouth;\nin the presence of the angels I will sing your praise;\nI will worship at your holy temple\nand give thanks to your name.\n\nR. Lord, on the day I called for help, you answered me.\n\nBecause of your kindness and your truth;\nfor you have made great above all things\nyour name and your promise.\nWhen I called, you answered me;\nyou built up strength within me.\n\nR. Lord, on the day I called for help, you answered me.\n\nYour right hand saves me.\nThe LORD will complete what he has done for me;\nyour kindness, O LORD, endures forever;\nforsake not the work of your hands.\n\nR. Lord, on the day I called for help, you answered me.` },
    { label: "Gospel", ref: "Matthew 7:7-12", dropCap: true, text: `Jesus said to his disciples:\n"Ask and it will be given to you;\nseek and you will find;\nknock and the door will be opened to you.\nFor everyone who asks, receives; and the one who seeks, finds;\nand to the one who knocks, the door will be opened.\nWhich one of you would hand his son a stone\nwhen he asked for a loaf of bread,\nor a snake when he asked for a fish?\nIf you then, who are wicked,\nknow how to give good gifts to your children,\nhow much more will your heavenly Father give good things\nto those who ask him.\n\n"Do to others whatever you would have them do to you.\nThis is the law and the prophets."` }] },
  "2026-02-27": { feast: "Friday of the First Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Ezekiel 18:21-28", dropCap: true, text: `Thus says the Lord GOD:\nIf the wicked man turns away from all the sins he committed,\nif he keeps all my statutes and does what is right and just,\nhe shall surely live, he shall not die.\nNone of the crimes he committed shall be remembered against him;\nhe shall live because of the virtue he has practiced.\nDo I indeed derive any pleasure from the death of the wicked?\nsays the Lord GOD.\nDo I not rather rejoice when he turns from his evil way\nthat he may live?\n\nAnd if the virtuous man turns from the path of virtue to do evil,\nthe same kind of abominable things that the wicked man does,\ncan he do this and still live?\nNone of his virtuous deeds shall be remembered,\nbecause he has broken faith and committed sin;\nbecause of this, he shall die.\nYou say, "The LORD's way is not fair!"\nHear now, house of Israel:\nIs it my way that is unfair, or rather, are not your ways unfair?\nWhen someone virtuous turns away from virtue to commit iniquity, and dies,\nit is because of the iniquity he committed that he must die.\nBut if the wicked, turning from the wickedness he has committed,\ndoes what is right and just,\nhe shall preserve his life;\nsince he has turned away from all the sins that he committed,\nhe shall surely live, he shall not die.` },
    { label: "Responsorial Psalm", ref: "Psalm 130:1-2, 3-4, 5-7a, 7bc-8", isRefrain: true, text: `R. If you, O Lord, mark iniquities, who can stand?\n\nOut of the depths I cry to you, O LORD;\nLORD, hear my voice!\nLet your ears be attentive\nto my voice in supplication.\n\nR. If you, O Lord, mark iniquities, who can stand?\n\nIf you, O LORD, mark iniquities,\nLORD, who can stand?\nBut with you is forgiveness,\nthat you may be revered.\n\nR. If you, O Lord, mark iniquities, who can stand?\n\nI trust in the LORD;\nmy soul trusts in his word.\nMy soul waits for the LORD\nmore than sentinels wait for the dawn.\nLet Israel wait for the LORD.\n\nR. If you, O Lord, mark iniquities, who can stand?\n\nFor with the LORD is kindness\nand with him is plenteous redemption;\nAnd he will redeem Israel\nfrom all their iniquities.\n\nR. If you, O Lord, mark iniquities, who can stand?` },
    { label: "Gospel", ref: "Matthew 5:20-26", dropCap: true, text: `Jesus said to his disciples:\n"I tell you,\nunless your righteousness surpasses that\nof the scribes and Pharisees,\nyou will not enter into the Kingdom of heaven.\n\n"You have heard that it was said to your ancestors,\nYou shall not kill; and whoever kills will be liable to judgment.\nBut I say to you, whoever is angry with his brother\nwill be liable to judgment,\nand whoever says to his brother, Raqa,\nwill be answerable to the Sanhedrin,\nand whoever says, 'You fool,' will be liable to fiery Gehenna.\nTherefore, if you bring your gift to the altar,\nand there recall that your brother\nhas anything against you,\nleave your gift there at the altar,\ngo first and be reconciled with your brother,\nand then come and offer your gift.\nSettle with your opponent quickly while on the way to court.\nOtherwise your opponent will hand you over to the judge,\nand the judge will hand you over to the guard,\nand you will be thrown into prison.\nAmen, I say to you,\nyou will not be released until you have paid the last penny."` }] },
  "2026-02-28": { feast: "Saturday of the First Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Deuteronomy 26:16-19", dropCap: true, text: `Moses spoke to the people, saying:\n"This day the LORD, your God,\ncommands you to observe these statutes and decrees.\nBe careful, then,\nto observe them with all your heart and with all your soul.\nToday you are making this agreement with the LORD:\nhe is to be your God and you are to walk in his ways\nand observe his statutes, commandments and decrees,\nand to hearken to his voice.\nAnd today the LORD is making this agreement with you:\nyou are to be a people peculiarly his own, as he promised you;\nand provided you keep all his commandments,\nhe will then raise you high in praise and renown and glory\nabove all other nations he has made,\nand you will be a people sacred to the LORD, your God,\nas he promised."` },
    { label: "Responsorial Psalm", ref: "Psalm 119:1-2, 4-5, 7-8", isRefrain: true, text: `R. Blessed are they who follow the law of the Lord!\n\nBlessed are they whose way is blameless,\nwho walk in the law of the LORD.\nBlessed are they who observe his decrees,\nwho seek him with all their heart.\n\nR. Blessed are they who follow the law of the Lord!\n\nYou have commanded that your precepts\nbe diligently kept.\nOh, that I might be firm in the ways\nof keeping your statutes!\n\nR. Blessed are they who follow the law of the Lord!\n\nI will give you thanks with an upright heart,\nwhen I have learned your just ordinances.\nI will keep your statutes;\ndo not utterly forsake me.\n\nR. Blessed are they who follow the law of the Lord!` },
    { label: "Gospel", ref: "Matthew 5:43-48", dropCap: true, text: `Jesus said to his disciples:\n"You have heard that it was said,\nYou shall love your neighbor and hate your enemy.\nBut I say to you, love your enemies,\nand pray for those who persecute you,\nthat you may be children of your heavenly Father,\nfor he makes his sun rise on the bad and the good,\nand causes rain to fall on the just and the unjust.\nFor if you love those who love you, what recompense will you have?\nDo not the tax collectors do the same?\nAnd if you greet your brothers and sisters only,\nwhat is unusual about that?\nDo not the pagans do the same?\nSo be perfect, just as your heavenly Father is perfect."` }] },

  // ─── SECOND WEEK OF LENT ───
  "2026-03-01": { feast: "Second Sunday of Lent", yearCycle: "Year A", color: "violet",
    feastInfo: { title: "Second Sunday of Lent", desc: "The Transfiguration of Jesus on the mountain reveals his divine glory to Peter, James, and John. After last week's desert temptation, the Church is shown the destination of the Lenten road: the radiant glory of the Resurrection. Moses and Elijah appear alongside Christ, connecting the Law and the Prophets to the new covenant." },
    readings: [
    { label: "First Reading", ref: "Genesis 12:1-4a", dropCap: true, text: `The LORD said to Abram:\n"Go forth from the land of your kinsfolk\nand from your father's house to a land that I will show you.\n\n"I will make of you a great nation,\nand I will bless you;\nI will make your name great,\nso that you will be a blessing.\nI will bless those who bless you\nand curse those who curse you.\nAll the communities of the earth\nshall find blessing in you."\n\nAbram went as the LORD directed him.` },
    { label: "Responsorial Psalm", ref: "Psalm 33:4-5, 18-19, 20, 22", isRefrain: true, text: `R. Lord, let your mercy be on us, as we place our trust in you.\n\nUpright is the word of the LORD,\nand all his works are trustworthy.\nHe loves justice and right;\nof the kindness of the LORD the earth is full.\n\nR. Lord, let your mercy be on us, as we place our trust in you.\n\nSee, the eyes of the LORD are upon those who fear him,\nupon those who hope for his kindness,\nTo deliver them from death\nand preserve them in spite of famine.\n\nR. Lord, let your mercy be on us, as we place our trust in you.\n\nOur soul waits for the LORD,\nwho is our help and our shield.\nMay your kindness, O LORD, be upon us\nwho have put our hope in you.\n\nR. Lord, let your mercy be on us, as we place our trust in you.` },
    { label: "Second Reading", ref: "2 Timothy 1:8b-10", dropCap: true, text: `Beloved:\nBear your share of hardship for the gospel\nwith the strength that comes from God.\n\nHe saved us and called us to a holy life,\nnot according to our works\nbut according to his own design\nand the grace bestowed on us in Christ Jesus before time began,\nbut now made manifest\nthrough the appearance of our savior Christ Jesus,\nwho destroyed death and brought life and immortality\nto light through the gospel.` },
    { label: "Gospel", ref: "Matthew 17:1-9", dropCap: true, text: `Jesus took Peter, James, and John his brother,\nand led them up a high mountain by themselves.\nAnd he was transfigured before them;\nhis face shone like the sun\nand his clothes became white as light.\nAnd behold, Moses and Elijah appeared to them,\nconversing with him.\nThen Peter said to Jesus in reply,\n"Lord, it is good that we are here.\nIf you wish, I will make three tents here,\none for you, one for Moses, and one for Elijah."\nWhile he was still speaking, behold,\na bright cloud cast a shadow over them,\nthen from the cloud came a voice that said,\n"This is my beloved Son, with whom I am well pleased;\nlisten to him."\nWhen the disciples heard this, they fell prostrate\nand were very much afraid.\nBut Jesus came and touched them, saying,\n"Rise, and do not be afraid."\nAnd when the disciples raised their eyes,\nthey saw no one else but Jesus alone.\n\nAs they were coming down from the mountain,\nJesus charged them,\n"Do not tell the vision to anyone\nuntil the Son of Man has been raised from the dead."` }] },
  "2026-03-02": { feast: "Monday of the Second Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Daniel 9:4b-10", dropCap: true, text: `"Lord, great and awesome God,\nyou who keep your merciful covenant toward those who love you\nand observe your commandments!\nWe have sinned, been wicked and done evil;\nwe have rebelled and departed from your commandments and your laws.\nWe have not obeyed your servants the prophets,\nwho spoke in your name to our kings, our princes,\nour fathers, and all the people of the land.\nJustice, O Lord, is on your side;\nwe are shamefaced even to this day:\nwe, the men of Judah, the residents of Jerusalem,\nand all Israel, near and far,\nin all the countries to which you have scattered them\nbecause of their treachery toward you.\nO LORD, we are shamefaced, like our kings, our princes, and our fathers,\nfor having sinned against you.\nBut yours, O Lord, our God, are compassion and forgiveness!\nYet we rebelled against you\nand paid no heed to your command, O LORD, our God,\nto live by the law you gave us through your servants the prophets."` },
    { label: "Responsorial Psalm", ref: "Psalm 79:8, 9, 11, 13", isRefrain: true, text: `R. Lord, do not deal with us according to our sins.\n\nRemember not against us the iniquities of the past;\nmay your compassion quickly come to us,\nfor we are brought very low.\n\nR. Lord, do not deal with us according to our sins.\n\nHelp us, O God our savior,\nbecause of the glory of your name;\nDeliver us and pardon our sins\nfor your name's sake.\n\nR. Lord, do not deal with us according to our sins.\n\nLet the prisoners' sighing come before you;\nwith your great power free those doomed to death.\nThen we, your people and the sheep of your pasture,\nwill give thanks to you forever;\nthrough all generations we will declare your praise.\n\nR. Lord, do not deal with us according to our sins.` },
    { label: "Gospel", ref: "Luke 6:36-38", dropCap: true, text: `Jesus said to his disciples:\n"Be merciful, just as your Father is merciful.\n\n"Stop judging and you will not be judged.\nStop condemning and you will not be condemned.\nForgive and you will be forgiven.\nGive and gifts will be given to you;\na good measure, packed together, shaken down, and overflowing,\nwill be poured into your lap.\nFor the measure with which you measure\nwill in return be measured out to you."` }] },
  "2026-03-03": { feast: "Tuesday of the Second Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Isaiah 1:10, 16-20", dropCap: true, text: `Hear the word of the LORD,\nprinces of Sodom!\nListen to the instruction of our God,\npeople of Gomorrah!\n\nWash yourselves clean!\nPut away your misdeeds from before my eyes;\ncease doing evil; learn to do good.\nMake justice your aim: redress the wronged,\nhear the orphan's plea, defend the widow.\n\nCome now, let us set things right,\nsays the LORD:\nThough your sins be like scarlet,\nthey may become white as snow;\nThough they be crimson red,\nthey may become white as wool.\nIf you are willing, and obey,\nyou shall eat the good things of the land;\nBut if you refuse and resist,\nthe sword shall consume you:\nfor the mouth of the LORD has spoken!` },
    { label: "Responsorial Psalm", ref: "Psalm 50:8-9, 16bc-17, 21, 23", isRefrain: true, text: `R. To the upright I will show the saving power of God.\n\n"Not for your sacrifices do I rebuke you,\nfor your burnt offerings are before me always.\nI take from your house no bullock,\nno goats out of your fold."\n\nR. To the upright I will show the saving power of God.\n\n"Why do you recite my statutes,\nand profess my covenant with your mouth,\nThough you hate discipline\nand cast my words behind you?"\n\nR. To the upright I will show the saving power of God.\n\n"When you do these things, shall I be deaf to it?\nOr do you think that I am like yourself?\nI will correct you by drawing them up before your eyes.\nHe that offers praise as a sacrifice glorifies me;\nand to him that goes the right way I will show the salvation of God."\n\nR. To the upright I will show the saving power of God.` },
    { label: "Gospel", ref: "Matthew 23:1-12", dropCap: true, text: `Jesus spoke to the crowds and to his disciples, saying,\n"The scribes and the Pharisees\nhave taken their seat on the chair of Moses.\nTherefore, do and observe all things whatsoever they tell you,\nbut do not follow their example.\nFor they preach but they do not practice.\nThey tie up heavy burdens hard to carry\nand lay them on people's shoulders,\nbut they will not lift a finger to move them.\nAll their works are performed to be seen.\nThey widen their phylacteries and lengthen their tassels.\nThey love places of honor at banquets, seats of honor in synagogues,\ngreetings in marketplaces, and the salutation 'Rabbi.'\nAs for you, do not be called 'Rabbi.'\nYou have but one teacher, and you are all brothers.\nCall no one on earth your father;\nyou have but one Father in heaven.\nDo not be called 'Master';\nyou have but one master, the Christ.\nThe greatest among you must be your servant.\nWhoever exalts himself will be humbled;\nbut whoever humbles himself will be exalted."` }] },
  "2026-03-04": { feast: "Wednesday of the Second Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Jeremiah 18:18-20", dropCap: true, text: `The people of Judah and the citizens of Jerusalem said,\n"Come, let us contrive a plot against Jeremiah.\nIt will not mean the loss of instruction from the priests,\nnor of counsel from the wise, nor of messages from the prophets.\nAnd so, let us destroy him by his own tongue;\nlet us carefully note his every word."\n\nHeed me, O LORD,\nand listen to what my adversaries say.\nMust good be repaid with evil\nthat they should dig a pit to take my life?\nRemember that I stood before you\nto speak in their behalf,\nto turn away your wrath from them.` },
    { label: "Responsorial Psalm", ref: "Psalm 31:5-6, 14, 15-16", isRefrain: true, text: `R. Save me, O Lord, in your kindness.\n\nYou will free me from the snare they set for me,\nfor you are my refuge.\nInto your hands I commend my spirit;\nyou will redeem me, O LORD, O faithful God.\n\nR. Save me, O Lord, in your kindness.\n\nI hear the whispers of the crowd, that frighten me from every side,\nas they consult together against me, plotting to take my life.\n\nR. Save me, O Lord, in your kindness.\n\nBut my trust is in you, O LORD;\nI say, "You are my God."\nIn your hands is my destiny; rescue me\nfrom the clutches of my enemies and my persecutors.\n\nR. Save me, O Lord, in your kindness.` },
    { label: "Gospel", ref: "Matthew 20:17-28", dropCap: true, text: `As Jesus was going up to Jerusalem,\nhe took the Twelve disciples aside by themselves,\nand said to them on the way,\n"Behold, we are going up to Jerusalem,\nand the Son of Man will be handed over to the chief priests\nand the scribes,\nand they will condemn him to death,\nand hand him over to the Gentiles\nto be mocked and scourged and crucified,\nand he will be raised on the third day."\n\nThen the mother of the sons of Zebedee approached Jesus with her sons\nand did him homage, wishing to ask him for something.\nHe said to her, "What do you wish?"\nShe answered him,\n"Command that these two sons of mine sit,\none at your right and the other at your left, in your kingdom."\nJesus said in reply,\n"You do not know what you are asking.\nCan you drink the chalice that I am going to drink?"\nThey said to him, "We can."\nHe replied,\n"My chalice you will indeed drink,\nbut to sit at my right and at my left,\nthis is not mine to give\nbut is for those for whom it has been prepared by my Father."\nWhen the ten heard this,\nthey became indignant at the two brothers.\nBut Jesus summoned them and said,\n"You know that the rulers of the Gentiles lord it over them,\nand the great ones make their authority over them felt.\nBut it shall not be so among you.\nRather, whoever wishes to be great among you shall be your servant;\nwhoever wishes to be first among you shall be your slave.\nJust so, the Son of Man did not come to be served but to serve\nand to give his life as a ransom for many."` }] },
  "2026-03-05": { feast: "Thursday of the Second Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Jeremiah 17:5-10", dropCap: true, text: `Thus says the LORD:\nCursed is the man who trusts in human beings,\nwho seeks his strength in flesh,\nwhose heart turns away from the LORD.\nHe is like a barren bush in the desert\nthat enjoys no change of season,\nBut stands in a lava waste,\na salt and empty earth.\nBlessed is the man who trusts in the LORD,\nwhose hope is the LORD.\nHe is like a tree planted beside the waters\nthat stretches out its roots to the stream:\nIt fears not the heat when it comes,\nits leaves stay green;\nIn the year of drought it shows no distress,\nbut still bears fruit.\nMore tortuous than all else is the human heart,\nbeyond remedy; who can understand it?\nI, the LORD, alone probe the mind\nand test the heart,\nTo reward everyone according to his ways,\naccording to the merit of his deeds.` },
    { label: "Responsorial Psalm", ref: "Psalm 1:1-2, 3, 4, 6", isRefrain: true, text: `R. Blessed are they who hope in the Lord.\n\nBlessed the man who follows not\nthe counsel of the wicked\nNor walks in the way of sinners,\nnor sits in the company of the insolent,\nBut delights in the law of the LORD\nand meditates on his law day and night.\n\nR. Blessed are they who hope in the Lord.\n\nHe is like a tree\nplanted near running water,\nThat yields its fruit in due season,\nand whose leaves never fade.\nWhatever he does, prospers.\n\nR. Blessed are they who hope in the Lord.\n\nNot so, the wicked, not so;\nthey are like chaff which the wind drives away.\nFor the LORD watches over the way of the just,\nbut the way of the wicked vanishes.\n\nR. Blessed are they who hope in the Lord.` },
    { label: "Gospel", ref: "Luke 16:19-31", dropCap: true, text: `Jesus said to the Pharisees:\n"There was a rich man who dressed in purple garments and fine linen\nand dined sumptuously each day.\nAnd lying at his door was a poor man named Lazarus, covered with sores,\nwho would gladly have eaten his fill of the scraps\nthat fell from the rich man's table.\nDogs even used to come and lick his sores.\nWhen the poor man died,\nhe was carried away by angels to the bosom of Abraham.\nThe rich man also died and was buried,\nand from the netherworld, where he was in torment,\nhe raised his eyes and saw Abraham far off\nand Lazarus at his side.\nAnd he cried out, 'Father Abraham, have pity on me.\nSend Lazarus to dip the tip of his finger in water and cool my tongue,\nfor I am suffering torment in these flames.'\nAbraham replied, 'My child,\nremember that you received what was good during your lifetime\nwhile Lazarus likewise received what was bad;\nbut now he is comforted here, whereas you are tormented.\nMoreover, between us and you a great chasm is established\nto prevent anyone from crossing\nwho might wish to go from our side to yours\nor from your side to ours.'\nHe said, 'Then I beg you, father, send him\nto my father's house,\nfor I have five brothers, so that he may warn them,\nlest they too come to this place of torment.'\nBut Abraham replied, 'They have Moses and the prophets.\nLet them listen to them.'\nHe said, 'Oh no, father Abraham,\nbut if someone from the dead goes to them, they will repent.'\nThen Abraham said,\n'If they will not listen to Moses and the prophets,\nneither will they be persuaded\nif someone should rise from the dead.'"` }] },
  "2026-03-06": { feast: "Friday of the Second Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Genesis 37:3-4, 12-13a, 17b-28a", dropCap: true, text: `Israel loved Joseph best of all his sons,\nfor he was the child of his old age;\nand he had made him a long tunic.\nWhen his brothers saw that their father loved him best of all his sons,\nthey hated him so much that they would not even greet him.\n\nOne day, when his brothers had gone\nto pasture their father's flocks at Shechem,\nIsrael said to Joseph,\n"Your brothers, you know, are tending our flocks at Shechem.\nGet ready; I will send you to them."\n\nSo Joseph went after his brothers and caught up with them in Dothan.\nThey noticed him from a distance,\nand before he came up to them, they plotted to kill him.\nThey said to one another: "Here comes that master dreamer!\nCome on, let us kill him and throw him into one of the cisterns here;\nwe could say that a wild beast devoured him.\nWe shall then see what comes of his dreams."\n\nWhen Reuben heard this,\nhe tried to save him from their hands, saying,\n"We must not take his life.\nInstead of shedding blood," he continued,\n"just throw him into that cistern there in the desert;\nbut do not kill him outright."\nHis purpose was to rescue him from their hands\nand return him to his father.\nSo when Joseph came up to them,\nthey stripped him of the long tunic he had on;\nthen they took him and threw him into the cistern,\nwhich was empty and dry.\n\nThey then sat down to their meal.\nLooking up, they saw a caravan of Ishmaelites coming from Gilead,\ntheir camels laden with gum, balm and resin\nto be taken down to Egypt.\nJudah said to his brothers:\n"What is to be gained by killing our brother and concealing his blood?\nRather, let us sell him to these Ishmaelites,\ninstead of doing away with him ourselves.\nAfter all, he is our brother, our own flesh."\nHis brothers agreed.\nThey sold Joseph to the Ishmaelites for twenty pieces of silver.` },
    { label: "Responsorial Psalm", ref: "Psalm 105:16-17, 18-19, 20-21", isRefrain: true, text: `R. Remember the marvels the Lord has done.\n\nWhen the LORD called down a famine on the land\nand ruined the crop that sustained them,\nHe sent a man before them,\nJoseph, sold as a slave.\n\nR. Remember the marvels the Lord has done.\n\nThey had weighed him down with fetters,\nand he was bound with chains,\nTill his prediction came to pass\nand the word of the LORD proved him true.\n\nR. Remember the marvels the Lord has done.\n\nThe king sent and released him,\nthe ruler of the peoples set him free.\nHe made him lord of his house\nand ruler of all his possessions.\n\nR. Remember the marvels the Lord has done.` },
    { label: "Gospel", ref: "Matthew 21:33-43, 45-46", dropCap: true, text: `Jesus said to the chief priests and the elders of the people:\n"Hear another parable.\nThere was a landowner who planted a vineyard,\nput a hedge around it,\ndug a wine press in it, and built a tower.\nThen he leased it to tenants and went on a journey.\nWhen vintage time drew near,\nhe sent his servants to the tenants to obtain his produce.\nBut the tenants seized the servants and one they beat,\nanother they killed, and a third they stoned.\nAgain he sent other servants, more numerous than the first ones,\nbut they treated them in the same way.\nFinally, he sent his son to them,\nthinking, 'They will respect my son.'\nBut when the tenants saw the son, they said to one another,\n'This is the heir.\nCome, let us kill him and acquire his inheritance.'\nThey seized him, threw him out of the vineyard, and killed him.\nWhat will the owner of the vineyard do to those tenants when he comes?"\nThey answered him,\n"He will put those wretched men to a wretched death\nand lease his vineyard to other tenants\nwho will give him the produce at the proper times."\nJesus said to them, "Did you never read in the Scriptures:\n\nThe stone that the builders rejected\nhas become the cornerstone;\nby the Lord has this been done,\nand it is wonderful in our eyes?\n\nTherefore, I say to you,\nthe Kingdom of God will be taken away from you\nand given to a people that will produce its fruit."\nWhen the chief priests and the Pharisees heard his parables,\nthey knew that he was speaking about them.\nAnd although they were attempting to arrest him,\nthey feared the crowds, for they regarded him as a prophet.` }] },
  "2026-03-07": { feast: "Saturday of the Second Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "Micah 7:14-15, 18-20", dropCap: true, text: `Shepherd your people with your staff,\nthe flock of your inheritance,\nThat dwells apart in a woodland,\nin the midst of Carmel.\nLet them feed in Bashan and Gilead,\nas in the days of old;\nAs in the days when you came from the land of Egypt,\nshow us wonderful signs.\n\nWho is there like you, the God who removes guilt\nand pardons sin for the remnant of his inheritance;\nWho does not persist in anger forever,\nbut delights rather in clemency,\nAnd will again have compassion on us,\ntreading underfoot our guilt?\nYou will cast into the depths of the sea all our sins;\nYou will show faithfulness to Jacob,\nand grace to Abraham,\nAs you have sworn to our fathers\nfrom days of old.` },
    { label: "Responsorial Psalm", ref: "Psalm 103:1-2, 3-4, 9-10, 11-12", isRefrain: true, text: `R. The Lord is kind and merciful.\n\nBless the LORD, O my soul;\nand all my being, bless his holy name.\nBless the LORD, O my soul,\nand forget not all his benefits.\n\nR. The Lord is kind and merciful.\n\nHe pardons all your iniquities,\nhe heals all your ills.\nHe redeems your life from destruction,\nhe crowns you with kindness and compassion.\n\nR. The Lord is kind and merciful.\n\nHe will not always chide,\nnor does he keep his wrath forever.\nNot according to our sins does he deal with us,\nnor does he requite us according to our crimes.\n\nR. The Lord is kind and merciful.\n\nFor as the heavens are high above the earth,\nso surpassing is his kindness toward those who fear him.\nAs far as the east is from the west,\nso far has he put our transgressions from us.\n\nR. The Lord is kind and merciful.` },
    { label: "Gospel", ref: "Luke 15:1-3, 11-32", dropCap: true, text: `Tax collectors and sinners were all drawing near to listen to Jesus,\nbut the Pharisees and scribes began to complain, saying,\n"This man welcomes sinners and eats with them."\nSo to them Jesus addressed this parable.\n"A man had two sons, and the younger son said to his father,\n'Father, give me the share of your estate that should come to me.'\nSo the father divided the property between them.\nAfter a few days, the younger son collected all his belongings\nand set off to a distant country\nwhere he squandered his inheritance on a life of dissipation.\nWhen he had freely spent everything,\na severe famine struck that country,\nand he found himself in dire need.\nSo he hired himself out to one of the local citizens\nwho sent him to his farm to tend the swine.\nAnd he longed to eat his fill of the pods on which the swine fed,\nbut nobody gave him any.\nComing to his senses he thought,\n'How many of my father's hired workers\nhave more than enough food to eat,\nbut here am I, dying from hunger.\nI shall get up and go to my father and I shall say to him,\n"Father, I have sinned against heaven and against you.\nI no longer deserve to be called your son;\ntreat me as you would treat one of your hired workers."'\nSo he got up and went back to his father.\nWhile he was still a long way off,\nhis father caught sight of him, and was filled with compassion.\nHe ran to his son, embraced him and kissed him.\nHis son said to him,\n'Father, I have sinned against heaven and against you;\nI no longer deserve to be called your son.'\nBut his father ordered his servants,\n'Quickly, bring the finest robe and put it on him;\nput a ring on his finger and sandals on his feet.\nTake the fattened calf and slaughter it.\nThen let us celebrate with a feast,\nbecause this son of mine was dead, and has come to life again;\nhe was lost, and has been found.'\nThen the celebration began.\nNow the older son had been out in the field\nand, on his way back, as he neared the house,\nhe heard the sound of music and dancing.\nHe called one of the servants and asked what this might mean.\nThe servant said to him,\n'Your brother has returned\nand your father has slaughtered the fattened calf\nbecause he has him back safe and sound.'\nHe became angry,\nand when he refused to enter the house,\nhis father came out and pleaded with him.\nHe said to his father in reply,\n'Look, all these years I served you\nand not once did I disobey your orders;\nyet you never gave me even a young goat to feast on with my friends.\nBut when your son returns\nwho swallowed up your property with prostitutes,\nfor him you slaughter the fattened calf.'\nHe said to him,\n'My son, you are here with me always;\neverything I have is yours.\nBut now we must celebrate and rejoice,\nbecause your brother was dead and has come to life again;\nhe was lost and has been found.'"` }] },

  // ─── THIRD WEEK OF LENT ───
  "2026-03-08": { feast: "Third Sunday of Lent", yearCycle: "Year A", color: "violet",
    feastInfo: { title: "Third Sunday of Lent", desc: "Jesus meets the Samaritan woman at Jacob's well and offers her \"living water.\" The encounter breaks every social convention — a Jewish man speaking to a Samaritan woman — and reveals that worship of the Father transcends any one place or people. The first of the great Lenten scrutiny Gospels for catechumens preparing for baptism." },
    readings: [
    { label: "First Reading", ref: "Exodus 17:3-7", dropCap: true, text: `In those days, in their thirst for water,\nthe people grumbled against Moses,\nsaying, "Why did you ever make us leave Egypt?\nWas it just to have us die here of thirst\nwith our children and our livestock?"\nSo Moses cried out to the LORD,\n"What shall I do with this people?\na little more and they will stone me!"\nThe LORD answered Moses,\n"Go over there in front of the people,\nalong with some of the elders of Israel,\nholding in your hand, as you go,\nthe staff with which you struck the river.\nI will be standing there in front of you on the rock in Horeb.\nStrike the rock, and the water will flow from it\nfor the people to drink."\nThis Moses did, in the presence of the elders of Israel.\nThe place was called Massah and Meribah,\nbecause the Israelites quarreled there\nand tested the LORD, saying,\n"Is the LORD in our midst or not?"` },
    { label: "Responsorial Psalm", ref: "Psalm 95:1-2, 6-7, 8-9", isRefrain: true, text: `R. If today you hear his voice, harden not your hearts.\n\nCome, let us sing joyfully to the LORD;\nlet us acclaim the Rock of our salvation.\nLet us come into his presence with thanksgiving;\nlet us joyfully sing psalms to him.\n\nR. If today you hear his voice, harden not your hearts.\n\nCome, let us bow down in worship;\nlet us kneel before the LORD who made us.\nFor he is our God,\nand we are the people he shepherds, the flock he guides.\n\nR. If today you hear his voice, harden not your hearts.\n\nOh, that today you would hear his voice:\n"Harden not your hearts as at Meribah,\nas in the day of Massah in the desert,\nWhere your fathers tempted me;\nthey tested me though they had seen my works."\n\nR. If today you hear his voice, harden not your hearts.` },
    { label: "Second Reading", ref: "Romans 5:1-2, 5-8", dropCap: true, text: `Brothers and sisters:\nSince we have been justified by faith,\nwe have peace with God through our Lord Jesus Christ,\nthrough whom we have gained access by faith\nto this grace in which we stand,\nand we boast in hope of the glory of God.\n\nAnd hope does not disappoint,\nbecause the love of God has been poured out into our hearts\nthrough the Holy Spirit who has been given to us.\nFor Christ, while we were still helpless,\ndied at the appointed time for the ungodly.\nIndeed, only with difficulty does one die for a just person,\nthough perhaps for a good person one might even find courage to die.\nBut God proves his love for us\nin that while we were still sinners Christ died for us.` },
    { label: "Gospel", ref: "John 4:5-42", dropCap: true, text: `Jesus came to a town of Samaria called Sychar,\nnear the plot of land that Jacob had given to his son Joseph.\nJacob's well was there.\nJesus, tired from his journey, sat down there at the well.\nIt was about noon.\n\nA woman of Samaria came to draw water.\nJesus said to her,\n"Give me a drink."\nHis disciples had gone into the town to buy food.\nThe Samaritan woman said to him,\n"How can you, a Jew, ask me, a Samaritan woman, for a drink?"\nJesus answered and said to her,\n"If you knew the gift of God\nand who is saying to you, 'Give me a drink,'\nyou would have asked him\nand he would have given you living water."\nThe woman said to him,\n"Sir, you do not even have a bucket and the cistern is deep;\nwhere then can you get this living water?\nAre you greater than our father Jacob,\nwho gave us this cistern and drank from it himself\nwith his children and his flocks?"\nJesus answered and said to her,\n"Everyone who drinks this water will be thirsty again;\nbut whoever drinks the water I shall give will never thirst;\nthe water I shall give will become in him\na spring of water welling up to eternal life."\nThe woman said to him,\n"Sir, give me this water, so that I may not be thirsty\nor have to keep coming here to draw water."\n\nJesus said to her,\n"Go call your husband and come back."\nThe woman answered and said to him,\n"I do not have a husband."\nJesus answered her,\n"You are right in saying, 'I do not have a husband.'\nFor you have had five husbands,\nand the one you have now is not your husband.\nWhat you have said is true."\nThe woman said to him,\n"Sir, I can see that you are a prophet.\nOur ancestors worshiped on this mountain;\nbut you people say that the place to worship is in Jerusalem."\nJesus said to her,\n"Believe me, woman, the hour is coming\nwhen you will worship the Father\nneither on this mountain nor in Jerusalem.\nYou people worship what you do not understand;\nwe worship what we understand,\nbecause salvation is from the Jews.\nBut the hour is coming, and is now here,\nwhen true worshipers will worship the Father in Spirit and truth;\nand indeed the Father seeks such people to worship him.\nGod is Spirit, and those who worship him\nmust worship in Spirit and truth."\nThe woman said to him,\n"I know that the Messiah is coming, the one called the Christ;\nwhen he comes, he will tell us everything."\nJesus said to her,\n"I am he, the one speaking with you."\n\nAt that moment his disciples returned,\nand were amazed that he was talking with a woman,\nbut still no one said, "What are you looking for?"\nor "Why are you talking with her?"\nThe woman left her water jar\nand went into the town and said to the people,\n"Come see a man who told me everything I have done.\nCould he possibly be the Christ?"\nThey went out of the town and came to him.\nMeanwhile, the disciples urged him, "Rabbi, eat."\nBut he said to them,\n"I have food to eat of which you do not know."\nSo the disciples said to one another,\n"Could someone have brought him something to eat?"\nJesus said to them,\n"My food is to do the will of the one who sent me\nand to finish his work.\nDo you not say, 'In four months the harvest will be here'?\nI tell you, look up and see the fields ripe for the harvest.\nThe reaper is already receiving payment\nand gathering crops for eternal life,\nso that the sower and reaper can rejoice together.\nFor here the saying is verified that 'One sows and another reaps.'\nI sent you to reap what you have not worked for;\nothers have done the work,\nand you are sharing the fruits of their work."\n\nMany of the Samaritans of that town began to believe in him\nbecause of the word of the woman who testified,\n"He told me everything I have done."\nWhen the Samaritans came to him,\nthey invited him to stay with them;\nand he stayed there two days.\nMany more began to believe in him because of his word,\nand they said to the woman,\n"We no longer believe because of your word;\nfor we have heard for ourselves,\nand we know that this is truly the savior of the world."` }] },
  "2026-03-09": { feast: "Monday of the Third Week of Lent", color: "violet", readings: [
    { label: "First Reading", ref: "2 Kings 5:1-15ab", dropCap: true, text: `Naaman, the army commander of the king of Aram,\nwas highly esteemed and respected by his master,\nfor through him the LORD had brought victory to Aram.\nBut valiant as he was, the man was a leper.\nNow the Arameans had captured in a raid on the land of Israel\na little girl, who became the servant of Naaman's wife.\n"If only my master would present himself to the prophet in Samaria,"\nshe said to her mistress, "he would cure him of his leprosy."\nNaaman went and told his lord\njust what the slave girl from the land of Israel had said.\n"Go," said the king of Aram.\n"I will send along a letter to the king of Israel."\nSo Naaman set out, taking along ten silver talents,\nsix thousand gold pieces, and ten festal garments.\nTo the king of Israel he brought the letter, which read:\n"With this letter I am sending my servant Naaman to you,\nthat you may cure him of his leprosy."\n\nWhen he read the letter,\nthe king of Israel tore his garments and exclaimed:\n"Am I a god with power over life and death,\nthat this man should send someone to me to be cured of leprosy?\nTake note! You can see he is only looking for a quarrel with me!"\nWhen Elisha, the man of God,\nheard that the king of Israel had torn his garments,\nhe sent word to the king:\n"Why have you torn your garments?\nLet him come to me and find out\nthat there is a prophet in Israel."\n\nNaaman came with his horses and chariots\nand stopped at the door of Elisha's house.\nThe prophet sent him the message:\n"Go and wash seven times in the Jordan,\nand your flesh will heal, and you will be clean."\nBut Naaman went away angry, saying,\n"I thought that he would surely come out and stand there\nto invoke the LORD his God,\nand would move his hand over the spot,\nand thus cure the leprosy.\nAre not the rivers of Damascus, the Abana and the Pharpar,\nbetter than all the waters of Israel?\nCould I not wash in them and be cleansed?"\nWith this, he turned about in anger and left.\n\nBut his servants came up and reasoned with him.\n"My father," they said,\n"if the prophet had told you to do something extraordinary,\nwould you not have done it?\nAll the more now, since he said to you,\n'Wash and be clean,' should you do as he said."\nSo Naaman went down and plunged into the Jordan seven times\nat the word of the man of God.\nHis flesh became again like the flesh of a little child, and he was clean.\n\nHe returned with his whole retinue to the man of God.\nOn his arrival he stood before him and said,\n"Now I know that there is no God in all the earth,\nexcept in Israel."` },
    { label: "Responsorial Psalm", ref: "Psalm 42:2, 3; 43:3, 4", isRefrain: true, text: `R. Athirst is my soul for the living God. When shall I go and behold the face of God?\n\nAs the hind longs for the running waters,\nso my soul longs for you, O God.\n\nR. Athirst is my soul for the living God. When shall I go and behold the face of God?\n\nAthirst is my soul for God, the living God.\nWhen shall I go and behold the face of God?\n\nR. Athirst is my soul for the living God. When shall I go and behold the face of God?\n\nSend forth your light and your fidelity;\nthey shall lead me on\nAnd bring me to your holy mountain,\nto your dwelling-place.\n\nR. Athirst is my soul for the living God. When shall I go and behold the face of God?\n\nThen will I go in to the altar of God,\nthe God of my gladness and joy;\nThen will I give you thanks upon the harp,\nO God, my God!\n\nR. Athirst is my soul for the living God. When shall I go and behold the face of God?` },
    { label: "Gospel", ref: "Luke 4:24-30", dropCap: true, text: `Jesus said to the people in the synagogue at Nazareth:\n"Amen, I say to you,\nno prophet is accepted in his own native place.\nIndeed, I tell you, there were many widows in Israel\nin the days of Elijah\nwhen the sky was closed for three and a half years\nand a severe famine spread over the entire land.\nIt was to none of these that Elijah was sent,\nbut only to a widow in Zarephath in the land of Sidon.\nAgain, there were many lepers in Israel\nduring the time of Elisha the prophet;\nyet not one of them was cleansed, but only Naaman the Syrian."\nWhen the people in the synagogue heard this,\nthey were all filled with fury.\nThey rose up, drove him out of the town,\nand led him to the brow of the hill\non which their town had been built,\nto hurl him down headlong.\nBut he passed through the midst of them and went away.` }] },
  "2026-03-10": { feast: "Tuesday of the Third Week of Lent", color: "violet", readings: [
